<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYE-CARE LENS SIMULATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* * [デザインの世界観] 
         * 高級アイウェアブランドや専門クリニックを意識した、清潔感と温かみのあるベースデザイン。
         * テンプレ的な影（Shadow）を極力減らし、繊細なボーダーと余白で知的さを演出。
         */
        body {
            background-color: #FAF9F6; /* オフホワイト */
            color: #2c3e50;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px; /* 医療・専門機関を思わせるうっすらとしたドットパターン */
            -webkit-tap-highlight-color: transparent;
        }

        /* * [眼精疲労の視覚化（Standard時のエフェクト）] 
         */
        /* 1. 光のチラつき・過剰な発光 */
        .effect-glare {
            animation: flicker 0.12s infinite alternate;
        }
        @keyframes flicker {
            0% { filter: brightness(1.05) contrast(0.95); opacity: 0.98; }
            100% { filter: brightness(1.2) contrast(0.85) drop-shadow(0 0 6px rgba(255,255,255,0.8)); opacity: 1; }
        }

        /* 2. 文字のハレーション（白飛びして滲む現象） */
        .effect-halation {
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.9), 0 0 1px rgba(0, 0, 0, 0.2);
            filter: blur(0.4px);
            color: #555 !important;
        }

        /* 3. 夜間スマホの強烈な光 */
        .effect-bluelight {
            box-shadow: 0 0 30px rgba(200, 230, 255, 0.8), inset 0 0 20px rgba(255,255,255,1);
            animation: bluelight-flicker 2s infinite alternate;
        }
        @keyframes bluelight-flicker {
            0% { box-shadow: 0 0 25px rgba(200, 230, 255, 0.7), inset 0 0 15px rgba(255,255,255,0.9); }
            100% { box-shadow: 0 0 40px rgba(200, 230, 255, 0.9), inset 0 0 25px rgba(255,255,255,1); }
        }

        /* * [トークスクリプトの装飾]
         * 接客スタッフが読みやすいよう、重要なキーワードを視覚的にハイライト
         */
        .talk-highlight {
            background: linear-gradient(transparent 60%, #d8b4e2 40%); /* 上品なラベンダーのマーカー */
            font-weight: bold;
            color: #4a044e;
            padding: 0 2px;
        }

        /* カスタムトグルスイッチのスタイル */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #059669; /* emerald-600 */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981; /* emerald-500 */
        }
        
        /* フェードインアニメーション */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-12">

    <!-- アプリコンテナ（モバイル幅に最適化、中央配置） -->
    <div class="max-w-md mx-auto bg-white/60 min-h-screen shadow-[0_0_40px_rgba(0,0,0,0.02)] border-x border-stone-100 backdrop-blur-sm flex flex-col">
        
        <!-- ヘッダー -->
        <header class="pt-8 pb-6 px-6 border-b border-stone-200/60 bg-white/80 sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-lg font-bold tracking-widest text-stone-800" style="font-family: 'Times New Roman', Times, serif;">LENS CLINIC</h1>
                    <p class="text-[10px] tracking-widest text-stone-400 mt-1 uppercase">Functional Color Lens Simulator</p>
                </div>
                <!-- 装飾アイコン -->
                <svg class="w-6 h-6 text-emerald-600/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </div>
        </header>

        <main class="flex-1 p-6">
            
            <!-- STEP 1: シーン選択（初期表示） -->
            <!-- 情報過多を防ぐため、最初はここだけを表示 -->
            <div id="step-1" class="flex flex-col gap-5 fade-enter fade-enter-active">
                <div class="mb-2">
                    <span class="inline-block px-2 py-1 bg-stone-100 text-stone-500 text-[10px] font-bold tracking-widest rounded mb-2">STEP 01</span>
                    <h2 class="text-base font-bold text-stone-700 leading-relaxed">お客様が一番「目の疲れ」を<br>感じるシーンはどれですか？</h2>
                </div>

                <div class="flex flex-col gap-3">
                    <!-- シーンボタン1 -->
                    <button onclick="selectScene('office')" class="group text-left p-4 rounded-xl border border-stone-200 bg-white hover:border-emerald-400 hover:bg-emerald-50/30 transition-all flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
                            <svg class="w-5 h-5 text-stone-500 group-hover:text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-stone-800">オフィスで長時間のPC作業</h3>
                            <p class="text-[10px] text-stone-500 mt-1">Excelの白い画面やLED照明が眩しい</p>
                        </div>
                    </button>

                    <!-- シーンボタン2 -->
                    <button onclick="selectScene('night')" class="group text-left p-4 rounded-xl border border-stone-200 bg-white hover:border-emerald-400 hover:bg-emerald-50/30 transition-all flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
                            <svg class="w-5 h-5 text-stone-500 group-hover:text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-stone-800">夜、ベッドでスマホを見る時</h3>
                            <p class="text-[10px] text-stone-500 mt-1">暗い部屋で文字がチカチカして見づらい</p>
                        </div>
                    </button>

                    <!-- シーンボタン3 -->
                    <button onclick="selectScene('outdoor')" class="group text-left p-4 rounded-xl border border-stone-200 bg-white hover:border-emerald-400 hover:bg-emerald-50/30 transition-all flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
                            <svg class="w-5 h-5 text-stone-500 group-hover:text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-stone-800">白っぽい日差しの屋外・通勤中</h3>
                            <p class="text-[10px] text-stone-500 mt-1">曇りや初夏の照り返しで景色が眩しい</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- STEP 2: シミュレーション（シーン選択後に表示） -->
            <!-- 縦並び（flex-col）を徹底し、画像と文字が絶対に被らない設計 -->
            <div id="step-2" class="hidden flex-col gap-6">
                
                <!-- 戻るボタン -->
                <button onclick="goBack()" class="flex items-center gap-1 text-stone-400 text-xs hover:text-stone-600 w-fit">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    シーン選択に戻る
                </button>

                <!-- シミュレーション・ディスプレイ領域 -->
                <div class="relative bg-white border border-stone-200 rounded-lg overflow-hidden flex flex-col">
                    <div class="bg-stone-50 px-3 py-2 border-b border-stone-200 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-stone-500 tracking-wider" id="sim-title">SCENE PREVIEW</span>
                        <span class="flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-red-400 animate-pulse" id="status-indicator"></span>
                            <span class="text-[9px] text-stone-400" id="status-text">疲労蓄積中...</span>
                        </span>
                    </div>

                    <!-- デモ映像エリア（JSで切り替え） -->
                    <div id="simulator-canvas" class="h-48 relative overflow-hidden transition-all duration-500">
                        <!-- ここにシーン固有のDOMが注入されます -->
                    </div>

                    <!-- カラーレンズ・フィルターレイヤー -->
                    <!-- opacityの切り替えでレンズの効果を表現 -->
                    <div id="lens-filter" class="absolute inset-0 top-8 pointer-events-none opacity-0 transition-opacity duration-700 mix-blend-multiply"></div>
                </div>

                <!-- 操作パネル（トグルスイッチ） -->
                <div class="bg-stone-100/80 rounded-xl p-5 border border-stone-200/50">
                    <p class="text-center text-[11px] text-stone-500 font-bold mb-4">レンズを切り替えて見え方を比較</p>
                    
                    <div class="flex items-center justify-between gap-4 max-w-[280px] mx-auto">
                        <span id="label-standard" class="text-sm font-bold text-stone-800 transition-colors">標準クリアレンズ</span>
                        
                        <!-- Toggle -->
                        <div class="relative inline-block w-14 h-7 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle" id="lens-toggle" onchange="toggleLens()" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 border-stone-300 appearance-none cursor-pointer z-10 transition-all duration-300"/>
                            <label for="lens-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-stone-300 cursor-pointer transition-colors duration-300"></label>
                        </div>
                        
                        <span id="label-color" class="text-sm font-bold text-stone-400 transition-colors">カラーレンズ</span>
                    </div>
                </div>

                <!-- STAFF SCRIPT（接客カンペエリア） -->
                <!-- モバイルで読みやすいようパディングを確保し、独立したブロックとして配置 -->
                <div class="relative bg-white border-l-4 border-l-purple-400 shadow-sm p-5 rounded-r-xl mt-2">
                    <div class="absolute -top-3 left-4 bg-purple-100 text-purple-800 text-[9px] font-black tracking-widest px-2 py-1 rounded-sm border border-purple-200">
                        STAFF SCRIPT
                    </div>
                    <div class="min-h-[100px] flex items-center">
                        <p id="talk-script" class="text-[13px] leading-loose text-stone-700 font-medium transition-all duration-500">
                            <!-- JSでテキストが注入されます -->
                        </p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        /**
         * [データ構造]
         * シーンごとに、シミュレーション用HTML構造、適用するカラー（フィルター色）、
         * および接客トーク（標準時・カラー時）を定義。
         */
        const sceneData = {
            office: {
                title: "オフィスでのPC作業",
                filterColor: "bg-[#98FF98]", // ペールグリーン系（リラックス効果）
                filterOpacity: "opacity-40",
                lensName: "リラックスグリーン (15%)",
                standardScript: "オフィスはLED照明とPCモニターのダブルパンチで、実は<span class='talk-highlight'>白い光が目に入りすぎている状態</span>です。夕方になると文字が滲んだり、目がシパシパしてきませんか？",
                coloredScript: "この『リラックスグリーン』を15%入れるだけで、暗くならずに<span class='talk-highlight'>白い画面の「嫌なチラつき」だけをスッと吸収</span>します。文字の輪郭がクッキリするので、夕方からの仕事の集中力が全く変わりますよ。",
                html: `
                    <div class="w-full h-full bg-white p-4 flex flex-col gap-2 effect-glare target-effect">
                        <div class="flex gap-2 mb-2">
                            <div class="h-3 w-1/4 bg-blue-100"></div><div class="h-3 w-1/4 bg-blue-100"></div>
                        </div>
                        <div class="grid grid-cols-4 gap-1 flex-1">
                            <div class="bg-stone-50 border border-stone-200"></div><div class="bg-stone-50 border border-stone-200"></div>
                            <div class="bg-stone-50 border border-stone-200"></div><div class="bg-stone-50 border border-stone-200"></div>
                            <div class="bg-stone-50 border border-stone-200"></div><div class="bg-stone-50 border border-stone-200"></div>
                        </div>
                        <p class="text-[11px] text-stone-800 leading-tight effect-halation target-effect mt-2 font-bold">
                            四半期売上レポート詳細<br>数字の羅列を長時間追うと、背景の白が過剰に発光し、視界がぼやけて疲労が蓄積します。
                        </p>
                    </div>
                `
            },
            night: {
                title: "夜間・ベッドでのスマホ",
                filterColor: "bg-[#d2b48c]", // ブラウン系（コントラスト低下・ブルーライト軽減）
                filterOpacity: "opacity-50",
                lensName: "ウォームブラウン (15%)",
                standardScript: "暗い部屋でスマホの白い画面を見ると、周囲との明るさの差が激しく、<span class='talk-highlight'>光が直接目に突き刺さります</span>。これがチカチカの原因であり、睡眠の質を下げる要因とも言われています。",
                coloredScript: "この『ウォームブラウン』を通すと、<span class='talk-highlight'>スマホ画面の刺さるような光が、温かみのある柔らかい光に</span>変わります。サングラスのような抵抗感もなく、寝る前のリラックスタイムの目を守ってくれます。",
                html: `
                    <div class="w-full h-full bg-stone-900 flex items-center justify-center p-4">
                        <div class="w-40 h-36 bg-white rounded-t-xl p-3 flex flex-col gap-3 effect-bluelight target-effect">
                            <div class="w-full h-24 bg-stone-100 rounded flex items-center justify-center">
                                <p class="text-[9px] text-stone-800 effect-halation target-effect text-center px-2">
                                    SNSのタイムライン。<br>暗闇での白い背景は、<br>目に強い刺激を与えます。
                                </p>
                            </div>
                        </div>
                    </div>
                `
            },
            outdoor: {
                title: "白っぽい日差しの屋外",
                filterColor: "bg-[#71717a]", // グレー系（自然な遮光）
                filterOpacity: "opacity-30",
                lensName: "ナチュラルグレー (15%)",
                standardScript: "「サングラスをかけるほどではない」と思う曇りの日や初夏でも、<span class='talk-highlight'>アスファルトやビルの照り返しで、景色全体が白飛び</span>しています。無意識に目を細めていませんか？",
                coloredScript: "薄いグレーを入れることで、自然な見え方を保ちながら<span class='talk-highlight'>景色全体のコントラストを取り戻します</span>。眩しさで眉間にシワを寄せることもなくなり、通勤や散歩が驚くほど楽になりますよ。",
                html: `
                    <div class="w-full h-full bg-stone-100 relative overflow-hidden effect-glare target-effect">
                        <div class="absolute top-0 w-full h-1/2 bg-sky-100"></div>
                        <div class="absolute bottom-0 w-full h-1/2 bg-stone-200/80 border-t-2 border-white flex flex-col items-center pt-2">
                            <div class="w-8 h-16 bg-white mb-1"></div>
                            <p class="text-[10px] text-stone-500 font-bold tracking-widest effect-halation target-effect z-10 absolute top-1/2 -translate-y-1/2 text-center w-full">
                                照り返しによる<br>コントラストの低下
                            </p>
                        </div>
                    </div>
                `
            }
        };

        let currentScene = null;
        let isColored = false;

        // STEP1 -> STEP2 への遷移
        function selectScene(sceneId) {
            currentScene = sceneId;
            const data = sceneData[sceneId];

            // UIリセット
            document.getElementById('lens-toggle').checked = false;
            isColored = false;

            // コンテンツの注入
            document.getElementById('sim-title').innerText = data.title;
            document.getElementById('label-color').innerText = data.lensName;
            document.getElementById('simulator-canvas').innerHTML = data.html;
            
            // フィルター色の設定
            const filter = document.getElementById('lens-filter');
            filter.className = `absolute inset-0 top-8 pointer-events-none transition-opacity duration-700 mix-blend-multiply opacity-0 ${data.filterColor}`;
            filter.dataset.targetOpacity = data.filterOpacity; // カスタムデータ属性に目標透明度を保持

            // 表示の切り替え（アニメーション付き）
            document.getElementById('step-1').classList.add('hidden');
            const step2 = document.getElementById('step-2');
            step2.classList.remove('hidden');
            step2.classList.add('fade-enter');
            
            // わずかな遅延を入れてアニメーションを発火
            setTimeout(() => {
                step2.classList.add('fade-enter-active');
            }, 10);

            // 状態の更新
            updateUI();
        }

        // STEP2 -> STEP1 への戻り
        function goBack() {
            const step2 = document.getElementById('step-2');
            step2.classList.remove('fade-enter-active');
            
            setTimeout(() => {
                step2.classList.add('hidden');
                step2.classList.remove('fade-enter');
                const step1 = document.getElementById('step-1');
                step1.classList.remove('hidden');
                // 再アニメーション
                step1.classList.remove('fade-enter-active');
                setTimeout(() => step1.classList.add('fade-enter-active'), 10);
            }, 300); // フェードアウトを待つ
        }

        // トグルスイッチの切り替え処理
        function toggleLens() {
            isColored = document.getElementById('lens-toggle').checked;
            updateUI();
        }

        // 状態に応じたDOM（シミュレーションとトーク）の更新
        function updateUI() {
            const data = sceneData[currentScene];
            const filter = document.getElementById('lens-filter');
            const targetEffects = document.querySelectorAll('.target-effect');
            const scriptEl = document.getElementById('talk-script');
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            const labelStd = document.getElementById('label-standard');
            const labelCol = document.getElementById('label-color');

            // フェード効果のために一旦テキストを薄くする
            scriptEl.style.opacity = 0;

            setTimeout(() => {
                if (isColored) {
                    // --- カラーレンズ適用時 ---
                    // 1. フィルターを濃くする（色は設定済み）
                    filter.classList.remove('opacity-0');
                    filter.classList.add(filter.dataset.targetOpacity);
                    
                    // 2. チカチカ・白飛びエフェクトを無効化（眼精疲労の解消）
                    targetEffects.forEach(el => {
                        el.style.animation = 'none';
                        el.style.textShadow = 'none';
                        el.style.filter = 'none';
                        el.style.color = '#333';
                        el.style.boxShadow = 'none';
                    });

                    // 3. トークとステータス更新
                    scriptEl.innerHTML = data.coloredScript;
                    indicator.className = "w-2 h-2 rounded-full bg-emerald-400";
                    statusText.innerText = "目に優しい状態（疲労軽減）";
                    statusText.className = "text-[9px] text-emerald-600 font-bold";
                    
                    // ラベルの色変更
                    labelStd.classList.replace('text-stone-800', 'text-stone-400');
                    labelCol.classList.replace('text-stone-400', 'text-stone-800');

                } else {
                    // --- 標準レンズ（初期状態） ---
                    // 1. フィルターを消す
                    filter.classList.remove(filter.dataset.targetOpacity);
                    filter.classList.add('opacity-0');
                    
                    // 2. エフェクトを再開（CSSの定義に戻す）
                    targetEffects.forEach(el => {
                        el.style.animation = '';
                        el.style.textShadow = '';
                        el.style.filter = '';
                        el.style.color = '';
                        el.style.boxShadow = '';
                    });

                    // 3. トークとステータス更新
                    scriptEl.innerHTML = data.standardScript;
                    indicator.className = "w-2 h-2 rounded-full bg-red-400 animate-pulse";
                    statusText.innerText = "疲労蓄積中...";
                    statusText.className = "text-[9px] text-red-500 font-bold";

                    // ラベルの色変更
                    labelStd.classList.replace('text-stone-400', 'text-stone-800');
                    labelCol.classList.replace('text-stone-800', 'text-stone-400');
                }
                
                // テキストを再度フェードイン
                scriptEl.style.opacity = 1;
            }, 300); // 0.3秒待ってからテキストを書き換え、フェードイン
        }
    </script>
</body>
</html>
