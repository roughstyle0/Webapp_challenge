<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>インディビジュアルレンズ 究極の視界シミュレーター</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            atelierBlack: "#05070B",
            deepNavy: "#08111F",
            suitNavy: "#101B2D",
            platinum: "#D9E1EA",
            platinumBright: "#F5F8FB",
            silverLine: "#9CA8B5",
            champagne: "#C8B78E"
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --black: #05070b;
      --deep: #08111f;
      --navy: #101b2d;
      --platinum: #d9e1ea;
      --platinum-bright: #f5f8fb;
      --silver: #9ca8b5;
      --champagne: #c8b78e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--platinum-bright);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(217, 225, 234, 0.16), transparent 24rem),
        radial-gradient(circle at 100% 30%, rgba(200, 183, 142, 0.10), transparent 28rem),
        linear-gradient(135deg, #03050a 0%, #08111f 48%, #0d1524 100%);
    }

    button {
      font: inherit;
    }

    .precision-bg {
      background-image:
        linear-gradient(rgba(217,225,234,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(217,225,234,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .atelier-shell {
      border: 1px solid rgba(217, 225, 234, 0.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.025)),
        linear-gradient(135deg, rgba(8,17,31,0.98), rgba(5,7,11,0.98));
      box-shadow:
        0 28px 80px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(245,248,251,0.08);
    }

    .tailor-rail {
      border-bottom: 1px solid rgba(217,225,234,0.16);
      background:
        linear-gradient(90deg, rgba(5,7,11,0.92), rgba(16,27,45,0.92), rgba(5,7,11,0.92));
    }

    .micro-label {
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .concern-button {
      border: 1px solid rgba(217,225,234,0.20);
      background:
        linear-gradient(135deg, rgba(217,225,234,0.105), rgba(217,225,234,0.025)),
        linear-gradient(135deg, rgba(16,27,45,0.92), rgba(5,7,11,0.94));
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .concern-button:hover,
    .concern-button:focus-visible {
      transform: translateY(-2px);
      outline: none;
      border-color: rgba(245,248,251,0.86);
      box-shadow: 0 18px 42px rgba(0,0,0,0.26), 0 0 0 4px rgba(217,225,234,0.08);
    }

    .concern-button.active {
      border-color: rgba(245,248,251,0.95);
      box-shadow: 0 0 0 4px rgba(217,225,234,0.12);
    }

    .mode-button {
      border: 1px solid rgba(217,225,234,0.18);
      background: rgba(245,248,251,0.055);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .mode-button:hover,
    .mode-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
      border-color: rgba(245,248,251,0.8);
    }

    .mode-button.active {
      color: #05070b;
      border-color: rgba(245,248,251,1);
      background: linear-gradient(135deg, #ffffff, #c9d3de 52%, #8f9cab);
      box-shadow: 0 16px 38px rgba(217,225,234,0.18);
    }

    .simulation-stage {
      border: 1px solid rgba(217,225,234,0.20);
      background:
        linear-gradient(180deg, rgba(245,248,251,0.08), rgba(245,248,251,0.025)),
        linear-gradient(135deg, #0b1423, #04070c);
    }

    .viewport-frame {
      border: 1px solid rgba(217,225,234,0.28);
      background:
        linear-gradient(135deg, rgba(217,225,234,0.09), rgba(217,225,234,0.025)),
        radial-gradient(circle at center, rgba(217,225,234,0.10), transparent 66%);
      box-shadow:
        inset 0 0 0 1px rgba(245,248,251,0.05),
        inset 0 0 38px rgba(0,0,0,0.42);
    }

    .view-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(4.5rem, 1fr));
      gap: 0.55rem;
      width: 100%;
    }

    .view-tile {
      min-height: 4.5rem;
      border: 1px solid rgba(217,225,234,0.14);
      border-radius: 1.1rem;
      background:
        linear-gradient(135deg, rgba(245,248,251,0.14), rgba(245,248,251,0.025)),
        repeating-linear-gradient(90deg, rgba(217,225,234,0.18) 0 1px, transparent 1px 16px),
        repeating-linear-gradient(0deg, rgba(217,225,234,0.14) 0 1px, transparent 1px 16px),
        linear-gradient(135deg, rgba(16,27,45,0.96), rgba(5,7,11,0.96));
      transition:
        filter 800ms ease,
        transform 800ms cubic-bezier(.2,.9,.2,1),
        opacity 800ms ease,
        border-color 800ms ease,
        background 800ms ease;
      display: grid;
      place-items: center;
      padding: 0.7rem;
    }

    .view-tile span {
      color: rgba(245,248,251,0.72);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-align: center;
      text-transform: uppercase;
    }

    .view-center {
      border-color: rgba(245,248,251,0.64);
      background:
        linear-gradient(135deg, rgba(245,248,251,0.22), rgba(217,225,234,0.08)),
        repeating-linear-gradient(90deg, rgba(245,248,251,0.28) 0 1px, transparent 1px 16px),
        repeating-linear-gradient(0deg, rgba(245,248,251,0.22) 0 1px, transparent 1px 16px),
        linear-gradient(135deg, rgba(18,31,50,0.98), rgba(7,12,20,0.98));
      box-shadow: inset 0 0 24px rgba(245,248,251,0.08);
    }

    .mode-standard .view-edge {
      filter: blur(2.3px);
      opacity: 0.52;
      border-color: rgba(217,225,234,0.10);
    }

    .mode-standard .view-corner {
      filter: blur(3.2px);
      opacity: 0.44;
    }

    .mode-standard .edge-left {
      transform: skewY(7deg) scale(0.96);
    }

    .mode-standard .edge-right {
      transform: skewY(-7deg) scale(0.96);
    }

    .mode-standard .edge-top {
      transform: skewX(-7deg) translateY(0.18rem);
    }

    .mode-standard .edge-bottom {
      transform: skewX(7deg) translateY(-0.18rem);
    }

    .mode-standard .corner-a {
      transform: skew(8deg, -5deg) rotate(-1deg) scale(0.94);
    }

    .mode-standard .corner-b {
      transform: skew(-8deg, 5deg) rotate(1deg) scale(0.94);
    }

    .mode-individual .view-tile {
      filter: blur(0);
      transform: none;
      opacity: 1;
      border-color: rgba(217,225,234,0.42);
      background:
        linear-gradient(135deg, rgba(245,248,251,0.21), rgba(217,225,234,0.055)),
        repeating-linear-gradient(90deg, rgba(245,248,251,0.23) 0 1px, transparent 1px 16px),
        repeating-linear-gradient(0deg, rgba(245,248,251,0.20) 0 1px, transparent 1px 16px),
        linear-gradient(135deg, rgba(18,31,50,0.98), rgba(7,12,20,0.98));
    }

    .mode-individual .view-edge,
    .mode-individual .view-corner {
      animation: edgeToEdge 900ms ease both;
    }

    @keyframes edgeToEdge {
      0% {
        filter: blur(2.8px);
        opacity: 0.48;
        transform: skewX(7deg) scale(0.96);
      }
      65% {
        filter: blur(0.4px);
        opacity: 0.9;
        transform: skewX(0deg) scale(1.01);
      }
      100% {
        filter: blur(0);
        opacity: 1;
        transform: none;
      }
    }

    .lens-outline {
      display: grid;
      gap: 0.8rem;
    }

    .lens-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.45rem;
    }

    .lens-shape {
      min-height: 5.4rem;
      border: 0.22rem solid rgba(217,225,234,0.62);
      border-radius: 1.35rem 1.35rem 1.6rem 1.6rem;
      background:
        linear-gradient(135deg, rgba(245,248,251,0.24), rgba(245,248,251,0.035)),
        rgba(12,22,36,0.64);
      transition: border-color 700ms ease, box-shadow 700ms ease, filter 700ms ease;
      display: grid;
      place-items: center;
      padding: 0.7rem;
      text-align: center;
    }

    .lens-shape span {
      color: rgba(245,248,251,0.78);
      font-size: 0.74rem;
      font-weight: 900;
      line-height: 1.5;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lens-bridge {
      width: 1.7rem;
      height: 0.48rem;
      border-top: 0.22rem solid rgba(217,225,234,0.62);
      border-radius: 999px;
    }

    .mode-standard .lens-shape {
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.4));
    }

    .mode-individual .lens-shape {
      border-color: rgba(245,248,251,0.96);
      box-shadow:
        0 0 0 1px rgba(245,248,251,0.18),
        0 0 30px rgba(217,225,234,0.22),
        inset 0 0 26px rgba(245,248,251,0.09);
    }

    .metric-card {
      border: 1px solid rgba(217,225,234,0.15);
      background: rgba(245,248,251,0.055);
    }

    .script-card {
      border: 1px solid rgba(217,225,234,0.26);
      background:
        linear-gradient(135deg, rgba(217,225,234,0.16), rgba(200,183,142,0.045)),
        rgba(5,7,11,0.74);
    }

    .step-card {
      border: 1px solid rgba(217,225,234,0.15);
      background: rgba(245,248,251,0.052);
    }

    .error-box {
      border: 1px solid rgba(239,68,68,0.52);
      background: rgba(127,29,29,0.24);
      color: #fecaca;
    }

    .success-box {
      border: 1px solid rgba(217,225,234,0.36);
      background: rgba(217,225,234,0.12);
      color: var(--platinum-bright);
    }

    @media (max-width: 420px) {
      .view-grid {
        grid-template-rows: repeat(3, minmax(3.8rem, 1fr));
        gap: 0.42rem;
      }

      .view-tile {
        min-height: 3.8rem;
        border-radius: 0.9rem;
        padding: 0.45rem;
      }

      .view-tile span {
        font-size: 0.62rem;
      }

      .lens-shape {
        min-height: 4.7rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

<body>

    <div class="mx-auto grid w-full max-w-6xl gap-5">
      <header class="atelier-shell overflow-hidden rounded-[2rem]">
        <div class="tailor-rail grid grid-cols-3 gap-2 px-5 py-3 text-[0.62rem] font-black micro-label text-platinum/72">

        <section class="grid gap-6 p-5 sm:p-7">

    </div>
  </main>

            ["設計", "個別最適"],
            ["特別感", "最高級"],
            ["満足軸", "所有感まで満たす"]
          ],
          steps: [
            "選んだフレームで装用状態を測る",
            "目の位置と角度をミリ単位で反映する",
            "お客様専用の設計データを作る",
            "そのデータに合わせてレンズを仕立てる"
          ],
          talks: [
            { tag: "比喩", text: "標準レンズが『S・M・Lの既製服』だとしたら、こちらはお客様の顔に合わせて仕立てる『オーダースーツ』です。" },
            { tag: "精密さ", text: "フレームの傾きや目からの距離をミリ単位で計算し、あなただけの専用レンズを削り出します。" },
            { tag: "締め", text: "どうせ買うなら最高のものを、という方にこそ、見え方だけでなく所有する満足感までご提案できます。" }
          ]
        }
      }
    };

    const state = {
      concernKey: null,
      mode: null,
      talkIndex: 0
    };

    const $ = (selector) => document.querySelector(selector);

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getConcern() {
      return concerns[state.concernKey] || null;
    }

    function getModeData() {
      const concern = getConcern();
      if (!concern || !state.mode || !concern[state.mode]) return null;
      return concern[state.mode];
    }

    function showMessage(message, type = "error") {
      const area = $("#messageArea");
      area.textContent = message;
      area.className = "rounded-2xl p-4 text-sm font-bold";
      area.classList.add(type === "success" ? "success-box" : "error-box");
      area.classList.remove("hidden");

      if (type === "success") {
        window.setTimeout(() => area.classList.add("hidden"), 1800);
      }
    }

    function clearMessage() {
      const area = $("#messageArea");
      area.textContent = "";
      area.className = "hidden rounded-2xl p-4 text-sm font-bold";
    }

    function renderConcernButtons() {
      const wrapper = $("#concernButtons");

      wrapper.innerHTML = Object.entries(concerns).map(([key, item]) => {
        const active = state.concernKey === key ? "active" : "";
        return `
          <button
            type="button"
            class="concern-button ${active} grid min-h-[9.25rem] gap-3 rounded-[1.6rem] p-4 text-left"
            data-concern="${escapeHtml(key)}"
            aria-pressed="${state.concernKey === key}"
          >
            <span class="grid grid-cols-[auto_1fr] items-center gap-3">
              <span class="grid h-12 w-12 place-items-center rounded-2xl border border-platinum/20 bg-black/30 text-2xl font-black text-platinum">
                ${escapeHtml(item.icon)}
              </span>
              <span class="grid gap-1">
                <span class="text-lg font-black text-platinumBright">${escapeHtml(item.label)}</span>
                <span class="text-[0.65rem] font-black micro-label text-champagne">Concern</span>
              </span>
            </span>
            <span class="text-sm leading-6 text-platinum/74">${escapeHtml(item.short)}</span>
          </button>
        `;
      }).join("");
    }

    function renderExperience() {
      const experience = $("#experience");
      const concern = getConcern();

      if (!concern) {
        experience.classList.add("hidden");
        experience.innerHTML = "";
        return;
      }

      const modeData = getModeData();

      experience.classList.remove("hidden");
      experience.innerHTML = `
        <section class="atelier-shell grid gap-5 rounded-[2rem] p-5 sm:p-7">
          <div class="grid gap-4">
            <button
              type="button"
              data-reset-all
              class="w-fit rounded-full border border-platinum/20 bg-white/5 px-4 py-2 text-xs font-black text-platinum transition hover:border-platinumBright hover:bg-white/10"
            >
              ← 悩みを選び直す
            </button>

            <div class="grid gap-3 rounded-[1.5rem] border border-platinum/18 bg-black/22 p-4">
              <div class="grid grid-cols-[auto_1fr] gap-3">
                <div class="grid h-14 w-14 place-items-center rounded-2xl border border-platinum/20 bg-white/8 text-2xl font-black text-platinum">
                  ${escapeHtml(concern.icon)}
                </div>
                <div class="grid gap-1">
                  <p class="text-xs font-black micro-label text-champagne">Selected Concern</p>
                  <h2 class="text-2xl font-black text-platinumBright">${escapeHtml(concern.short)}</h2>
                </div>
              </div>
              <p class="text-sm leading-7 text-platinum/70">
                お客様の言葉：<span class="font-black text-platinumBright">「${escapeHtml(concern.customerWords)}」</span>
              </p>
              <p class="text-sm leading-7 text-platinum/62">${escapeHtml(concern.whyItMatters)}</p>
            </div>
          </div>

          <section class="grid gap-3" aria-label="レンズ種類選択">
            <p class="text-sm font-black text-platinumBright">次に、比較するレンズを選んでください</p>
            <div class="grid gap-3 sm:grid-cols-2">
              ${renderModeButton("standard", "標準レンズ（既製品）", "中心はクリア、周辺に歪みが残る状態を見る")}
              ${renderModeButton("individual", "フルオーダーメイドレンズ", "周辺までスゥーッと整う視界を見る")}
            </div>
          </section>
        </section>

        ${modeData ? renderSimulation(concern, modeData) : renderModePrompt()}
      `;
    }

    function renderModeButton(mode, title, sub) {
      const active = state.mode === mode ? "active" : "";
      const subColor = state.mode === mode ? "text-black/72" : "text-platinum/60";

      return `
        <button
          type="button"
          data-mode="${escapeHtml(mode)}"
          class="mode-button ${active} grid gap-1 rounded-2xl p-4 text-left"
          aria-pressed="${state.mode === mode}"
        >
          <span class="text-base font-black">${escapeHtml(title)}</span>
          <span class="text-xs leading-5 ${subColor}">${escapeHtml(sub)}</span>
        </button>
      `;
    }

    function renderModePrompt() {
      return `
        <section class="atelier-shell rounded-[2rem] p-5 sm:p-7">
          <div class="grid gap-3 rounded-[1.5rem] border border-dashed border-platinum/26 bg-white/5 p-5 text-center">
            <p class="text-4xl">◈</p>
            <h3 class="text-xl font-black text-platinumBright">レンズを選ぶと、視界シミュレーションが始まります</h3>
            <p class="text-sm leading-7 text-platinum/62">
              標準レンズでは周辺部の歪みを、フルオーダーメイドではEdge to Edgeのクリアさを表現します。
            </p>
          </div>
        </section>
      `;
    }

    function renderSimulation(concern, modeData) {
      const modeClass = state.mode === "individual" ? "mode-individual" : "mode-standard";
      const modeName = state.mode === "individual" ? "フルオーダーメイドレンズ" : "標準レンズ";
      const talk = modeData.talks[state.talkIndex] || modeData.talks[0];
      const isLastTalk = state.talkIndex >= modeData.talks.length - 1;
      const progress = Math.round(((state.talkIndex + 1) / modeData.talks.length) * 100);

      return `
        <section id="simulationTop" class="grid gap-5">
          <section class="simulation-stage ${modeClass} grid gap-5 rounded-[2rem] p-5 sm:p-7">
            <div class="grid gap-3 lg:grid-cols-[1fr_auto] lg:items-start">
              <div class="grid gap-1">
                <p class="text-xs font-black micro-label text-champagne">${escapeHtml(modeName)} Simulation</p>
                <h3 class="text-2xl font-black text-platinumBright">${escapeHtml(modeData.title)}</h3>
                <p class="text-sm leading-7 text-platinum/70">${escapeHtml(modeData.result)}</p>
              </div>

              <button
                type="button"
                data-replay
                class="rounded-full border border-platinum/35 bg-white/8 px-4 py-2 text-sm font-black text-platinumBright transition hover:border-platinumBright hover:bg-white/12"
              >
                視界変化を再生
              </button>
            </div>

            <div class="grid gap-4 lg:grid-cols-[1.25fr_0.75fr] lg:items-stretch">
              <div class="viewport-frame grid gap-4 rounded-[1.6rem] p-4">
                <div class="grid gap-2">
                  <p class="text-xs font-black micro-label text-champagne">Optical Field</p>
                  <h4 class="text-xl font-black text-platinumBright">視界の歪み補正シミュレーション</h4>
                  <p class="text-sm leading-7 text-platinum/62">
                    文字ではなく、専用の視界ブロックで「中心」と「周辺部」の差を表現しています。
                  </p>
                </div>

                <div class="view-grid" aria-label="視界の中心と周辺部の見え方">
                  <div class="view-tile view-corner corner-a"><span>Edge</span></div>
                  <div class="view-tile view-edge edge-top"><span>Upper Field</span></div>
                  <div class="view-tile view-corner corner-b"><span>Edge</span></div>

                  <div class="view-tile view-edge edge-left"><span>Side Field</span></div>
                  <div class="view-tile view-center"><span>Center Clear</span></div>
                  <div class="view-tile view-edge edge-right"><span>Side Field</span></div>

                  <div class="view-tile view-corner corner-b"><span>Edge</span></div>
                  <div class="view-tile view-edge edge-bottom"><span>Lower Field</span></div>
                  <div class="view-tile view-corner corner-a"><span>Edge</span></div>
                </div>
              </div>

              <aside class="grid content-start gap-4 rounded-[1.6rem] border border-platinum/18 bg-black/22 p-4">
                <div class="lens-outline rounded-[1.4rem] border border-platinum/16 bg-white/5 p-4">
                  <p class="text-xs font-black micro-label text-champagne">Lens Blueprint</p>
                  <div class="lens-row">
                    <div class="lens-shape"><span>Left<br>Lens</span></div>
                    <div class="lens-bridge" aria-hidden="true"></div>
                    <div class="lens-shape"><span>Right<br>Lens</span></div>
                  </div>
                  <p class="text-center text-xs font-bold leading-5 text-platinum/58">
                    ${state.mode === "individual"
                      ? "装用位置を反映した専用設計。周辺まで整った視界へ。"
                      : "平均的な条件で作る標準設計。中心はクリアでも周辺に差が出やすい。"
                    }
                  </p>
                </div>

                <div class="grid gap-3">
                  <p class="text-xs font-black micro-label text-champagne">Precision Metrics</p>
                  ${modeData.metrics.map(([label, value]) => `
                    <div class="metric-card grid grid-cols-[1fr_auto] items-center gap-3 rounded-2xl p-3">
                      <span class="text-sm font-bold text-platinum/66">${escapeHtml(label)}</span>
                      <span class="rounded-full bg-white/10 px-3 py-1 text-xs font-black text-platinumBright">${escapeHtml(value)}</span>
                    </div>
                  `).join("")}
                </div>

                <div class="rounded-2xl border border-platinum/16 bg-white/5 p-4">
                  <p class="text-xs font-black micro-label text-champagne">Customer Focus</p>
                  <p class="mt-2 text-sm font-black leading-6 text-platinumBright">${escapeHtml(concern.focusTarget)}</p>
                  <p class="mt-2 text-sm leading-6 text-platinum/62">${escapeHtml(modeData.clarity)}</p>
                </div>
              </aside>
            </div>
          </section>

          <section class="atelier-shell grid gap-5 rounded-[2rem] p-5 sm:p-7">
            <div class="grid gap-2">
              <p class="text-xs font-black micro-label text-champagne">Fitting Flow</p>
              <h3 class="text-2xl font-black text-platinumBright">お客様に伝える視界の変化ステップ</h3>
            </div>

            <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
              ${modeData.steps.map((step, index) => `
                <div class="step-card grid gap-3 rounded-2xl p-4">
                  <span class="grid h-9 w-9 place-items-center rounded-full bg-platinumBright text-sm font-black text-atelierBlack">
                    ${index + 1}
                  </span>
                  <p class="text-sm font-bold leading-6 text-platinum/84">${escapeHtml(step)}</p>
                </div>
              `).join("")}
            </div>
          </section>

          <section class="script-card grid gap-5 rounded-[2rem] p-5 sm:p-7">
            <div class="grid gap-2">
              <p class="text-xs font-black micro-label text-champagne">Staff Script</p>
              <h3 class="text-2xl font-black text-platinumBright">新人スタッフ用・接客トークスクリプト</h3>
              <p class="text-sm leading-7 text-platinum/66">
                そのまま読み上げられるカンペです。特別感と精密さが伝わる順番で表示します。
              </p>
            </div>

            <div class="grid gap-4 rounded-[1.5rem] border border-platinum/22 bg-black/24 p-4">
              <div class="grid gap-3">
                <div class="flex flex-wrap items-center gap-2">
                  <span class="rounded-full bg-platinumBright px-3 py-1 text-xs font-black text-atelierBlack">
                    ${escapeHtml(talk.tag)}
                  </span>
                  <span class="text-xs font-bold text-platinum/54">STEP ${state.talkIndex + 1} / ${modeData.talks.length}</span>
                </div>

                <p id="talkText" class="text-xl font-black leading-9 text-platinumBright sm:text-2xl">
                  「${escapeHtml(talk.text)}」
                </p>
              </div>

              <div class="h-2 overflow-hidden rounded-full bg-white/10" aria-label="トーク進行度">
                <div class="h-full rounded-full bg-platinumBright transition-all" style="width:${progress}%"></div>
              </div>

              <div class="grid gap-3 sm:grid-cols-3">
                <button
                  type="button"
                  data-next-talk
                  class="rounded-2xl bg-platinumBright px-4 py-3 text-sm font-black text-atelierBlack transition hover:bg-white disabled:cursor-not-allowed disabled:opacity-45"
                  ${isLastTalk ? "disabled" : ""}
                >
                  ${isLastTalk ? "最後のトークです" : "次のトークを表示"}
                </button>
                <button
                  type="button"
                  data-reset-talk
                  class="rounded-2xl border border-platinum/24 bg-white/5 px-4 py-3 text-sm font-black text-platinumBright transition hover:border-platinumBright hover:bg-white/10"
                >
                  トークを最初に戻す
                </button>
                <button
                  type="button"
                  data-copy-talk
                  class="rounded-2xl border border-platinum/24 bg-white/5 px-4 py-3 text-sm font-black text-platinumBright transition hover:border-platinumBright hover:bg-white/10"
                >
                  今の一言をコピー
                </button>
              </div>
            </div>
          </section>
        </section>
      `;
    }

    function selectConcern(key) {
      if (!concerns[key]) {
        showMessage("選択した悩みを読み込めませんでした。もう一度選び直してください。");
        return;
      }

      clearMessage();
      state.concernKey = key;
      state.mode = null;
      state.talkIndex = 0;
      renderConcernButtons();
      renderExperience();

      requestAnimationFrame(() => {
        $("#experience")?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    function selectMode(mode) {
      if (!["standard", "individual"].includes(mode)) {
        showMessage("レンズ種類を読み込めませんでした。標準レンズ、またはフルオーダーメイドレンズを選んでください。");
        return;
      }

      if (!getConcern()) {
        showMessage("先にお客様の悩みを選択してください。");
        return;
      }

      clearMessage();
      state.mode = mode;
      state.talkIndex = 0;
      renderConcernButtons();
      renderExperience();

      requestAnimationFrame(() => {
        $("#simulationTop")?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    function nextTalk() {
      const data = getModeData();
      if (!data) {
        showMessage("接客トークを表示できませんでした。レンズ種類を選び直してください。");
        return;
      }

      state.talkIndex = Math.min(state.talkIndex + 1, data.talks.length - 1);
      renderExperience();
    }

    function resetTalk() {
      state.talkIndex = 0;
      renderExperience();
    }

    function replayView() {
      const mode = state.mode;
      if (!mode) return;

      const stage = document.querySelector(".simulation-stage");
      if (!stage) return;

      const modeClass = mode === "individual" ? "mode-individual" : "mode-standard";
      stage.classList.remove(modeClass);
      void stage.offsetWidth;
      stage.classList.add(modeClass);
    }

    async function copyTalk() {
      const text = $("#talkText")?.textContent?.trim();

      if (!text) {
        showMessage("コピーできるトークが見つかりませんでした。");
        return;
      }

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
        }
        showMessage("接客トークをコピーしました。", "success");
      } catch (error) {
        showMessage("ブラウザ設定によりコピーできませんでした。トーク文を長押しして手動でコピーしてください。");
      }
    }

    function resetAll() {
      state.concernKey = null;
      state.mode = null;
      state.talkIndex = 0;
      clearMessage();
      renderConcernButtons();
      renderExperience();

      requestAnimationFrame(() => {
        document.querySelector("header")?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    function bindEvents() {
      document.addEventListener("click", (event) => {
        const concernButton = event.target.closest("[data-concern]");
        const modeButton = event.target.closest("[data-mode]");

        if (concernButton) selectConcern(concernButton.dataset.concern);
        if (modeButton) selectMode(modeButton.dataset.mode);
        if (event.target.closest("[data-next-talk]")) nextTalk();
        if (event.target.closest("[data-reset-talk]")) resetTalk();
        if (event.target.closest("[data-copy-talk]")) copyTalk();
        if (event.target.closest("[data-replay]")) replayView();
        if (event.target.closest("[data-reset-all]")) resetAll();
      });
    }

    function init() {
      try {
        renderConcernButtons();
        renderExperience();
        bindEvents();
      } catch (error) {
        console.error(error);
        showMessage("アプリの初期化中に問題が発生しました。ページを再読み込みしてください。");
      }
    }

    init();
  </script>
</body>
</html>
