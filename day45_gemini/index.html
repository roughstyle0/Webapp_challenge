<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPTICAL DAMAGE SCANNER</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            blue: '#00f3ff',
                            green: '#39ff14',
                            red: '#ff003c',
                            orange: '#ff9900',
                            dark: '#050505',
                        }
                    },
                    fontFamily: {
                        mono: ['"Courier New"', 'Courier', 'monospace', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Cyberpunk UI Elements */
        body { background-color: #050505; color: #fff; }
        .cyber-border {
            position: relative;
            border: 1px solid #333;
        }
        .cyber-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border-color: theme('colors.neon.blue');
        }
        .corner-tl { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
        .corner-tr { top: -1px; right: -1px; border-top: 2px solid; border-right: 2px solid; }
        .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid; border-left: 2px solid; }
        .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }
        
        .glow-text-blue { text-shadow: 0 0 8px theme('colors.neon.blue'); }
        
        /* Custom Scrollbar for Script Box */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: theme('colors.neon.blue'); }

        /* --- SVG Animations (Core Simulation Engine) --- */
        /* Duration is synced to 2 seconds for perfect choreography */
        
        /* Incoming blue light (0% to 50%) */
        .beam-in {
            stroke-dasharray: 20 200;
            animation: shoot-in 2s linear infinite;
        }
        @keyframes shoot-in {
            0% { stroke-dashoffset: 220; }
            50% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 0; }
        }

        /* Standard Lens: Penetrating red light (50% to 80%) */
        .beam-out-std {
            stroke-dasharray: 20 200;
            animation: shoot-out-std 2s linear infinite;
        }
        @keyframes shoot-out-std {
            0%, 49% { stroke-dashoffset: 220; opacity: 0; }
            50% { stroke-dashoffset: 220; opacity: 1; }
            80% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /* PC Lens: Bouncing blue light (50% to 70%) */
        .beam-bounce {
            stroke-dasharray: 20 150;
            animation: shoot-bounce 2s linear infinite;
        }
        @keyframes shoot-bounce {
            0%, 49% { stroke-dashoffset: 100; opacity: 0; }
            50% { stroke-dashoffset: 100; opacity: 1; }
            70% { stroke-dashoffset: -20; opacity: 1; }
            100% { stroke-dashoffset: -20; opacity: 0; }
        }

        /* Eye Damage Flash (Starts at 80% when light hits eye) */
        .eye-damage {
            animation: flash-red 2s linear infinite;
        }
        @keyframes flash-red {
            0%, 79% { opacity: 0; fill: #ff003c; }
            80% { opacity: 0.8; fill: #ff003c; }
            90% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Shield Collision Flash (Starts at 50% when light hits lens) */
        .shield-glow {
            animation: flash-shield 2s linear infinite;
        }
        @keyframes flash-shield {
            0%, 49% { opacity: 0; }
            50% { opacity: 1; }
            65% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Alert Background Pulse */
        .bg-alert-pulse {
            animation: alert-pulse 2s infinite;
        }
        @keyframes alert-pulse {
            0%, 100% { background-color: rgba(255, 0, 60, 0); }
            50% { background-color: rgba(255, 0, 60, 0.1); }
        }
    </style>
</head>
<body class="font-mono p-2 md:p-6 min-h-screen flex flex-col items-center">

    <!-- Global System Error Alert (Hidden by default) -->
    <div id="system-error" class="hidden w-full max-w-4xl border border-neon-red bg-red-900/20 text-neon-red p-4 mb-4 text-sm tracking-widest relative">
        <span class="font-bold mr-2">[SYSTEM ERROR]</span> <span id="error-msg"></span>
        <button onclick="document.getElementById('system-error').classList.add('hidden')" class="absolute top-4 right-4 text-neon-red hover:text-white">X</button>
    </div>

    <!-- Main HUD Container -->
    <main class="w-full max-w-4xl cyber-border bg-[#020202] p-4 md:p-8 flex-grow flex flex-col">
        <!-- Cyber Corners -->
        <div class="cyber-corner corner-tl"></div>
        <div class="cyber-corner corner-tr"></div>
        <div class="cyber-corner corner-bl"></div>
        <div class="cyber-corner corner-br"></div>

        <!-- Header -->
        <header class="flex justify-between items-end border-b border-gray-800 pb-4 mb-8">
            <div>
                <h1 class="text-xl md:text-3xl font-bold text-neon-blue glow-text-blue tracking-widest">OPTICAL DAMAGE SCANNER</h1>
                <p class="text-xs md:text-sm text-gray-500 mt-1">v2.0.4 // LENS SIMULATION PROTOCOL</p>
            </div>
            <div id="status-indicator" class="text-xs text-neon-blue animate-pulse">
                STATUS: WAITING_INPUT
            </div>
        </header>

        <!-- Input Section -->
        <section id="input-section" class="w-full mb-8">
            <h2 class="text-sm text-gray-400 mb-4 tracking-widest border-l-2 border-neon-blue pl-2">SELECT DAILY DEVICE USAGE</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="startScan('light')" class="scan-btn relative w-full border border-gray-700 bg-black text-gray-300 py-4 px-4 hover:border-neon-blue hover:text-neon-blue transition-all group overflow-hidden text-left">
                    <span class="block text-xs mb-1 opacity-60">LEVEL 1</span>
                    <span class="block font-bold tracking-wider">UNDER 3 HOURS</span>
                    <div class="absolute inset-0 bg-neon-blue opacity-0 group-hover:opacity-10 transition-opacity"></div>
                </button>
                <button onclick="startScan('medium')" class="scan-btn relative w-full border border-gray-700 bg-black text-gray-300 py-4 px-4 hover:border-neon-orange hover:text-neon-orange transition-all group overflow-hidden text-left">
                    <span class="block text-xs mb-1 opacity-60">LEVEL 2</span>
                    <span class="block font-bold tracking-wider">3 - 7 HOURS</span>
                    <div class="absolute inset-0 bg-neon-orange opacity-0 group-hover:opacity-10 transition-opacity"></div>
                </button>
                <button onclick="startScan('heavy')" class="scan-btn relative w-full border border-gray-700 bg-black text-gray-300 py-4 px-4 hover:border-neon-red hover:text-neon-red transition-all group overflow-hidden text-left">
                    <span class="block text-xs mb-1 opacity-60">LEVEL 3</span>
                    <span class="block font-bold tracking-wider">OVER 7 HOURS</span>
                    <div class="absolute inset-0 bg-neon-red opacity-0 group-hover:opacity-10 transition-opacity"></div>
                </button>
            </div>
        </section>

        <!-- Scanning Progress -->
        <section id="scan-progress" class="hidden w-full my-8">
            <div class="flex justify-between text-xs mb-2">
                <span class="text-neon-blue font-bold tracking-widest animate-pulse">EXECUTING RETINAL SCAN...</span>
                <span id="progress-text" class="text-neon-blue">0%</span>
            </div>
            <div class="w-full border border-neon-blue h-4 p-[2px] bg-black">
                <div id="scan-bar" class="h-full bg-neon-blue w-0 transition-all duration-[1500ms] ease-out shadow-[0_0_10px_#00f3ff]"></div>
            </div>
        </section>

        <!-- Results Section -->
        <section id="result-section" class="hidden flex-col gap-8 opacity-0 transition-opacity duration-1000">
            
            <!-- Damage Meter -->
            <div class="text-center cyber-border p-6 bg-[#0a0a0a] relative overflow-hidden" id="damage-container">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gray-600 to-transparent opacity-30"></div>
                <div class="text-gray-500 text-xs tracking-widest mb-2">ACCUMULATED OPTICAL DAMAGE</div>
                <div id="damage-value" class="text-6xl md:text-8xl font-bold tracking-tighter" style="text-shadow: 0 0 15px currentColor;">00%</div>
                <div id="damage-alert" class="text-xs mt-2 tracking-widest"></div>
            </div>

            <!-- Lens Simulation (SVG Core) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                <!-- Standard Lens -->
                <div class="cyber-border p-2 bg-black relative">
                    <div class="absolute top-2 left-2 bg-[#111] px-2 py-1 text-[10px] text-gray-400 border border-gray-700 z-10">STANDARD LENS</div>
                    <svg viewBox="0 0 200 100" class="w-full h-auto block">
                        <!-- Eye Structure -->
                        <path d="M150 50 Q 170 30 190 50 Q 170 70 150 50 Z" stroke="#555" fill="none" stroke-width="1.5" />
                        <circle cx="170" cy="50" r="5" stroke="#555" fill="none" />
                        <!-- Damage Flash -->
                        <circle cx="170" cy="50" r="12" fill="#ff003c" class="eye-damage" />
                        <!-- Basic Lens -->
                        <path d="M120 10 Q 110 50 120 90" stroke="#444" stroke-width="2" fill="none" />
                        
                        <!-- Light Rays -->
                        <!-- Input -->
                        <path d="M 0 50 L 120 50" stroke="#00f3ff" stroke-width="2" fill="none" class="beam-in" />
                        <!-- Penetration (Harmful Red) -->
                        <path d="M 120 50 L 170 50" stroke="#ff003c" stroke-width="2" fill="none" class="beam-out-std" />
                    </svg>
                </div>

                <!-- Shield PC Lens -->
                <div id="shield-container" class="cyber-border p-2 bg-black relative transition-all duration-500">
                    <div class="absolute top-2 left-2 bg-neon-dark px-2 py-1 text-[10px] text-neon-blue border border-neon-blue z-10 glow-text-blue">HIGH-SPEC PC LENS</div>
                    <svg viewBox="0 0 200 100" class="w-full h-auto block">
                        <!-- Protected Eye -->
                        <path d="M150 50 Q 170 30 190 50 Q 170 70 150 50 Z" stroke="#39ff14" fill="none" stroke-width="1.5" />
                        <circle cx="170" cy="50" r="5" stroke="#39ff14" fill="none" />
                        <!-- Shield Lens -->
                        <path d="M120 10 Q 110 50 120 90" stroke="#00f3ff" stroke-width="3" fill="none" style="filter: drop-shadow(0 0 4px #00f3ff);" />
                        <!-- Shield Collision Flash -->
                        <path d="M120 10 Q 110 50 120 90" stroke="#00f3ff" stroke-width="6" fill="none" class="shield-glow" />
                        
                        <!-- Light Rays -->
                        <!-- Input -->
                        <path d="M 0 50 L 120 50" stroke="#00f3ff" stroke-width="2" fill="none" class="beam-in" />
                        <!-- Reflection 1 -->
                        <path d="M 120 50 L 70 15" stroke="#00f3ff" stroke-width="2" fill="none" class="beam-bounce" />
                        <!-- Reflection 2 -->
                        <path d="M 120 50 L 70 85" stroke="#00f3ff" stroke-width="2" fill="none" class="beam-bounce" />
                    </svg>
                </div>
            </div>

            <!-- AI Recommendation Script -->
            <div class="cyber-border p-4 bg-[#050505] relative min-h-[8rem]">
                <div class="absolute -top-3 left-4 bg-black px-2 text-neon-blue text-[10px] border border-neon-blue tracking-widest">AI SUGGESTION SCRIPT</div>
                <div class="absolute top-2 right-2 flex space-x-1">
                    <div class="w-2 h-2 bg-neon-blue animate-ping"></div>
                </div>
                <!-- Typwriter Output -->
                <p id="script-output" class="text-sm md:text-base leading-relaxed text-gray-300 whitespace-pre-line"></p>
                <div id="script-cursor" class="inline-block w-2 h-4 bg-neon-blue animate-pulse ml-1 hidden"></div>
            </div>

            <!-- Reset Button -->
            <button onclick="resetSystem()" class="mt-4 w-full md:w-auto md:self-end border border-gray-600 text-gray-400 py-2 px-6 hover:border-white hover:text-white transition-colors text-xs tracking-widest">
                [ INITIALIZE RE-SCAN ]
            </button>

        </section>
    </main>

    <script>
        // Data Mapping for each level
        const SYSTEM_DATA = {
            light: {
                targetScore: 35,
                colorClass: 'text-neon-green',
                borderColor: 'border-neon-green',
                alertText: 'STATUS: MINOR STRESS DETECTED',
                script: "【AI分析結果】軽度の光害ダメージを検知しました。\n\n「スマホだけでも、目は確実に疲労を蓄積しています。初期段階でのブルーライトケアが、将来の深刻な不調を防ぐ鍵となります。長時間の利用に備え、防御システム（高機能レンズ）の導入を推奨します。」"
            },
            medium: {
                targetScore: 72,
                colorClass: 'text-neon-orange',
                borderColor: 'border-neon-orange',
                alertText: 'WARNING: ELEVATED STRESS DETECTED',
                script: "【AI分析結果】中等度の光害ダメージを検知しました。\n\n「現代人の平均的なデジタルデバイス使用時間を超えており、眼精疲労が蓄積しやすい状態です。画面の眩しさを抑え、ピント調節を強力にサポートするレンズが『必須レベル』となっています。直ちに対策をご検討ください。」"
            },
            heavy: {
                targetScore: 98,
                colorClass: 'text-neon-red',
                borderColor: 'border-neon-red',
                alertText: 'CRITICAL: SEVERE OPTICAL DAMAGE RISK',
                script: "【AI分析結果】致命的な光害ダメージリスクを検知しました。\n\n「非常に過酷な視覚環境です！スマホのナイトモード等では防ぎきれない反射光や、強いブルーライトが直接目に突き刺さっています。網膜保護のため、全方位から光を弾き返す【最上位PCレンズ】での徹底防御を強く提案します。」"
            }
        };

        let typeWriterTimeout = null;

        // Core System Functions
        async function startScan(level) {
            try {
                // UI State Update
                document.getElementById('status-indicator').innerText = 'STATUS: SCANNING...';
                document.getElementById('status-indicator').classList.add('text-neon-red');
                
                // Disable input buttons
                const btns = document.querySelectorAll('.scan-btn');
                btns.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('opacity-30', 'cursor-not-allowed');
                });

                // Reset Result Area if visible
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('flex');
                document.getElementById('result-section').classList.replace('opacity-100', 'opacity-0');
                if(typeWriterTimeout) clearTimeout(typeWriterTimeout);
                document.getElementById('script-output').innerHTML = '';

                // Show Progress
                const progressSection = document.getElementById('scan-progress');
                const scanBar = document.getElementById('scan-bar');
                const progressText = document.getElementById('progress-text');
                progressSection.classList.remove('hidden');
                
                // Animate Progress Bar (forced reflow to ensure transition runs)
                scanBar.style.width = '0%';
                void scanBar.offsetWidth; 
                scanBar.style.width = '100%';

                // Fake Progress Counter
                let p = 0;
                const interval = setInterval(() => {
                    p += 5;
                    if(p > 100) p = 100;
                    progressText.innerText = p + '%';
                    if(p === 100) clearInterval(interval);
                }, 75);

                // Wait for progress animation
                await new Promise(r => setTimeout(r, 1600));

                // Hide Progress, Show Results
                progressSection.classList.add('hidden');
                scanBar.style.width = '0%';
                
                displayResults(level);

            } catch (error) {
                showError("Scan initialization failed. " + error.message);
            }
        }

        function displayResults(level) {
            try {
                const data = SYSTEM_DATA[level];
                if (!data) throw new Error("Invalid scan level provided.");

                const resultSection = document.getElementById('result-section');
                const damageValue = document.getElementById('damage-value');
                const damageAlert = document.getElementById('damage-alert');
                const shieldContainer = document.getElementById('shield-container');
                const damageContainer = document.getElementById('damage-container');

                // Update Status
                document.getElementById('status-indicator').innerText = 'STATUS: ANALYSIS_COMPLETE';
                document.getElementById('status-indicator').classList.remove('text-neon-red');

                // Show Section
                resultSection.classList.remove('hidden');
                resultSection.classList.add('flex');
                
                // Trigger fade in
                setTimeout(() => {
                    resultSection.classList.replace('opacity-0', 'opacity-100');
                }, 50);

                // Clean up previous classes
                damageValue.className = `text-6xl md:text-8xl font-bold tracking-tighter transition-colors duration-500`;
                damageAlert.className = `text-xs mt-2 tracking-widest font-bold`;
                damageContainer.classList.remove('bg-alert-pulse');
                shieldContainer.className = `cyber-border p-2 bg-black relative transition-all duration-500`;

                // Set Data
                damageAlert.innerText = data.alertText;
                damageValue.classList.add(data.colorClass);
                damageAlert.classList.add(data.colorClass);
                shieldContainer.classList.add('shadow-[0_0_15px_rgba(0,243,255,0.2)]', 'border-neon-blue');

                // Critical Danger Effect
                if(level === 'heavy') {
                    damageContainer.classList.add('bg-alert-pulse');
                    shieldContainer.classList.add('shadow-[0_0_20px_rgba(255,0,60,0.3)]', 'border-neon-red');
                    shieldContainer.querySelector('.glow-text-blue').classList.replace('text-neon-blue', 'text-neon-red');
                    shieldContainer.querySelector('.glow-text-blue').classList.replace('border-neon-blue', 'border-neon-red');
                    shieldContainer.querySelector('.glow-text-blue').classList.replace('bg-neon-dark', 'bg-[#330000]');
                } else {
                    // Revert from heavy state if needed
                    const badge = shieldContainer.querySelector('.glow-text-blue');
                    badge.classList.remove('text-neon-red', 'border-neon-red', 'bg-[#330000]');
                    badge.classList.add('text-neon-blue', 'border-neon-blue', 'bg-neon-dark');
                }

                // Animate Numbers
                animateValue(damageValue, 0, data.targetScore, 1000);

                // Start Typewriter for Script
                document.getElementById('script-cursor').classList.remove('hidden');
                typeWriter(data.script, 'script-output', 30);

            } catch(error) {
                showError("Failed to render results. " + error.message);
            }
        }

        // Counter Animation Engine
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out cubic
                const easeOut = 1 - Math.pow(1 - progress, 3);
                obj.innerHTML = Math.floor(easeOut * (end - start) + start) + '%';
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Cyberpunk Typewriter Effect
        function typeWriter(text, elementId, speed) {
            const el = document.getElementById(elementId);
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    // Handle newlines
                    if(text.charAt(i) === '\n') {
                        el.innerHTML += '<br>';
                    } else {
                        el.innerHTML += text.charAt(i);
                    }
                    i++;
                    typeWriterTimeout = setTimeout(type, speed + (Math.random() * 20)); // Add slight randomness for terminal feel
                } else {
                    document.getElementById('script-cursor').classList.add('hidden');
                }
            }
            type();
        }

        // System Reset
        function resetSystem() {
            document.getElementById('result-section').classList.replace('opacity-100', 'opacity-0');
            
            setTimeout(() => {
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('flex');
                
                // Re-enable buttons
                const btns = document.querySelectorAll('.scan-btn');
                btns.forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove('opacity-30', 'cursor-not-allowed');
                });

                document.getElementById('status-indicator').innerText = 'STATUS: WAITING_INPUT';
                if(typeWriterTimeout) clearTimeout(typeWriterTimeout);
                document.getElementById('script-output').innerHTML = '';
            }, 1000); // Wait for fade out
        }

        // Resilience: Error Handler
        function showError(msg) {
            const errBox = document.getElementById('system-error');
            document.getElementById('error-msg').innerText = msg;
            errBox.classList.remove('hidden');
            console.error("[Scanner Error]", msg);
            
            // Failsafe: Reset UI state
            const btns = document.querySelectorAll('.scan-btn');
            btns.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('opacity-30', 'cursor-not-allowed');
            });
            document.getElementById('scan-progress').classList.add('hidden');
            document.getElementById('status-indicator').innerText = 'STATUS: SYSTEM_ERROR';
        }
    </script>
</body>
</html>
