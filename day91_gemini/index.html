<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンズ劣化シミュレーター | Premium Lens Care</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 高級感と視認性を両立する Noto Sans JP を採用 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            white: '#FFFFFF',
                            black: '#0A0A0A',
                            crystal: '#00B4D8', // 新品のクリアさを象徴
                            amber: '#B58B4C',   // 経年劣化の黄ばみを象徴
                            gray: '#F5F5F5',
                            darkgray: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* テンプレUIの影付きカードを排除し、極細のボーダーと余白で構成 */
        .btn-outline {
            border: 1px solid var(--tw-border-opacity);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-outline:active {
            transform: scale(0.98);
        }

        /* 経年劣化の小傷を表現するノイズレイヤー */
        .scratch-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.3'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* カスタムスライダーのスタイリング */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 48px;
            width: 48px;
            border-radius: 50%;
            background: transparent;
            cursor: ew-resize;
            margin-top: -24px; /* トラックの中央に配置 */
        }
        input[type=range]::-moz-range-thumb {
            height: 48px;
            width: 48px;
            border-radius: 50%;
            background: transparent;
            cursor: ew-resize;
            border: none;
        }

        /* 接客トークのハイライト表現（マーカーではなく洗練された下線） */
        .talk-highlight-amber {
            background: linear-gradient(transparent 70%, rgba(181, 139, 76, 0.2) 70%);
            font-weight: 500;
        }
        .talk-highlight-crystal {
            background: linear-gradient(transparent 70%, rgba(0, 180, 216, 0.3) 70%);
            font-weight: 700;
        }

        /* アニメーション */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-brand-white text-brand-black min-h-screen flex flex-col">

    <header class="w-full px-6 py-8 border-b border-gray-200 flex justify-center items-center">
        <h1 class="text-xl md:text-2xl font-light tracking-widest uppercase">
            <span class="font-bold">Premium Lens</span> Quality Check
        </h1>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto px-6 py-10 flex flex-col gap-12">
        
        <!-- Step 1: 初期ヒアリング（プログレッシブ・ディクロージャーの起点） -->
        <section id="section-selection" class="flex flex-col gap-8 items-center justify-center min-h-[40vh] transition-all duration-700">
            <div class="text-center flex flex-col gap-3">
                <p class="text-sm font-bold text-brand-crystal tracking-widest">STEP 1</p>
                <h2 class="text-2xl md:text-3xl font-medium leading-tight">現在お使いのメガネは、<br class="md:hidden">何年目ですか？</h2>
                <p class="text-gray-500 mt-2 text-sm md:text-base">お客様のご使用年数を選択してください。</p>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 w-full max-w-lg">
                <button onclick="selectYears(2)" class="btn-outline flex-1 py-5 px-6 rounded-none border-gray-300 hover:border-brand-amber text-brand-black flex flex-col items-center gap-2 group">
                    <span class="text-xl font-bold transition-colors group-hover:text-brand-amber">約2年</span>
                    <span class="text-xs text-gray-400">少しずつコーティングが剥がれ始める</span>
                </button>
                <button onclick="selectYears(3)" class="btn-outline flex-1 py-5 px-6 rounded-none border-gray-300 hover:border-brand-amber text-brand-black flex flex-col items-center gap-2 group">
                    <span class="text-xl font-bold transition-colors group-hover:text-brand-amber">3年以上</span>
                    <span class="text-xs text-gray-400">プラスチックの黄変と小傷が蓄積</span>
                </button>
            </div>
        </section>

        <!-- Step 2 & 3: シミュレーターと接客トーク（初期状態は完全に非表示） -->
        <section id="section-interactive" class="hidden flex-col lg:flex-row gap-10 opacity-0 transform translate-y-10 transition-all duration-1000 ease-out pb-20">
            
            <!-- 左/上: シミュレーションエリア（文字とは絶対に被らない独立したブロック） -->
            <div class="w-full lg:w-1/2 flex flex-col gap-4">
                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-lg font-bold tracking-wide">Vision Simulator</h3>
                    <span id="simulator-status" class="text-xs font-bold px-3 py-1 bg-brand-amber text-white rounded-full">現在の視界（劣化状態）</span>
                </div>
                
                <!-- シミュレーター本体 (アスペクト比固定でレイアウト崩れを防ぐ) -->
                <div class="relative w-full aspect-square md:aspect-[4/3] rounded-sm overflow-hidden border border-gray-200 bg-gray-100 shadow-sm">
                    <!-- Base Layer (新品の極上視界) -->
                    <!-- 鮮明な風景と文字を含む高精細画像を使用 -->
                    <img src="https://images.unsplash.com/photo-1514924013411-cbf25faa35bb?q=80&w=1200&auto=format&fit=crop" 
                         alt="クリアな視界" 
                         class="absolute inset-0 w-full h-full object-cover" />
                    
                    <!-- NEWタグ (Base Layer側に配置) -->
                    <div class="absolute top-4 left-4 bg-brand-crystal text-white text-xs font-bold px-2 py-1 z-0 shadow-md">
                        新品レンズの視界
                    </div>

                    <!-- Degraded Layer (劣化フィルター) -->
                    <!-- JSでclip-pathを操作し、右にスライドさせることで左からクリアな視界が現れる -->
                    <div id="filter-layer" class="absolute inset-0 pointer-events-none transition-all duration-75" style="clip-path: inset(0 0 0 0%);">
                        <!-- バックドロップフィルターによる動的なぼかしと黄ばみ -->
                        <div id="blur-layer" class="absolute inset-0 bg-white/5 backdrop-blur-[0px] backdrop-sepia-[0] backdrop-brightness-100 transition-all duration-1000"></div>
                        <!-- 小傷を表現するノイズ -->
                        <div id="scratch-layer" class="absolute inset-0 scratch-overlay opacity-0 transition-opacity duration-1000"></div>
                        
                        <!-- 劣化タグ (Filter Layer側に配置し、一緒に削り取られるようにする) -->
                        <div class="absolute top-4 right-4 bg-brand-amber text-white text-xs font-bold px-2 py-1 shadow-md">
                            現在の視界
                        </div>
                    </div>

                    <!-- Comparison Slider UI -->
                    <div class="absolute inset-0 z-10 flex items-center justify-center">
                        <input type="range" min="0" max="100" value="0" id="comparison-slider" class="w-full h-full absolute inset-0 z-20 cursor-ew-resize opacity-0" oninput="updateSlider()">
                        
                        <!-- スライダーの視覚的な境界線とツマミ -->
                        <div id="slider-handle" class="absolute top-0 bottom-0 w-0.5 bg-brand-white pointer-events-none shadow-[0_0_10px_rgba(0,0,0,0.5)] transition-all duration-75 flex flex-col items-center justify-center" style="left: 0%;">
                            <!-- タッチしやすいツマミのUI -->
                            <div class="w-10 h-10 bg-brand-white rounded-full shadow-lg border border-gray-200 flex items-center justify-center gap-1">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p class="text-sm text-gray-500 text-center mt-2 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    スライダーを右に引いて、新品の視界を体験してください
                </p>
            </div>

            <!-- 右/下: スタッフ用 接客トークスクリプト（画像とは完全に分離） -->
            <div class="w-full lg:w-1/2 flex flex-col bg-gray-50 p-6 md:p-8 rounded-sm border border-gray-200 relative overflow-hidden">
                <!-- 装飾背景 -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-crystal opacity-5 rounded-full blur-2xl"></div>
                
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-2 h-6 bg-brand-darkgray"></div>
                    <h3 class="text-lg font-bold tracking-widest text-brand-darkgray">STAFF TALK SCRIPT</h3>
                </div>

                <div class="flex-grow flex flex-col gap-6" id="talk-script-container">
                    <!-- JSによってここに状況に応じたトークが動的に挿入されます -->
                </div>
                
                <!-- クロージングアクション (スライダー100%到達時に表示) -->
                <div id="closing-action" class="mt-8 pt-6 border-t border-gray-200 hidden opacity-0 transition-opacity duration-700">
                    <button class="w-full bg-brand-black text-brand-white py-4 px-6 text-lg font-bold hover:bg-gray-800 transition-colors shadow-lg flex items-center justify-center gap-3">
                        最新レンズのラインナップをご案内する
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // DOM要素の取得
        const sectionSelection = document.getElementById('section-selection');
        const sectionInteractive = document.getElementById('section-interactive');
        const blurLayer = document.getElementById('blur-layer');
        const scratchLayer = document.getElementById('scratch-layer');
        const slider = document.getElementById('comparison-slider');
        const sliderHandle = document.getElementById('slider-handle');
        const filterLayer = document.getElementById('filter-layer');
        const talkContainer = document.getElementById('talk-script-container');
        const closingAction = document.getElementById('closing-action');
        const simulatorStatus = document.getElementById('simulator-status');

        let currentYears = 0;
        let isClosingShown = false;

        // トークスクリプトのデータ定義（手抜き一切なしの緻密なシナリオ）
        const scripts = {
            2: {
                initial: `
                    <div class="fade-in-up flex gap-4">
                        <span class="text-brand-crystal font-bold">1</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「約2年お使いですね。実はお客様、メガネのコーティングは<span class="talk-highlight-amber">約2年頃から目に見えないレベルで剥がれ始めています。</span>」
                        </p>
                    </div>
                    <div class="fade-in-up flex gap-4" style="animation-delay: 0.2s;">
                        <span class="text-brand-crystal font-bold">2</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「左の画面をご覧ください。ほんの少しですが、光の乱反射が起きて文字の輪郭がぼやけていますよね。<br>
                            <span class="text-sm text-gray-500 mt-2 block">※お客様にスライダーを触っていただくよう促してください</span>
                            」
                        </p>
                    </div>
                `,
                revealed: `
                    <div class="fade-in-up flex gap-4 bg-white p-4 rounded-sm border-l-4 border-brand-crystal shadow-sm">
                        <span class="text-brand-crystal font-bold">3</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「いかがですか？ <span class="talk-highlight-crystal">文字の輪郭がくっきりと見えませんか？</span><br>
                            まだ使えると思われがちですが、この少しの差が、夕方の眼精疲労の原因になるんです。」
                        </p>
                    </div>
                `
            },
            3: {
                initial: `
                    <div class="fade-in-up flex gap-4">
                        <span class="text-brand-crystal font-bold">1</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「3年以上お使いとのこと、大切に扱っていただきありがとうございます。<br>
                            ただ、<span class="talk-highlight-amber">人間の脳はとても優秀で、ゆっくり進行するレンズの『黄ばみ』や『細かい傷』に慣れてしまうんです。</span>」
                        </p>
                    </div>
                    <div class="fade-in-up flex gap-4" style="animation-delay: 0.2s;">
                        <span class="text-brand-crystal font-bold">2</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「現在の視界は、常に『薄いセピア色のサングラス』と『細かいすりガラス』を通しているような状態です。<br>
                            <span class="text-sm text-gray-500 mt-2 block">※お客様ご自身でスライダーを右へ引いて、新品の視界を体験していただきます</span>
                            」
                        </p>
                    </div>
                `,
                revealed: `
                    <div class="fade-in-up flex gap-4 bg-white p-4 rounded-sm border-l-4 border-brand-crystal shadow-sm">
                        <span class="text-brand-crystal font-bold">3</span>
                        <p class="text-base md:text-lg leading-relaxed">
                            「一瞬で世界が変わりましたよね？<br>
                            <span class="talk-highlight-crystal">新品に変えると、世界がワントーン明るくなります。</span><br>
                            見え方の質を上げて、毎日の生活を快適にしませんか？」
                        </p>
                    </div>
                `
            }
        };

        // 年数選択時の処理
        function selectYears(years) {
            currentYears = years;
            isClosingShown = false;
            slider.value = 0;
            updateSlider(false); // 初期位置にリセット

            // プログレッシブ・ディクロージャー: 選択エリアを縮小・フェードアウト気味にし、メインUIを展開
            sectionSelection.classList.replace('min-h-[40vh]', 'min-h-[10vh]');
            sectionSelection.classList.add('opacity-40', 'scale-95');
            
            // シミュレーターの設定適用
            applyDegradation(years);
            
            // インタラクティブエリアの表示
            sectionInteractive.classList.remove('hidden');
            // 少し遅らせてアニメーション発火
            setTimeout(() => {
                sectionInteractive.classList.remove('opacity-0', 'translate-y-10');
                // スマホ時はシミュレーター位置までスクロール
                sectionInteractive.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);

            // トークスクリプトの初期化
            talkContainer.innerHTML = scripts[years].initial;
            closingAction.classList.add('hidden');
            closingAction.classList.remove('opacity-100');
            
            // ステータスバッジのリセット
            simulatorStatus.textContent = "現在の視界（劣化状態）";
            simulatorStatus.className = "text-xs font-bold px-3 py-1 bg-brand-amber text-white rounded-full";
        }

        // 劣化フィルターのCSSクラス適用
        function applyDegradation(years) {
            // クラスを一旦クリア
            blurLayer.className = "absolute inset-0 transition-all duration-1000";
            
            if (years === 2) {
                // 2年: 軽い黄ばみ、わずかなぼかし
                blurLayer.classList.add('backdrop-sepia-[.4]', 'backdrop-blur-[1px]', 'backdrop-brightness-95', 'bg-brand-amber/10');
                scratchLayer.classList.replace('opacity-0', 'opacity-30');
            } else {
                // 3年以上: 強い黄ばみ、ぼかし、暗さ
                blurLayer.classList.add('backdrop-sepia-[.8]', 'backdrop-blur-[3px]', 'backdrop-brightness-90', 'bg-brand-amber/20');
                scratchLayer.classList.replace('opacity-0', 'opacity-70');
            }
        }

        // スライダー操作時の処理
        function updateSlider(triggerEvent = true) {
            const val = slider.value;
            
            // UIの更新 (clip-path で劣化レイヤーを左から削り、新品を露出させる)
            // val=0 -> inset(0 0 0 0%), val=100 -> inset(0 0 0 100%)
            filterLayer.style.clipPath = `inset(0 0 0 ${val}%)`;
            sliderHandle.style.left = `${val}%`;

            if (!triggerEvent) return;

            // 状態の視覚的フィードバック
            if (val > 80) {
                simulatorStatus.textContent = "極上のクリアな視界（新品）";
                simulatorStatus.className = "text-xs font-bold px-3 py-1 bg-brand-crystal text-white rounded-full transition-colors";
            } else if (val < 20) {
                simulatorStatus.textContent = "現在の視界（劣化状態）";
                simulatorStatus.className = "text-xs font-bold px-3 py-1 bg-brand-amber text-white rounded-full transition-colors";
            }

            // 新品体験完了（100%まで引っ張った）時のクロージングトーク展開
            if (val > 90 && !isClosingShown) {
                isClosingShown = true;
                
                // クロージングトークを追記
                const newTalk = document.createElement('div');
                newTalk.innerHTML = scripts[currentYears].revealed;
                talkContainer.appendChild(newTalk);

                // クロージングボタンの表示
                closingAction.classList.remove('hidden');
                setTimeout(() => {
                    closingAction.classList.add('opacity-100');
                    // スマホでは追加されたトークが見えるように少し下へスクロール
                    if(window.innerWidth < 1024) {
                       closingAction.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }
                }, 100);
            }
        }
    </script>
</body>
</html>
