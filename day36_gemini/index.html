<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lens & Frame Navigation - High Myopia Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                    },
                    colors: {
                        brand: {
                            black: '#111111',
                            gray: '#F5F5F5',
                            darkgray: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* カスタムアニメーションとスクロールバーの非表示（モバイル向け） */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white text-brand-black font-sans antialiased selection:bg-black selection:text-white pb-24">

    <!-- Header / Magazine Style -->
    <header class="pt-12 pb-8 px-6 md:px-12 max-w-5xl mx-auto">
        <p class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2 font-semibold">Optical Styling Guide</p>
        <h1 class="font-serif text-4xl md:text-6xl font-black leading-tight tracking-tight">
            強度近視のための<br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-800 to-gray-400">フレーム選定ナビ</span>
        </h1>
    </header>

    <main class="max-w-5xl mx-auto px-6 md:px-12">
        
        <!-- Step 1: Power Selection -->
        <section class="mb-16">
            <div class="flex items-end mb-6">
                <span class="font-serif text-4xl font-bold mr-4">01.</span>
                <h2 class="text-lg font-medium tracking-wide">お客様の「近視の強さ」は？</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="power-buttons">
                <!-- Buttons injected by JS -->
            </div>
        </section>

        <!-- Step 2: Shape Selection -->
        <section class="mb-16">
            <div class="flex items-end mb-6">
                <span class="font-serif text-4xl font-bold mr-4 text-gray-300 transition-colors duration-300" id="step2-number">02.</span>
                <h2 class="text-lg font-medium tracking-wide text-gray-400 transition-colors duration-300" id="step2-title">ご希望の「フレームの形」は？</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 opacity-50 pointer-events-none transition-all duration-500" id="shape-buttons">
                <!-- Buttons injected by JS -->
            </div>
        </section>

        <!-- Result Section (Editorial Style) -->
        <section id="result-section" class="hidden pt-8 border-t border-gray-200">
            <div class="flex flex-col md:flex-row gap-12 md:gap-16">
                
                <!-- Status & Risk -->
                <div class="md:w-1/3">
                    <p class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-4">Diagnosis</p>
                    <h3 id="result-level" class="font-serif text-3xl md:text-4xl font-bold mb-6 leading-tight">
                        <!-- Level -->
                    </h3>
                    <div class="h-px w-full bg-gray-200 mb-6"></div>
                    <p class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-3">Risk Factor</p>
                    <p id="result-risk" class="text-sm md:text-base leading-relaxed text-gray-700">
                        <!-- Risk text -->
                    </p>
                </div>

                <!-- Talk Script -->
                <div class="md:w-2/3">
                    <div class="bg-brand-gray p-8 md:p-12 rounded-2xl relative overflow-hidden">
                        <!-- Decorative Quote Mark -->
                        <div class="absolute -top-6 -left-2 text-[12rem] leading-none font-serif text-white opacity-60 select-none">"</div>
                        
                        <div class="relative z-10">
                            <p class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-6">Professional Talk Script</p>
                            <p id="result-talk" class="font-serif text-xl md:text-2xl leading-loose md:leading-loose text-brand-darkgray">
                                <!-- Talk text -->
                            </p>
                            
                            <div class="mt-8 flex items-center text-sm font-medium text-gray-500">
                                <svg class="w-5 h-5 mr-2 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                お客様の好みを否定せず、代替案を提示しましょう。
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <script>
        /**
         * データベース：全ての組み合わせのプロフェッショナルな見解と台本
         */
        const database = {
            power: [
                { id: 'strong', label: '強め', sub: '-4.00 〜 -6.00' },
                { id: 'very_strong', label: 'かなり強い', sub: '-6.00 〜 -8.00' },
                { id: 'max', label: '最強度', sub: '-8.00以上' }
            ],
            shape: [
                { id: 'large_metal', label: '大きめ＆細身メタル', sub: 'トレンドデザイン' },
                { id: 'wide_square', label: '横幅広めスクエア', sub: '定番デザイン' },
                { id: 'small_cell', label: '小ぶりなセル(プラ)', sub: 'レンズ径小さめ' }
            ],
            results: {
                strong: {
                    large_metal: {
                        level: "⚠️ 厚み注意", colorClass: "text-yellow-600",
                        risk: "レンズ端の厚みが目立ちやすく、少し重みを感じる可能性があります。輪郭の凹みも出始めます。",
                        talk: "トレンドの細身メタル、素敵ですよね！ただ、お客様の度数ですとレンズの端が少しはみ出しやすくなります。もし厚みが気になる場合は、レンズの横幅が少しコンパクトなものを選ぶと、驚くほどスッキリ仕上がりますよ！"
                    },
                    wide_square: {
                        level: "⚠️ 厚み注意", colorClass: "text-yellow-600",
                        risk: "横幅が広い分、レンズの最も厚い部分が残りやすいです。",
                        talk: "シャープな印象でかっこいいですよね。ただ、横幅が広いとどうしてもレンズの厚みが出やすくなります。同じスクエアでも、少し横幅を抑えたタイプにすると、輪郭の凹みも気になりにくくなりますよ！"
                    },
                    small_cell: {
                        level: "💡 相性バツグン！", colorClass: "text-blue-600",
                        risk: "特になし。綺麗な仕上がりが期待できます。",
                        talk: "素晴らしい選択です！この小ぶりでフチに存在感のあるフレームは、レンズの一番分厚い部分をカットできるうえに厚みを隠してくれるので、お客様の度数でも驚くほどスッキリと軽く仕上がりますよ！"
                    }
                },
                very_strong: {
                    large_metal: {
                        level: "🚨 危険度MAX", colorClass: "text-red-600",
                        risk: "レンズの端がかなり分厚くはみ出し、重さでズレやすくなります。輪郭の凹みも顕著に出ます。",
                        talk: "今のトレンドで可愛いですよね！ただ、お客様の度数ですと、このサイズ感だとレンズの端がかなり分厚くはみ出してしまい、メガネも重くなってしまいます。同じメタル系でも『レンズサイズが少し小さめで、リム（ふち）に厚みがあるデザイン』にすると、レンズの厚みが隠れて、目も小さく見えにくく綺麗に仕上がりますよ！"
                    },
                    wide_square: {
                        level: "🚨 危険度MAX", colorClass: "text-red-600",
                        risk: "横幅が広いため、レンズの厚み・重さが最大級に出ます。目がかなり小さく見える原因になります。",
                        talk: "定番で使いやすいデザインですよね。ですが、この横幅ですとレンズの厚みがかなり目立ち、重さも出てしまいます。少し丸みのあるクラシックなフレームや、横幅が狭めのものを選ぶと、目の大きさも保てて綺麗に仕上がりますよ！"
                    },
                    small_cell: {
                        level: "💡 相性バツグン！", colorClass: "text-blue-600",
                        risk: "特になし。ただしお客様の黒目の位置（PD）とのバランス確認は必須です。",
                        talk: "とても良いお見立てです！セルフレームの厚みがレンズの厚みをカバーしてくれますし、サイズが小さいことで軽さも出ます。度数の強さを感じさせない、とても綺麗な仕上がりになりますよ！"
                    }
                },
                max: {
                    large_metal: {
                        level: "⛔️ 非推奨 (超MAX)", colorClass: "text-red-700",
                        risk: "レンズがフレームから大きくはみ出し、見た目の違和感と極端な重さが出ます。後日のクレーム率が非常に高い組み合わせです。",
                        talk: "こちらのデザイン、とてもおしゃれですよね。ただ、お客様の素晴らしい度数ですと、この細さと大きさではレンズを支えきれず、かなりの厚みと重さが出てしまいます。お客様の目を一番綺麗に見せるためには、レンズサイズが小さく、しっかりとしたフチのあるフレームが絶対におすすめです！"
                    },
                    wide_square: {
                        level: "⛔️ 非推奨 (超MAX)", colorClass: "text-red-700",
                        risk: "牛乳ビンの底のような渦巻きが目立ち、輪郭のズレが非常に大きくなります。",
                        talk: "きりっとした印象で素敵ですが、この横幅はお客様の度数だと厚みが一番出てしまう形なんです。厚みを抑えて目をパッチリ見せるために、小ぶりなラウンド型やボストン型はいかがでしょうか？レンズが薄く、劇的に軽く仕上がりますよ。"
                    },
                    small_cell: {
                        level: "✨ ベストチョイス！", colorClass: "text-yellow-500",
                        risk: "極力リスクを抑えられます。屈折率の高い（最も薄い）レンズの提案を併せて行ってください。",
                        talk: "まさに最強の組み合わせです！お客様の度数で一番綺麗に、そして薄く軽く仕上がるのがこの形です。フレームのフチが厚みをしっかり隠してくれるので、横から見てもスッキリします。自信を持っておすすめします！"
                    }
                }
            }
        };

        // 状態管理
        let state = {
            power: null,
            shape: null
        };

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            renderButtons('power', database.power, document.getElementById('power-buttons'));
            renderButtons('shape', database.shape, document.getElementById('shape-buttons'));
        });

        /**
         * ボタン群をレンダリングする
         */
        function renderButtons(type, dataArray, container) {
            container.innerHTML = '';
            dataArray.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `
                    relative w-full text-left p-6 md:p-8 rounded-2xl border-2 transition-all duration-300 ease-out group
                    hover:border-black hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-gray-200
                    ${state[type] === item.id 
                        ? 'bg-brand-black border-brand-black text-white' 
                        : 'bg-white border-gray-200 text-brand-black'}
                `;
                btn.onclick = () => handleSelection(type, item.id);

                btn.innerHTML = `
                    <div class="text-xs font-bold mb-2 tracking-widest uppercase opacity-70">${item.sub}</div>
                    <div class="text-xl md:text-2xl font-serif font-bold">${item.label}</div>
                    <!-- 選択時チェックマーク -->
                    <div class="absolute top-6 right-6 transition-opacity duration-300 ${state[type] === item.id ? 'opacity-100' : 'opacity-0'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        /**
         * 選択時のハンドリング
         */
        function handleSelection(type, id) {
            state[type] = id;
            
            // UI更新
            renderButtons('power', database.power, document.getElementById('power-buttons'));
            renderButtons('shape', database.shape, document.getElementById('shape-buttons'));

            // Step2の解放アニメーション
            if (type === 'power' && !state.shape) {
                const shapeSection = document.getElementById('shape-buttons');
                const step2Num = document.getElementById('step2-number');
                const step2Title = document.getElementById('step2-title');
                
                shapeSection.classList.remove('opacity-50', 'pointer-events-none');
                step2Num.classList.replace('text-gray-300', 'text-brand-black');
                step2Title.classList.replace('text-gray-400', 'text-brand-black');
                
                // 次のステップへ少しスクロール
                setTimeout(() => {
                    shapeSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }

            // 両方選択されたら結果を表示
            if (state.power && state.shape) {
                showResult();
            }
        }

        /**
         * 結果の表示とアニメーション
         */
        function showResult() {
            const resultSection = document.getElementById('result-section');
            const data = database.results[state.power][state.shape];

            // データの注入
            const levelEl = document.getElementById('result-level');
            levelEl.textContent = data.level;
            levelEl.className = `font-serif text-3xl md:text-4xl font-bold mb-6 leading-tight ${data.colorClass}`;
            
            document.getElementById('result-risk').textContent = data.risk;
            document.getElementById('result-talk').textContent = data.talk;

            // 表示アニメーション
            resultSection.classList.remove('hidden');
            
            // DOMの更新を待ってからクラスを付与してアニメーション発火
            requestAnimationFrame(() => {
                resultSection.classList.remove('fade-in-up');
                void resultSection.offsetWidth; // Reflowを強制してアニメーションをリセット
                resultSection.classList.add('fade-in-up');
                
                // スムーズスクロール
                setTimeout(() => {
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 300);
            });
        }
    </script>
</body>
</html>
