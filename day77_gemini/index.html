<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Eyewear Styling</title>
    <!-- 表現力を高めるWebフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ivory: { DEFAULT: '#FAFAF7', dark: '#F0EFEA' },
                        charcoal: { DEFAULT: '#333333', light: '#555555' },
                        gold: { DEFAULT: '#C5A059', light: '#E8DDB5', dark: '#9B7B3E' },
                    },
                    fontFamily: {
                        serif: ['"Noto Serif JP"', 'serif'],
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ベース設定：タップハイライトの除去等 */
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #FAFAF7; color: #333333; font-family: "Noto Sans JP", sans-serif; }
        .font-serif { font-family: "Noto Serif JP", serif; }
        
        /* 装飾的なライン（絶対配置を使わずflexで実現するための補助） */
        .ornament-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: #C5A059;
        }
        .ornament-line::before, .ornament-line::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #E8DDB5;
        }
        
        /* スムーズなコンテナの高さ変更のため */
        #app-container {
            transition: height 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 md:p-8">

    <!-- メインコンテナ（スマホ幅で最適化、PCでは適切な最大幅） -->
    <main id="app" class="w-full max-w-md w-full bg-white shadow-sm border border-ivory-dark p-6 md:p-10 flex flex-col gap-8 rounded-sm">
        <!-- JSでコンテンツを動的にマウント -->
    </main>

    <script>
        // --- 1. データ定義（ロジックとテキストの手抜き禁止） ---
        const RESULTS_DATA = {
            'round_yebe': {
                shape: 'スクエア / ウェリントン',
                shapeDesc: 'お顔の丸みを引き締め、知的な印象を与える直線的なフレーム。',
                colors: [{name: 'ブラウン', code: '#6B4423'}, {name: 'カーキ', code: '#556B2F'}],
                script: '「お客様の柔らかい雰囲気を活かしつつ、お顔の輪郭をすっきりと引き締めるために、こちらの直線的なフレームが最適です。また、お肌の血色感を美しく引き立てるブラウンやカーキ系のカラーを合わせることで、お顔全体がパッと明るく見えますよ。」',
                iconType: 'square'
            },
            'round_brebe': {
                shape: 'スクエア / ウェリントン',
                shapeDesc: 'お顔の丸みを引き締め、知的な印象を与える直線的なフレーム。',
                colors: [{name: 'ブラック', code: '#222222'}, {name: 'ネイビー', code: '#1C2841'}],
                script: '「お客様の優しい印象に少しのシャープさをプラスして、輪郭を引き締めるこちらのフレームが大変お似合いになります。さらに、お肌の透明感を最大限に引き立てるブラックやネイビー系のカラーを選んでいただくと、より洗練された印象に仕上がります。」',
                iconType: 'square'
            },
            'sharp_yebe': {
                shape: 'ボストン / ラウンド',
                shapeDesc: 'シャープな輪郭を和らげ、親しみやすさをプラスする丸みのあるフレーム。',
                colors: [{name: 'ゴールド', code: '#C5A059'}, {name: 'べっ甲', code: '#8B4513'}],
                script: '「お客様の洗練された美しい輪郭に、あえて丸みのあるフレームを合わせることで、お顔全体に柔らかさと親しみやすさが生まれます。カラーは、お肌に自然と馴染み、華やかさをプラスするゴールドやべっ甲系がおすすめでございます。」',
                iconType: 'round'
            },
            'sharp_brebe': {
                shape: 'ボストン / ラウンド',
                shapeDesc: 'シャープな輪郭を和らげ、親しみやすさをプラスする丸みのあるフレーム。',
                colors: [{name: 'シルバー', code: '#B0C4DE'}, {name: 'クリアグレー', code: '#808080'}],
                script: '「お客様のすっきりとした輪郭に、少し丸みのあるフレームを添えることで、抜け感のある優しい印象を引き出すことができます。そして、お肌の透き通るような魅力を際立たせるシルバーやクリアグレー系のカラーが、都会的で上品な雰囲気を演出します。」',
                iconType: 'round'
            }
        };

        // --- 2. 状態管理 ---
        let state = {
            step: 0,
            face: null, // 'round' or 'sharp'
            skin: null  // 'yebe' or 'brebe'
        };

        // --- 3. UIレンダリング関数（プログレッシブ・ディクロージャー） ---
        const appElement = document.getElementById('app');

        function render() {
            appElement.innerHTML = ''; // クリア
            
            let content = '';
            if (state.step === 0) content = renderStep0();
            else if (state.step === 1) content = renderStep1();
            else if (state.step === 2) content = renderStep2();
            else if (state.step === 3) content = renderResult();

            appElement.innerHTML = content;
        }

        // --- 4. 各ステップのコンポーネント ---

        // 初期画面
        function renderStep0() {
            return `
                <div class="flex flex-col items-center text-center gap-6 animate-fade-in-up">
                    <p class="text-gold font-serif tracking-widest text-xs">COUNSELING SHEET</p>
                    <h1 class="font-serif text-2xl md:text-3xl leading-relaxed text-charcoal">
                        パーソナル<br>アイウェア診断
                    </h1>
                    <div class="w-12 h-[1px] bg-gold my-2"></div>
                    <p class="text-sm text-charcoal-light leading-loose text-left w-full px-2">
                        お客様の「お顔の輪郭」と「お肌の色味」から、最も魅力を引き出す最適なフレーム形状とカラーを導き出します。
                    </p>
                    <button onclick="nextStep()" class="mt-6 w-full py-4 border border-charcoal text-charcoal hover:bg-charcoal hover:text-white transition-colors duration-300 font-serif tracking-widest text-sm flex justify-center items-center gap-2">
                        診断を始める
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </button>
                </div>
            `;
        }

        // 質問1：顔型
        function renderStep1() {
            return `
                <div class="flex flex-col gap-8 animate-fade-in-up">
                    <div class="text-center">
                        <p class="text-gold font-serif text-sm tracking-widest mb-2">QUESTION 1</p>
                        <h2 class="font-serif text-xl text-charcoal">お顔の輪郭はどちらに近いですか？</h2>
                    </div>
                    <div class="flex flex-col gap-4">
                        <button onclick="selectFace('round')" class="group relative w-full p-6 border border-ivory-dark hover:border-gold bg-ivory text-left transition-all duration-300 flex flex-col gap-2">
                            <span class="font-serif text-lg text-charcoal group-hover:text-gold transition-colors">丸みがある</span>
                            <span class="text-xs text-charcoal-light">ふっくらとした頬、柔らかなフェイスライン</span>
                        </button>
                        <button onclick="selectFace('sharp')" class="group relative w-full p-6 border border-ivory-dark hover:border-gold bg-ivory text-left transition-all duration-300 flex flex-col gap-2">
                            <span class="font-serif text-lg text-charcoal group-hover:text-gold transition-colors">直線的・シャープ</span>
                            <span class="text-xs text-charcoal-light">すっきりとした顎のライン、シャープな骨格</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // 質問2：肌色
        function renderStep2() {
            return `
                <div class="flex flex-col gap-8 animate-fade-in-up">
                    <div class="text-center">
                        <p class="text-gold font-serif text-sm tracking-widest mb-2">QUESTION 2</p>
                        <h2 class="font-serif text-xl text-charcoal">お肌の色味はどちらに近いですか？</h2>
                    </div>
                    <div class="flex flex-col gap-4">
                        <button onclick="selectSkin('yebe')" class="group relative w-full p-6 border border-ivory-dark hover:border-gold bg-ivory text-left transition-all duration-300 flex flex-col gap-2">
                            <span class="font-serif text-lg text-charcoal group-hover:text-gold transition-colors">黄みより（イエベ）</span>
                            <span class="text-xs text-charcoal-light">ゴールドのアクセサリーが馴染みやすい</span>
                        </button>
                        <button onclick="selectSkin('brebe')" class="group relative w-full p-6 border border-ivory-dark hover:border-gold bg-ivory text-left transition-all duration-300 flex flex-col gap-2">
                            <span class="font-serif text-lg text-charcoal group-hover:text-gold transition-colors">青み・ピンクより（ブルベ）</span>
                            <span class="text-xs text-charcoal-light">シルバーのアクセサリーが馴染みやすい</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // 結果表示（絶対遵守：被り禁止、完璧なレイアウト、手抜き禁止）
        function renderResult() {
            const resultKey = `${state.face}_${state.skin}`;
            const data = RESULTS_DATA[resultKey];

            // CSS図形の生成（メガネフレーム）
            const iconHtml = data.iconType === 'square' 
                ? `<div class="flex items-center justify-center gap-[2px]">
                    <div class="w-12 h-8 border-[3px] border-charcoal rounded-sm"></div>
                    <div class="w-3 h-[3px] bg-charcoal rounded"></div>
                    <div class="w-12 h-8 border-[3px] border-charcoal rounded-sm"></div>
                   </div>`
                : `<div class="flex items-center justify-center gap-[2px]">
                    <div class="w-10 h-10 border-[3px] border-charcoal rounded-full"></div>
                    <div class="w-3 h-[3px] bg-charcoal rounded"></div>
                    <div class="w-10 h-10 border-[3px] border-charcoal rounded-full"></div>
                   </div>`;

            // カラーパレットの生成
            const colorsHtml = data.colors.map(color => `
                <div class="flex flex-col items-center gap-2">
                    <div class="w-8 h-8 rounded-full border border-gray-200" style="background-color: ${color.code};"></div>
                    <span class="text-[10px] text-charcoal-light">${color.name}</span>
                </div>
            `).join('');

            return `
                <div class="flex flex-col gap-8 animate-fade-in-up">
                    <div class="text-center">
                        <p class="text-gold font-serif text-sm tracking-widest mb-2">RESULT</p>
                        <h2 class="font-serif text-xl text-charcoal">おすすめのスタイリング</h2>
                    </div>

                    <!-- 提案内容エリア（フレックスとギャップで明確に分離） -->
                    <div class="flex flex-col gap-6">
                        
                        <!-- 1. フレーム形状 -->
                        <div class="flex flex-col gap-3">
                            <h3 class="ornament-line font-serif text-sm text-gold-dark tracking-wide">Shape</h3>
                            <div class="flex flex-col items-center gap-4 bg-ivory p-4 border border-ivory-dark">
                                ${iconHtml}
                                <div class="text-center flex flex-col gap-1">
                                    <span class="font-serif text-lg">${data.shape}</span>
                                    <span class="text-xs text-charcoal-light leading-relaxed">${data.shapeDesc}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 2. カラー -->
                        <div class="flex flex-col gap-3">
                            <h3 class="ornament-line font-serif text-sm text-gold-dark tracking-wide">Color</h3>
                            <div class="flex flex-col items-center gap-4 bg-ivory p-4 border border-ivory-dark">
                                <div class="flex gap-6">
                                    ${colorsHtml}
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- 3. 接客トークスクリプト（新人スタッフ向けカンペ） -->
                    <div class="mt-2 flex flex-col gap-2">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>
                            <span class="text-xs font-bold text-charcoal tracking-wide">スタッフ用 トークスクリプト</span>
                        </div>
                        <div class="bg-charcoal text-white p-5 rounded-sm relative">
                            <!-- 装飾的な引用符（被らないように疑似要素ではなく配置） -->
                            <p class="text-sm leading-loose tracking-wide font-serif relative z-10">
                                ${data.script}
                            </p>
                        </div>
                    </div>

                    <button onclick="resetApp()" class="mt-4 text-xs text-charcoal-light underline hover:text-gold transition-colors self-center">
                        初めからやり直す
                    </button>
                </div>
            `;
        }

        // --- 5. イベントハンドラ ---
        function nextStep() {
            state.step++;
            render();
        }

        function selectFace(type) {
            state.face = type;
            nextStep();
        }

        function selectSkin(type) {
            state.skin = type;
            nextStep();
        }

        function resetApp() {
            state = { step: 0, face: null, skin: null };
            render();
        }

        // --- 初期描画 ---
        render();

    </script>
</body>
</html>
