<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>電話応対パニック防止！カンペ＆ワンタップ電話メモ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-100 min-h-screen text-gray-800">

  <div class="max-w-3xl mx-auto px-4 py-6">

    <!-- 固定カンペ -->
    <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg p-6 mb-6 border border-green-200">
      <h1 class="text-2xl md:text-3xl font-bold text-green-700 mb-4 text-center">
        📞 電話に出る時のセリフ
      </h1>
      <p class="text-xl md:text-3xl font-extrabold leading-relaxed text-center">
        お電話ありがとうございます！<br>
        〇〇店、担当の
        <input 
          id="staffName"
          type="text"
          placeholder="あなたの名前"
          class="border-b-4 border-green-400 focus:outline-none focus:border-blue-400 text-center text-green-700 font-bold bg-transparent w-40 md:w-52"
        >
        です！
      </p>
      <p id="nameSavedMessage" class="text-sm text-green-600 text-center mt-2 hidden">
        ✅ 名前を保存しました
      </p>
    </div>

    <!-- 相手選択 -->
    <div class="mb-6">
      <h2 class="text-xl md:text-2xl font-bold mb-3">① 相手は誰ですか？</h2>
      <div class="grid grid-cols-2 gap-4">
        <button class="caller-btn bg-green-200 hover:bg-green-300 text-lg font-bold py-4 rounded-xl transition">お客様</button>
        <button class="caller-btn bg-green-200 hover:bg-green-300 text-lg font-bold py-4 rounded-xl transition">業者様</button>
        <button class="caller-btn bg-green-200 hover:bg-green-300 text-lg font-bold py-4 rounded-xl transition">アルバイト応募</button>
        <button class="caller-btn bg-green-200 hover:bg-green-300 text-lg font-bold py-4 rounded-xl transition">スタッフの欠勤連絡</button>
      </div>
    </div>

    <!-- 用件選択 -->
    <div class="mb-6">
      <h2 class="text-xl md:text-2xl font-bold mb-3">② 用件は何ですか？</h2>
      <div class="grid grid-cols-3 gap-4">
        <button class="purpose-btn bg-blue-200 hover:bg-blue-300 text-lg font-bold py-4 rounded-xl transition">折り返し希望</button>
        <button class="purpose-btn bg-blue-200 hover:bg-blue-300 text-lg font-bold py-4 rounded-xl transition">伝言あり</button>
        <button class="purpose-btn bg-blue-200 hover:bg-blue-300 text-lg font-bold py-4 rounded-xl transition">保留中</button>
      </div>
    </div>

    <!-- メモ欄 -->
    <div class="mb-8">
      <h2 class="text-xl md:text-2xl font-bold mb-3">③ 相手の名前・詳細メモ</h2>
      <textarea 
        id="memo"
        rows="4"
        placeholder="例：山田様。明日の納品時間について確認したいとのこと。"
        class="w-full p-4 rounded-xl border-2 border-green-200 focus:outline-none focus:border-blue-400 text-lg"
      ></textarea>
    </div>

    <!-- コピー結果メッセージ -->
    <p id="copyMessage" class="text-center text-green-700 font-bold mb-4 hidden">
      ✅ 店長へ送る内容をコピーしました！
    </p>

  </div>

  <!-- 下部固定ボタン -->
  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-green-200 p-4 shadow-inner">
    <div class="max-w-3xl mx-auto">
      <button 
        id="copyBtn"
        class="w-full bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 rounded-2xl transition"
      >
        📲 店長へLINEで送る（コピー）
      </button>
    </div>
  </div>

  <script>
    const staffNameInput = document.getElementById("staffName");
    const nameSavedMessage = document.getElementById("nameSavedMessage");
    const callerButtons = document.querySelectorAll(".caller-btn");
    const purposeButtons = document.querySelectorAll(".purpose-btn");
    const memoInput = document.getElementById("memo");
    const copyBtn = document.getElementById("copyBtn");
    const copyMessage = document.getElementById("copyMessage");

    let selectedCaller = "";
    let selectedPurpose = "";

    // ローカルストレージから名前を復元
    window.addEventListener("DOMContentLoaded", () => {
      const savedName = localStorage.getItem("staffName");
      if (savedName) {
        staffNameInput.value = savedName;
      }
    });

    // 名前保存
    staffNameInput.addEventListener("blur", () => {
      const name = staffNameInput.value.trim();
      if (name.length === 0) return;
      localStorage.setItem("staffName", name);
      nameSavedMessage.classList.remove("hidden");
      setTimeout(() => {
        nameSavedMessage.classList.add("hidden");
      }, 2000);
    });

    // ボタン選択処理
    function setupToggle(buttons, type) {
      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("ring-4", "ring-offset-2", "ring-green-400", "ring-blue-400"));
          if (type === "caller") {
            selectedCaller = btn.textContent;
            btn.classList.add("ring-4", "ring-offset-2", "ring-green-400");
          } else {
            selectedPurpose = btn.textContent;
            btn.classList.add("ring-4", "ring-offset-2", "ring-blue-400");
          }
        });
      });
    }

    setupToggle(callerButtons, "caller");
    setupToggle(purposeButtons, "purpose");

    // コピー処理
    copyBtn.addEventListener("click", async () => {
      const name = staffNameInput.value.trim();
      const memo = memoInput.value.trim();

      if (!selectedCaller || !selectedPurpose) {
        alert("相手と用件を選択してください。");
        return;
      }

      const message = 
`【電話メモ】
・担当：${name || "（未入力）"}
・相手：${selectedCaller}
・用件：${selectedPurpose}
・詳細：
${memo || "（詳細なし）"}
`;

      try {
        await navigator.clipboard.writeText(message);
        copyMessage.classList.remove("hidden");
        setTimeout(() => {
          copyMessage.classList.add("hidden");
        }, 2500);
      } catch (err) {
        alert("コピーに失敗しました。もう一度お試しください。");
      }
    });
  </script>

</body>
</html>
