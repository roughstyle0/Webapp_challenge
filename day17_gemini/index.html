<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視力測定・順番待ち整理券ボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 番号表示用のフォント設定。数字の視認性を高める */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* スクロールバーを隠す（サイネージ用途を想定） */
            overflow: hidden;
        }
        .number-font {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col select-none">

    <!-- ==========================================
         [上部] お客様向けディスプレイ領域
         ========================================== -->
    <main id="customer-display" class="flex-1 flex flex-col items-center justify-center p-8 transition-colors duration-500 ease-in-out">
        
        <!-- 待ち時間なし（アイドル状態）のUI -->
        <div id="idle-view" class="hidden flex-col items-center justify-center text-center space-y-6 animate-fade-in">
            <svg class="w-32 h-32 text-green-500 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path>
            </svg>
            <h1 class="text-5xl md:text-7xl font-bold text-gray-800 tracking-tight">
                現在、<span class="text-green-600">待ち時間なし</span>で<br>ご案内できます
            </h1>
            <p class="text-2xl text-gray-500 mt-4">視力測定をご希望のお客様はスタッフまでお声がけください</p>
        </div>

        <!-- ご案内中（アクティブ状態）のUI -->
        <div id="active-view" class="flex-col items-center justify-center text-center w-full">
            <h2 class="text-3xl md:text-5xl font-bold text-gray-600 mb-8">現在ご案内中の番号</h2>
            <div class="bg-white rounded-[3rem] shadow-2xl px-12 py-16 md:py-24 border-8 border-blue-500 w-full max-w-5xl mx-auto flex items-center justify-center">
                <div class="flex items-baseline justify-center space-x-4">
                    <span id="current-number-display" class="number-font text-[10rem] md:text-[16rem] font-black text-blue-600 leading-none tracking-tighter shadow-sm">
                        --
                    </span>
                    <span class="text-5xl md:text-8xl font-bold text-gray-700">番</span>
                </div>
            </div>
            <p id="waiting-count-display" class="text-2xl md:text-3xl text-gray-500 mt-10 font-medium">
                次にお待ちのお客様: <span id="next-waiting-number" class="font-bold text-gray-800">--</span> 番 〜
            </p>
        </div>

    </main>

    <!-- ==========================================
         [下部] スタッフ操作領域 (コントローラー)
         ========================================== -->
    <footer class="bg-slate-800 h-1/3 min-h-[250px] p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 flex flex-col justify-center">
        <div class="max-w-7xl mx-auto w-full h-full flex flex-col md:flex-row gap-6 items-stretch">
            
            <!-- 発券ボタン -->
            <button id="issue-btn" class="flex-1 group relative overflow-hidden rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white shadow-lg transition-all active:scale-[0.98] border border-emerald-400/30 flex flex-col items-center justify-center p-4">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                <svg class="w-12 h-12 mb-3 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                <span class="text-2xl md:text-3xl font-bold z-10">新しい整理券を発行する</span>
                <span class="text-emerald-100 mt-2 text-lg z-10">次の番号を発行し、お客様にお見せします</span>
            </button>

            <!-- 案内ボタン -->
            <button id="next-btn" disabled class="flex-1 group relative overflow-hidden rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 disabled:from-slate-600 disabled:to-slate-700 disabled:text-slate-400 disabled:cursor-not-allowed text-white shadow-lg transition-all active:scale-[0.98] disabled:active:scale-100 border border-amber-400/30 disabled:border-slate-500/30 flex flex-col items-center justify-center p-4">
                <svg class="w-12 h-12 mb-3 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                <span class="text-2xl md:text-3xl font-bold z-10">次のお客様をご案内する</span>
                <span id="next-btn-subtext" class="text-amber-100 mt-2 text-lg z-10">現在ご案内中の番号を +1 します</span>
            </button>
            
        </div>
        <!-- 内部状態確認用（スタッフ向け微小表示） -->
        <div class="absolute bottom-2 right-4 text-slate-500 text-sm font-mono">
            Latest: <span id="debug-latest">0</span> | Calling: <span id="debug-calling">0</span>
        </div>
    </footer>

    <!-- ==========================================
         [モーダル] お客様へ見せる用ポップアップ
         ========================================== -->
    <div id="ticket-modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- 背景のオーバーレイ -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" id="modal-backdrop"></div>
        
        <!-- モーダルコンテンツ -->
        <div class="bg-white rounded-[2rem] shadow-2xl w-[90%] max-w-3xl z-10 transform scale-95 opacity-0 transition-all duration-300 relative overflow-hidden" id="modal-content">
            <!-- 上部アクセントカラー -->
            <div class="h-6 bg-emerald-500 w-full"></div>
            
            <div class="p-10 md:p-16 text-center">
                <h3 class="text-3xl md:text-4xl font-bold text-gray-700 mb-6">あなたの番号は</h3>
                <div class="flex items-baseline justify-center space-x-2 my-8">
                    <span id="modal-ticket-number" class="number-font text-[8rem] md:text-[12rem] font-black text-emerald-600 leading-none">
                        0
                    </span>
                    <span class="text-4xl md:text-6xl font-bold text-gray-700">番</span>
                </div>
                <h3 class="text-3xl md:text-4xl font-bold text-gray-700 mt-6">です</h3>
                
                <div class="mt-12 p-6 bg-gray-50 rounded-2xl border border-gray-100">
                    <p class="text-2xl md:text-3xl text-gray-600 font-medium leading-relaxed">
                        順番にお呼びいたします。<br>
                        店内のお椅子にお掛けになって<br>お待ちください。
                    </p>
                </div>

                <button id="close-modal-btn" class="mt-12 bg-gray-800 hover:bg-gray-700 text-white text-2xl font-bold py-6 px-16 rounded-full shadow-lg transition-colors w-full md:w-auto">
                    閉じる (スタッフ用)
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         [ロジック] アプリケーションの動作制御
         ========================================== -->
    <script>
        class QueueSystem {
            constructor() {
                // 状態（State）
                this.state = {
                    latestTicketNumber: 0,   // 最後に発行された番号
                    currentCallingNumber: 0, // 現在ご案内中の番号
                };

                // DOM要素のキャッシュ
                this.els = {
                    displayArea: document.getElementById('customer-display'),
                    idleView: document.getElementById('idle-view'),
                    activeView: document.getElementById('active-view'),
                    currentNumberDisplay: document.getElementById('current-number-display'),
                    waitingCountDisplay: document.getElementById('waiting-count-display'),
                    nextWaitingNumber: document.getElementById('next-waiting-number'),
                    
                    issueBtn: document.getElementById('issue-btn'),
                    nextBtn: document.getElementById('next-btn'),
                    nextBtnSubtext: document.getElementById('next-btn-subtext'),
                    
                    modal: document.getElementById('ticket-modal'),
                    modalContent: document.getElementById('modal-content'),
                    modalTicketNumber: document.getElementById('modal-ticket-number'),
                    closeModalBtn: document.getElementById('close-modal-btn'),
                    modalBackdrop: document.getElementById('modal-backdrop'),

                    debugLatest: document.getElementById('debug-latest'),
                    debugCalling: document.getElementById('debug-calling')
                };

                this.init();
            }

            init() {
                this.bindEvents();
                this.render(); // 初期状態の描画
            }

            bindEvents() {
                // 発券ボタン
                this.els.issueBtn.addEventListener('click', () => this.issueNewTicket());
                // 案内ボタン
                this.els.nextBtn.addEventListener('click', () => this.callNextCustomer());
                // モーダル閉じる
                this.els.closeModalBtn.addEventListener('click', () => this.closeModal());
                this.els.modalBackdrop.addEventListener('click', () => this.closeModal());
            }

            // 状態の更新とレンダリングをトリガー
            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            }

            // アクション: 新しい整理券を発行
            issueNewTicket() {
                const newNumber = this.state.latestTicketNumber + 1;
                this.setState({ latestTicketNumber: newNumber });
                this.showModal(newNumber);
            }

            // アクション: 次のお客様をご案内
            callNextCustomer() {
                if (this.state.currentCallingNumber < this.state.latestTicketNumber) {
                    // もし現在誰も呼んでおらず(0)、発券されているなら次は「1」番からではなく
                    // 発券されている最も古い未案内の番号から呼ぶべきだが、
                    // 要件的に「現在ご案内中の番号を＋1する」とあるため単純にインクリメントする
                    this.setState({ currentCallingNumber: this.state.currentCallingNumber + 1 });
                }
            }

            // UIの描画ロジック (State-driven rendering)
            render() {
                const { latestTicketNumber, currentCallingNumber } = this.state;
                const waitingCount = latestTicketNumber - currentCallingNumber;

                // 1. お客様向けディスプレイの切り替え
                if (waitingCount === 0) {
                    // 誰も待っていない場合（要件: 「現在、待ち時間なしでご案内できます」に切り替え）
                    this.els.activeView.classList.add('hidden');
                    this.els.activeView.classList.remove('flex');
                    this.els.idleView.classList.remove('hidden');
                    this.els.idleView.classList.add('flex');
                    this.els.displayArea.className = 'flex-1 flex flex-col items-center justify-center p-8 transition-colors duration-500 ease-in-out bg-green-50/50';
                } else {
                    // 待っている人がいる場合
                    this.els.idleView.classList.add('hidden');
                    this.els.idleView.classList.remove('flex');
                    this.els.activeView.classList.remove('hidden');
                    this.els.activeView.classList.add('flex');
                    this.els.displayArea.className = 'flex-1 flex flex-col items-center justify-center p-8 transition-colors duration-500 ease-in-out bg-blue-50/30';

                    // 表示番号の制御
                    if (currentCallingNumber === 0) {
                        // 発券はされたが、まだ誰も呼ばれていない状態
                        this.els.currentNumberDisplay.textContent = 'ー';
                        this.els.currentNumberDisplay.classList.remove('text-blue-600');
                        this.els.currentNumberDisplay.classList.add('text-gray-400');
                    } else {
                        // 誰かが呼ばれている状態
                        this.els.currentNumberDisplay.textContent = currentCallingNumber;
                        this.els.currentNumberDisplay.classList.add('text-blue-600');
                        this.els.currentNumberDisplay.classList.remove('text-gray-400');
                    }

                    // 「次にお待ちのお客様」の表示制御
                    if (waitingCount > 0) {
                        this.els.nextWaitingNumber.textContent = currentCallingNumber + 1;
                        this.els.waitingCountDisplay.classList.remove('invisible');
                    } else {
                        this.els.waitingCountDisplay.classList.add('invisible');
                    }
                }

                // 2. スタッフ用コントローラーの制御（エラーハンドリング・堅牢性）
                if (waitingCount <= 0) {
                    this.els.nextBtn.disabled = true;
                    this.els.nextBtnSubtext.textContent = '現在お待ちのお客様はいません';
                    this.els.nextBtnSubtext.classList.replace('text-amber-100', 'text-slate-400');
                } else {
                    this.els.nextBtn.disabled = false;
                    this.els.nextBtnSubtext.textContent = '現在ご案内中の番号を +1 します';
                    this.els.nextBtnSubtext.classList.replace('text-slate-400', 'text-amber-100');
                }

                // デバッグ用表示の更新
                this.els.debugLatest.textContent = latestTicketNumber;
                this.els.debugCalling.textContent = currentCallingNumber;
            }

            // モーダル制御
            showModal(number) {
                this.els.modalTicketNumber.textContent = number;
                
                // 表示アニメーション
                this.els.modal.classList.remove('pointer-events-none');
                
                // 少し遅延させてTailwindのtransitionを発火させる
                requestAnimationFrame(() => {
                    this.els.modal.classList.remove('opacity-0');
                    this.els.modalContent.classList.remove('scale-95', 'opacity-0');
                    this.els.modalContent.classList.add('scale-100', 'opacity-100');
                });
            }

            closeModal() {
                // 非表示アニメーション
                this.els.modal.classList.add('opacity-0');
                this.els.modalContent.classList.remove('scale-100', 'opacity-100');
                this.els.modalContent.classList.add('scale-95', 'opacity-0');
                
                // アニメーション完了後にポインターイベントを無効化
                setTimeout(() => {
                    this.els.modal.classList.add('pointer-events-none');
                }, 300);
            }
        }

        // DOM読み込み完了後にアプリケーションを初期化
        document.addEventListener('DOMContentLoaded', () => {
            new QueueSystem();
        });
    </script>
</body>
</html>
