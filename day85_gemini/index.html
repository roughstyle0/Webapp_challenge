<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEAR PROTECT PRO - 度付きスポーツゴーグル シミュレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        asphalt: '#1c1c1e',
                        carbon: '#0a0a0b',
                        safety: '#facc15', // yellow-400
                        danger: '#ef4444', // red-500
                    },
                    fontFamily: {
                        brand: ['Montserrat', 'sans-serif'],
                        body: ['Noto Sans JP', 'sans-serif'],
                    },
                    backgroundImage: {
                        'carbon-pattern': 'repeating-linear-gradient(45deg, #0a0a0b 25%, transparent 25%, transparent 75%, #0a0a0b 75%, #0a0a0b), repeating-linear-gradient(45deg, #0a0a0b 25%, #151517 25%, #151517 75%, #0a0a0b 75%, #0a0a0b)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.carbon');
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* カスタムクリップパスでスポーツギア風のシャープなUIを実現 */
        .clip-bevel {
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        .clip-bevel-sm {
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        /* テンプレ脱却: ソリッドなボーダーとネオンエフェクト */
        .btn-gear {
            background: rgba(28, 28, 30, 0.8);
            border: 2px solid theme('colors.gray.700');
            transition: all 0.2s ease-out;
            position: relative;
        }
        .btn-gear:hover, .btn-gear:active {
            border-color: theme('colors.safety');
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }
        .btn-gear::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background-color: theme('colors.safety');
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-gear:hover::before, .btn-gear:active::before {
            opacity: 1;
        }

        /* === アニメーション定義 === */
        
        /* 共通: オブジェクト（ボール等）が飛んでくる */
        @keyframes incomingObject {
            0% { transform: translateX(150px) scale(0.5); opacity: 0; }
            40% { transform: translateX(0) scale(1); opacity: 1; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }

        /* 普通のメガネ: 衝撃で壊れる */
        @keyframes breakGlasses {
            0%, 40% { transform: rotate(0deg) scale(1); opacity: 1; stroke: #fff; }
            45% { transform: rotate(-10deg) scale(1.1) skewX(20deg); stroke: theme('colors.danger'); }
            100% { transform: rotate(-15deg) translate(-10px, 10px); stroke: theme('colors.danger'); opacity: 0.5; }
        }

        /* 普通のメガネ: 危険エフェクト（赤） */
        @keyframes dangerFlash {
            0%, 40% { opacity: 0; }
            45% { opacity: 0.8; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }

        /* スポーツゴーグル: 衝撃を跳ね返す（シールド） */
        @keyframes shieldDeploy {
            0%, 35% { opacity: 0; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.1); }
            60% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* スポーツゴーグル: 当たったオブジェクトが弾き飛ぶ */
        @keyframes bounceOff {
            0% { transform: translateX(150px) scale(0.5); opacity: 0; }
            40% { transform: translateX(0) scale(1); opacity: 1; }
            60% { transform: translate(50px, -50px) scale(0.8) rotate(90deg); opacity: 1; }
            100% { transform: translate(150px, -100px) scale(0.5) rotate(180deg); opacity: 0; }
        }

        /* 激しい動き: 揺れ */
        @keyframes intenseShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-5px, 5px) rotate(-5deg); }
            40% { transform: translate(5px, -5px) rotate(5deg); }
            60% { transform: translate(-5px, -5px) rotate(5deg); }
            80% { transform: translate(5px, 5px) rotate(-5deg); }
        }

        /* 激しい動き（メガネ）: ズレ落ちる */
        @keyframes slipDown {
            0%, 30% { transform: translateY(0); }
            60% { transform: translateY(15px) rotate(5deg); stroke: theme('colors.danger'); }
            100% { transform: translateY(20px) rotate(10deg); stroke: theme('colors.danger'); }
        }

        /* アニメーションクラスの適用 */
        .anim-incoming-normal { animation: incomingObject 2s forwards; }
        .anim-incoming-bounce { animation: bounceOff 2s forwards; }
        .anim-break { animation: breakGlasses 2s forwards; transform-origin: center; }
        .anim-danger { animation: dangerFlash 2s forwards; }
        .anim-shield { animation: shieldDeploy 2s forwards; }
        .anim-shake { animation: intenseShake 2s infinite; }
        .anim-slip { animation: slipDown 2s forwards; }
    </style>
</head>
<body class="font-body antialiased flex flex-col min-h-screen">

    <!-- ヘッダーエリア -->
    <header class="w-full bg-asphalt border-b-2 border-safety px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-safety clip-bevel-sm flex items-center justify-center font-brand font-black text-carbon">G</div>
            <h1 class="font-brand font-black text-xl tracking-wider"><span class="text-white">GEAR</span> <span class="text-safety">PROTECT</span> PRO</h1>
        </div>
        <div class="text-xs font-bold text-gray-400 border border-gray-600 px-2 py-1 rounded bg-carbon">
            STAFF TOOL
        </div>
    </header>

    <!-- メインコンテンツ -->
    <!-- flex-growで高さを確保し、paddingで上下左右の余白を死守。文字被りを防ぐ。 -->
    <main class="flex-grow w-full max-w-2xl mx-auto px-4 py-8 flex flex-col gap-8">

        <!-- ========================================== -->
        <!-- STEP 1: シーン選択（プログレッシブ・ディクロージャー） -->
        <!-- ========================================== -->
        <section id="step1" class="flex flex-col gap-4">
            <div class="bg-asphalt p-4 border-l-4 border-safety clip-bevel">
                <h2 class="text-xl font-bold mb-2">お子様のスポーツ時、どんなシーンが不安ですか？</h2>
                <p class="text-sm text-gray-400">お客様の不安に寄り添うシチュエーションを選択してください。</p>
            </div>
            
            <!-- gridでボタンを等間隔配置、スマホでも絶対に崩れない -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <button onclick="app.selectScene('ball')" class="btn-gear clip-bevel p-4 flex flex-col items-center justify-center gap-2 group">
                    <svg class="w-8 h-8 text-gray-300 group-hover:text-safety transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10zM2 12h20"/></svg>
                    <span class="font-bold">球技</span>
                    <span class="text-xs text-gray-400">ボールの衝突</span>
                </button>
                <button onclick="app.selectScene('contact')" class="btn-gear clip-bevel p-4 flex flex-col items-center justify-center gap-2 group">
                    <svg class="w-8 h-8 text-gray-300 group-hover:text-safety transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <span class="font-bold">接触プレー</span>
                    <span class="text-xs text-gray-400">人との衝突・転倒</span>
                </button>
                <button onclick="app.selectScene('movement')" class="btn-gear clip-bevel p-4 flex flex-col items-center justify-center gap-2 group">
                    <svg class="w-8 h-8 text-gray-300 group-hover:text-safety transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    <span class="font-bold">激しい動き</span>
                    <span class="text-xs text-gray-400">ズレ・落下・汗</span>
                </button>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- STEP 2: シミュレーション＆カンペ（初期非表示） -->
        <!-- ========================================== -->
        <section id="step2" class="hidden flex-col gap-4 animate-[fadeIn_0.3s_ease-out]">
            
            <div class="flex items-center justify-between border-b border-gray-700 pb-2">
                <h3 id="scene-title" class="text-lg font-bold text-safety flex items-center gap-2">
                    <!-- JSで挿入 -->
                </h3>
                <button onclick="app.reset()" class="text-xs bg-gray-800 px-3 py-1 rounded hover:bg-gray-700 transition">選び直す</button>
            </div>

            <!-- タブ切り替え（普通のメガネ vs ゴーグル） -->
            <div class="flex bg-carbon border-2 border-gray-800 rounded-lg p-1 gap-1 relative z-10">
                <button id="tab-normal" onclick="app.switchGear('normal')" class="flex-1 py-3 text-sm font-bold rounded-md transition-all text-gray-400 hover:text-white relative overflow-hidden">
                    普通のメガネ
                </button>
                <button id="tab-goggle" onclick="app.switchGear('goggle')" class="flex-1 py-3 text-sm font-bold rounded-md transition-all text-gray-400 hover:text-white relative overflow-hidden">
                    <span class="relative z-10 flex items-center justify-center gap-1">
                        <svg class="w-4 h-4 text-safety" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 1.944A11.954 11.954 0 012.166 5C2.056 5.649 2 6.319 2 7c0 5.225 3.34 9.67 8 11.317C14.66 16.67 18 12.225 18 7c0-.682-.057-1.35-.166-2.001A11.954 11.954 0 0110 1.944zM11 14a1 1 0 11-2 0 1 1 0 012 0zm0-7a1 1 0 10-2 0v3a1 1 0 102 0V7z" clip-rule="evenodd"/></svg>
                        スポーツゴーグル
                    </span>
                </button>
            </div>

            <!-- アニメーション表示エリア（アスペクト比固定で被り絶対防止） -->
            <div class="w-full aspect-video bg-black rounded-lg border-2 border-gray-800 relative overflow-hidden flex items-center justify-center shadow-inner">
                <!-- SVGキャンバス: JSで動的に中身を差し替え -->
                <svg id="sim-canvas" class="w-full h-full max-w-[400px]" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                    <!-- JSにて描画 -->
                </svg>
                
                <!-- 結果ラベル（危険/安全） -->
                <div id="sim-status" class="absolute top-2 right-2 px-3 py-1 text-xs font-black rounded uppercase tracking-widest opacity-0 transition-opacity duration-300">
                </div>
            </div>

            <!-- 接客カンペエリア（手抜き禁止：詳細なトークスクリプト） -->
            <!-- 骨組みをしっかりし、画像エリアと完全に分離 -->
            <div class="bg-gray-800 clip-bevel p-5 relative mt-2">
                <!-- カンペの装飾（クリップボード風） -->
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-16 h-3 bg-gray-600 rounded-full"></div>
                
                <div class="flex items-center gap-2 mb-3 border-b border-gray-700 pb-2">
                    <span class="bg-safety text-black text-xs font-black px-2 py-0.5 rounded">STAFF SCRIPT</span>
                    <span class="text-sm text-gray-300">そのまま読み上げてください</span>
                </div>

                <div class="flex flex-col gap-4 text-sm md:text-base leading-relaxed">
                    <!-- 導入トーク -->
                    <p id="talk-intro" class="text-gray-300 font-bold"></p>
                    
                    <!-- ギアごとの詳細トーク（ハイライト） -->
                    <div id="talk-detail-box" class="p-3 rounded border-l-4">
                        <p id="talk-detail" class="text-white"></p>
                    </div>

                    <!-- 決め台詞（クロージング） -->
                    <div class="bg-black/50 p-4 rounded-lg border border-gray-700 mt-2">
                        <span class="block text-xs text-safety mb-1 font-bold">▶ 提案のキラーフレーズ</span>
                        <p id="talk-closing" class="font-bold text-white"></p>
                    </div>
                </div>
            </div>

            <!-- リプレイボタン -->
            <button onclick="app.replayAnimation()" class="mx-auto flex items-center gap-1 text-gray-400 hover:text-white transition mt-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <span class="text-sm">シミュレーションを再生</span>
            </button>

        </section>
    </main>

    <!-- アプリケーション・ロジック -->
    <script>
        const app = {
            state: {
                scene: null, // 'ball', 'contact', 'movement'
                gear: 'normal', // 'normal', 'goggle'
            },
            
            // データ定義（手抜きなしの詳細テキスト）
            content: {
                ball: {
                    title: "球技（ボールの衝突）",
                    intro: "「サッカーやバスケで、ボールが顔に当たるの、見ているとヒヤッとしますよね。」",
                    closing: "普通のメガネでスポーツをするのは、ヘルメット無しで自転車に乗るのと同じくらい危険です。お子様の一生の視力を守る『安全装置』として、度付きスポーツゴーグルは必須です。",
                    normalTalk: "普通のメガネは衝撃を想定していません。ボールが直撃すると、フレームが折れ曲がり、最悪の場合レンズやパーツが眼球を傷つける大怪我に繋がります。実は非常に危険な状態なんです。",
                    goggleTalk: "スポーツゴーグルなら、分厚いシリコンパッドと強靭なフレーム構造が衝撃を吸収し、バンッ！と跳ね返します。眼の周りに物理的なシールドを張るようなもので、大切なお子様を怪我から守り抜きます。"
                },
                contact: {
                    title: "接触プレー（人・地面との衝突）",
                    intro: "「夢中になると、お友達と激しくぶつかったり、転倒したりすることも多いですよね。」",
                    closing: "眼の怪我は取り返しがつきません。『あの時ゴーグルにしていれば…』と後悔しないためにも、スポーツ専用のギアで安全を確保してあげてください。",
                    normalTalk: "お友達の肘が当たったり、転倒して顔を打った際、細い金属フレームだと顔に食い込んだり、変形して壊れてしまいます。相手の怪我に繋がるリスクもあります。",
                    goggleTalk: "顔のカーブに沿って密着するスポーツゴーグルなら、外部からの強い圧迫にも耐え、衝撃を分散させます。激しい接触でもズレにくく、自分も相手も安全にプレーに集中できます。"
                },
                movement: {
                    title: "激しい動き（ズレ・落下）",
                    intro: "「走ったりジャンプしたり、汗をかくとメガネがずり落ちて集中できない、というお悩みが多いんです。」",
                    closing: "視界がブレないことは、スポーツの上達に直結します。安全面だけでなく、お子様の『最高のパフォーマンス』を引き出すための投資としてご検討ください。",
                    normalTalk: "普通のメガネは耳と鼻だけで支えているため、激しく動くと遠心力や汗で簡単にズレてしまいます。視界がブレると距離感が掴めず、パフォーマンスの低下や思わぬ転倒の原因になります。",
                    goggleTalk: "スポーツ用は専用のヘッドバンドで頭部全体をホールドします。どれだけ激しく動いても、汗をかいても、顔にピタッと張り付くように安定し、常にクリアな視界をキープします。"
                }
            },

            // SVG描画ロジック（CSSアニメーションと連動）
            drawSimulation: function() {
                const canvas = document.getElementById('sim-canvas');
                const s = this.state.scene;
                const g = this.state.gear;

                // ベースの顔（シンプルに）
                let svgHtml = `
                    <g transform="translate(100, 75)">
                        <!-- 顔の輪郭 -->
                        <path d="M-30,-20 C-30,20 0,40 0,40 C0,40 30,20 30,-20 C30,-40 -30,-40 -30,-20 Z" fill="none" stroke="#4b5563" stroke-width="2"/>
                        <!-- 目 -->
                        <circle cx="-12" cy="-5" r="3" fill="#6b7280"/>
                        <circle cx="12" cy="-5" r="3" fill="#6b7280"/>
                        <!-- 鼻 -->
                        <path d="M0,-5 L0,10 L5,10" fill="none" stroke="#4b5563" stroke-width="2"/>
                    </g>
                `;

                // ギアの描画
                if (g === 'normal') {
                    // 普通のメガネ（細い、アニメーションで壊れる）
                    svgHtml += `
                        <g id="gear-obj" transform="translate(100, 70)" stroke="#ffffff" stroke-width="1.5" fill="none">
                            <rect x="-22" y="-10" width="18" height="12" rx="2"/>
                            <rect x="4" y="-10" width="18" height="12" rx="2"/>
                            <path d="M-4,-4 Q0,-8 4,-4" />
                            <path d="M-22,-4 L-35,-4" />
                            <path d="M22,-4 L35,-4" />
                        </g>
                    `;
                } else {
                    // スポーツゴーグル（太い、バンド付き、アニメーションで無傷）
                    svgHtml += `
                        <g id="gear-obj" transform="translate(100, 70)">
                            <!-- バンド -->
                            <path d="M-35,-4 C-45,-4 -45,-10 -35,-10 L35,-10 C45,-10 45,-4 35,-4 Z" fill="#374151" />
                            <!-- パッド・フレーム -->
                            <path d="M-26,-12 L-2,-12 C0,-12 0,-2 0,-2 C0,-2 0,-12 2,-12 L26,-12 C30,-12 30,2 26,4 L2,4 C0,4 0,-2 0,-2 C0,-2 0,4 -2,4 L-26,4 C-30,4 -30,-12 -26,-12 Z" fill="none" stroke="#facc15" stroke-width="4" stroke-linejoin="round"/>
                            <!-- レンズ部 -->
                            <rect x="-24" y="-8" width="20" height="8" rx="1" fill="rgba(250,204,21,0.2)"/>
                            <rect x="4" y="-8" width="20" height="8" rx="1" fill="rgba(250,204,21,0.2)"/>
                        </g>
                    `;
                }

                // シーン別の脅威（ボール、衝撃、揺れ）とアニメーション要素
                if (s === 'ball' || s === 'contact') {
                    // 危険/安全エフェクト
                    if (g === 'normal') {
                        svgHtml += `<circle cx="100" cy="70" r="40" fill="red" id="effect-danger" style="opacity:0;" />`;
                    } else {
                        // 六角形のシールド
                        svgHtml += `<polygon points="100,20 145,45 145,95 100,120 55,95 55,45" fill="none" stroke="#facc15" stroke-width="3" id="effect-shield" style="opacity:0;"/>`;
                    }

                    // 飛んでくるオブジェクト
                    const objShape = s === 'ball' ? 
                        `<circle cx="0" cy="0" r="15" fill="#fff"/><circle cx="0" cy="0" r="10" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="4 2"/>` : 
                        `<path d="M-10,-20 L10,-20 L20,0 L10,20 L-10,20 L-20,0 Z" fill="#ef4444"/>`; // 接触の象徴

                    const animClass = g === 'normal' ? 'anim-incoming-normal' : 'anim-incoming-bounce';
                    svgHtml += `<g transform="translate(180, 70)" id="threat-obj">${objShape}</g>`;
                }

                canvas.innerHTML = svgHtml;
                this.triggerAnimations();
            },

            triggerAnimations: function() {
                const s = this.state.scene;
                const g = this.state.gear;
                const canvas = document.getElementById('sim-canvas');
                const threat = document.getElementById('threat-obj');
                const gearObj = document.getElementById('gear-obj');
                const effectDanger = document.getElementById('effect-danger');
                const effectShield = document.getElementById('effect-shield');
                const statusLabel = document.getElementById('sim-status');

                // アニメーションのリセット（再適用のため）
                if(threat) threat.style.animation = 'none';
                if(gearObj) gearObj.style.animation = 'none';
                if(effectDanger) effectDanger.style.animation = 'none';
                if(effectShield) effectShield.style.animation = 'none';
                canvas.classList.remove('anim-shake');

                // 強制リフロー
                void canvas.offsetWidth;

                // ステータスラベルの初期化
                statusLabel.style.opacity = '0';
                statusLabel.className = 'absolute top-2 right-2 px-3 py-1 text-xs font-black rounded uppercase tracking-widest opacity-0 transition-opacity duration-300';

                // アニメーションの適用
                setTimeout(() => {
                    if (s === 'ball' || s === 'contact') {
                        if (g === 'normal') {
                            if(threat) threat.classList.add('anim-incoming-normal');
                            if(gearObj) gearObj.classList.add('anim-break');
                            if(effectDanger) effectDanger.classList.add('anim-danger');
                            
                            setTimeout(() => {
                                statusLabel.innerText = "DANGER / 破損・負傷の恐れ";
                                statusLabel.classList.add('bg-red-500', 'text-white');
                                statusLabel.style.opacity = '1';
                            }, 800);
                        } else {
                            if(threat) threat.classList.add('anim-incoming-bounce');
                            if(effectShield) effectShield.classList.add('anim-shield');
                            
                            setTimeout(() => {
                                statusLabel.innerText = "SAFE / 衝撃をブロック";
                                statusLabel.classList.add('bg-yellow-400', 'text-black');
                                statusLabel.style.opacity = '1';
                            }, 800);
                        }
                    } else if (s === 'movement') {
                        // 激しい動き（全体を揺らす）
                        canvas.classList.add('anim-shake');
                        if (g === 'normal') {
                            if(gearObj) gearObj.classList.add('anim-slip');
                            setTimeout(() => {
                                statusLabel.innerText = "DANGER / ズレ・落下の恐れ";
                                statusLabel.classList.add('bg-red-500', 'text-white');
                                statusLabel.style.opacity = '1';
                            }, 1200);
                        } else {
                            // ゴーグルは揺れない（canvasは揺れるが、ゴーグル自体は顔に固定されている表現）
                            setTimeout(() => {
                                statusLabel.innerText = "SAFE / 完全ホールド";
                                statusLabel.classList.add('bg-yellow-400', 'text-black');
                                statusLabel.style.opacity = '1';
                            }, 800);
                        }
                    }
                }, 50);
            },

            updateUI: function() {
                // UI表示切り替え（プログレッシブ・ディクロージャー）
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('step2').classList.add('flex');

                // タイトル更新
                document.getElementById('scene-title').innerHTML = this.content[this.state.scene].title;

                // タブのスタイリング
                const tabNormal = document.getElementById('tab-normal');
                const tabGoggle = document.getElementById('tab-goggle');
                const boxNormal = 'bg-gray-700 text-white shadow-md';
                const boxGoggle = 'bg-gradient-to-r from-safety to-yellow-600 text-black shadow-[0_0_15px_rgba(250,204,21,0.4)]';
                
                tabNormal.className = `flex-1 py-3 text-sm font-bold rounded-md transition-all ${this.state.gear === 'normal' ? boxNormal : 'text-gray-400 hover:text-white'}`;
                tabGoggle.className = `flex-1 py-3 text-sm font-bold rounded-md transition-all ${this.state.gear === 'goggle' ? boxGoggle : 'text-gray-400 hover:text-white'}`;

                // トークスクリプトの更新（手抜き禁止）
                const data = this.content[this.state.scene];
                document.getElementById('talk-intro').innerText = data.intro;
                document.getElementById('talk-closing').innerText = data.closing;
                
                const detailBox = document.getElementById('talk-detail-box');
                const detailText = document.getElementById('talk-detail');
                
                if (this.state.gear === 'normal') {
                    detailText.innerText = data.normalTalk;
                    detailBox.classList.remove('border-safety', 'bg-yellow-900/20');
                    detailBox.classList.add('border-danger', 'bg-red-900/20');
                } else {
                    detailText.innerText = data.goggleTalk;
                    detailBox.classList.remove('border-danger', 'bg-red-900/20');
                    detailBox.classList.add('border-safety', 'bg-yellow-900/20');
                }

                // 描画実行
                this.drawSimulation();
            },

            selectScene: function(sceneId) {
                this.state.scene = sceneId;
                this.state.gear = 'normal'; // 常に最初は普通のメガネの危険性を見せる
                this.updateUI();
                
                // トップへスクロール（モバイル配慮）
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            switchGear: function(gearId) {
                if (this.state.gear === gearId) return;
                this.state.gear = gearId;
                this.updateUI();
            },

            replayAnimation: function() {
                this.triggerAnimations();
            },

            reset: function() {
                this.state.scene = null;
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step2').classList.remove('flex');
                document.getElementById('step1').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
