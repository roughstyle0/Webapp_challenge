<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>キッズメガネ・サバイバル シミュレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root {
      --retro-font: 'DotGothic16', sans-serif;
    }
    body {
      font-family: var(--retro-font);
      background-color: #050505;
      color: #ffffff;
      /* スマホでの横揺れ防止 */
      overflow-x: hidden;
      /* CRTモニター風の走査線エフェクト */
      background-image: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 3px 100%;
      /* ダブルタップズーム等の防止 */
      touch-action: manipulation;
    }

    /* レトロなウィンドウ枠 */
    .retro-window {
      border: 4px solid #ffffff;
      /* 立体感を出すドット風シャドウ */
      box-shadow: 4px 4px 0 #555555, inset -2px -2px 0 #222222;
      background-color: #000000;
    }

    /* レトロボタン */
    .retro-btn {
      border: 2px solid #ffffff;
      background-color: #000000;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.1s steps(2);
      position: relative;
    }
    .retro-btn:hover {
      background-color: #ffffff;
      color: #000000;
      box-shadow: 2px 2px 0 #aaaaaa;
    }
    .retro-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* アニメーション：画面揺れ（ダメージ時） */
    @keyframes shake {
      0% { transform: translate(2px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .shake-anim {
      animation: shake 0.4s infinite;
    }

    /* アニメーション：ダメージフラッシュ */
    @keyframes flash {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(220, 38, 38, 0.6); } /* Tailwind red-600 */
    }
    .flash-anim {
      animation: flash 0.15s 3;
    }

    /* HPバーのトランジション */
    #hp-fill {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
    }

    /* 入力待ちカーソル */
    .cursor-blink::after {
      content: '▼';
      animation: blink 1s step-end infinite;
      margin-left: 8px;
      color: #facc15; /* Tailwind yellow-400 */
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* スクロールバー非表示（UIの没入感のため） */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- フラッシュエフェクト用オーバーレイ -->
  <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-50"></div>

  <!-- メインコンテナ（Mobile-first厳守：最大幅を制限し中央配置） -->
  <div id="app-container" class="w-full max-w-md w-full transition-transform duration-100">
    
    <!-- ====================
         画面1: クラス選択（スタート）画面
         ==================== -->
    <div id="start-screen" class="retro-window p-6 md:p-8 flex flex-col items-center">
      <h1 class="text-2xl md:text-3xl text-center text-yellow-400 mb-6 leading-relaxed">
        キッズメガネ<br>
        <span class="text-white text-xl md:text-2xl">サバイバル</span><br>
        <span class="text-sm text-gray-400">～1年間の耐久シミュレーター～</span>
      </h1>
      
      <p class="text-sm md:text-base mb-6 text-center leading-loose">
        お子様の「日常の活発度（クラス）」を<br>選んでください。
      </p>

      <div class="w-full space-y-4">
        <button onclick="startGame('mage')" class="retro-btn w-full py-3 px-4 text-left flex flex-col">
          <span class="text-yellow-300 mb-1">▶ おとなしい魔法使い</span>
          <span class="text-xs text-gray-400">読書やゲームが好き。室内メイン。</span>
        </button>
        
        <button onclick="startGame('warrior')" class="retro-btn w-full py-3 px-4 text-left flex flex-col">
          <span class="text-red-400 mb-1">▶ 活発な戦士</span>
          <span class="text-xs text-gray-400">休み時間は常に外で遊ぶ。体育大好き。</span>
        </button>
        
        <button onclick="startGame('destroyer')" class="retro-btn w-full py-3 px-4 text-left flex flex-col">
          <span class="text-purple-400 mb-1">▶ 予測不能な破壊神</span>
          <span class="text-xs text-gray-400">予期せぬ動きをする。よく転ぶ。</span>
        </button>
      </div>
    </div>

    <!-- ====================
         画面2: シミュレーション（バトル）画面
         ==================== -->
    <div id="battle-screen" class="hidden flex flex-col gap-4">
      
      <!-- ステータスウィンドウ -->
      <div class="retro-window p-4">
        <div class="flex justify-between items-end mb-2">
          <div id="player-class-name" class="text-lg text-yellow-400">クラス名</div>
          <div class="text-sm">メガネのHP <span id="hp-text">100/100</span></div>
        </div>
        
        <!-- HPゲージ -->
        <div class="w-full bg-gray-800 border-2 border-white h-6 relative p-0.5">
          <div id="hp-fill" class="bg-green-500 h-full w-full"></div>
        </div>
      </div>

      <!-- メインビュー（グラフィック枠） -->
      <div class="retro-window h-48 md:h-56 flex items-center justify-center relative overflow-hidden">
        <!-- ドット絵風の代用としてテキストアート/アイコンを使用 -->
        <div id="battle-graphic" class="text-6xl md:text-8xl transition-transform duration-200">
          👓
        </div>
        <!-- ダメージエフェクト表示用 -->
        <div id="damage-number" class="absolute text-red-500 text-4xl font-bold opacity-0 transition-all duration-500 transform scale-50"></div>
      </div>

      <!-- メッセージウィンドウ -->
      <div class="retro-window p-4 h-32 md:h-40 cursor-pointer" onclick="skipTyping()">
        <p id="message-text" class="text-base md:text-lg leading-loose"></p>
        <div id="message-cursor" class="hidden text-right mt-2"><span class="cursor-blink text-yellow-400"></span></div>
      </div>
    </div>

    <!-- ====================
         画面3: リザルト（提案）画面
         ==================== -->
    <div id="result-screen" class="hidden flex flex-col gap-4">
      
      <!-- 診断結果ウィンドウ -->
      <div class="retro-window p-5 text-center">
        <h2 class="text-xl text-yellow-400 mb-4">-- シミュレーション完了 --</h2>
        <div class="mb-4">
          <p class="text-gray-400 text-sm">1年以内の破損・ゆがみ確率</p>
          <p id="break-probability" class="text-4xl text-red-500 mt-2">0%</p>
        </div>
        <p id="result-summary" class="text-sm leading-relaxed"></p>
      </div>

      <!-- 提案トークウィンドウ（スタッフ向け強力な武器） -->
      <div class="retro-window p-5 border-yellow-400">
        <h3 class="text-yellow-400 mb-3 text-sm">▼ プロからの装備提案 ▼</h3>
        <p id="proposal-text" class="text-sm md:text-base leading-relaxed text-blue-200"></p>
      </div>

      <button onclick="resetGame()" class="retro-btn w-full py-4 text-center mt-2">
        ▶ 最初からやり直す
      </button>
    </div>

  </div>

  <!-- ロジック実装 -->
  <script>
    // --- データ定義 ---
    const classData = {
      mage: {
        name: "おとなしい魔法使い",
        icon: "👓 📖",
        prob: "45%",
        summary: "激しい破損は少ないですが、掛け外しによる『フレームの広がり』や『微細なゆがみ』が蓄積します。",
        proposal: "「おとなしいお子様でも、寝落ちやふとした拍子の歪みが視力低下に繋がります。常に正しい見え方を保つための『見え方・破損のW保証プラン』が安心です。」",
        events: [
          { text: "学校生活スタート！", dmg: 0, delay: 1500 },
          { text: "本に夢中になりすぎて、壁にゴツン！", dmg: 10, delay: 2000 },
          { text: "ソファーで寝落ち...メガネが顔の下で圧迫！", dmg: 40, delay: 2000 },
          { text: "片手でメガネを外すクセで、フレームが歪んできた！", dmg: 20, delay: 2000 }
        ]
      },
      warrior: {
        name: "活発な戦士",
        icon: "👓 ⚔️",
        prob: "85%",
        summary: "外遊びやスポーツの衝撃により、フレームが耐えきれず致命的なダメージを負う可能性が非常に高いです。",
        proposal: "「戦士の激しい動きには、通常のフレームでは耐えきれません。衝撃を逃がす『形状記憶フレーム』が必須装備です！さらにW保証があれば最強です。」",
        events: [
          { text: "学校生活スタート！", dmg: 0, delay: 1500 },
          { text: "休み時間、ドッジボールが顔面に直撃！", dmg: 50, delay: 2000 },
          { text: "体育の着替え中、床に落とした！", dmg: 10, delay: 2000 },
          { text: "その落としたメガネを、友達に踏まれた！！", dmg: 40, delay: 2000 }
        ]
      },
      destroyer: {
        name: "予測不能な破壊神",
        icon: "👓 💥",
        prob: "99.9%",
        summary: "通常のメガネでは1年もたない環境です。予測不能な衝撃が絶え間なく襲いかかります。",
        proposal: "「破壊神の圧倒的パワーには『最強の形状記憶フレーム』と『何度でも直せるW保証プラン』のコンボが結局一番コスパが良いです！絶対におつけください！」",
        events: [
          { text: "学校生活スタート！", dmg: 0, delay: 1500 },
          { text: "予測不能なローリングアタックで転倒！", dmg: 30, delay: 2000 },
          { text: "友達とプロレスごっこ！メガネが吹っ飛ぶ！", dmg: 40, delay: 2000 },
          { text: "イライラして、メガネを外して自らへし折る！！", dmg: 999, delay: 2500 }
        ]
      }
    };

    // --- 状態管理 ---
    let currentClass = null;
    let currentHP = 100;
    let maxHP = 100;
    let isTyping = false;
    let skipRequested = false;
    let resolveTyping = null;

    // --- DOM要素取得 ---
    const appContainer = document.getElementById('app-container');
    const flashOverlay = document.getElementById('flash-overlay');
    const startScreen = document.getElementById('start-screen');
    const battleScreen = document.getElementById('battle-screen');
    const resultScreen = document.getElementById('result-screen');
    const hpFill = document.getElementById('hp-fill');
    const hpText = document.getElementById('hp-text');
    const msgText = document.getElementById('message-text');
    const msgCursor = document.getElementById('message-cursor');
    const battleGraphic = document.getElementById('battle-graphic');
    const damageNumber = document.getElementById('damage-number');

    // --- メインフロー ---
    async function startGame(classId) {
      currentClass = classData[classId];
      currentHP = maxHP;
      
      // 画面切り替え
      startScreen.classList.add('hidden');
      battleScreen.classList.remove('hidden');
      
      // 初期化
      document.getElementById('player-class-name').textContent = currentClass.name;
      battleGraphic.textContent = currentClass.icon;
      updateHPUI();
      
      // バトルシミュレーション開始
      for (const event of currentClass.events) {
        if (currentHP <= 0) break; // HP0ならイベントストップ
        
        msgCursor.classList.add('hidden');
        await typeText(event.text);
        
        if (event.dmg > 0) {
          await sleep(500);
          applyDamage(event.dmg);
        }
        
        // ユーザーのタップ待ち or 指定時間待機
        await waitForNext(event.delay);
      }

      // 結果画面へ遷移
      await typeText(currentHP <= 0 ? "メガネは 完全に はかいされた！" : "1年間 なんとか たえぬいた！");
      await waitForNext(2000);
      
      showResult();
    }

    // --- ダメージ処理 ---
    function applyDamage(dmg) {
      // エフェクト発動
      appContainer.classList.add('shake-anim');
      flashOverlay.classList.add('flash-anim');
      
      // ダメージ数値ポップアップ
      damageNumber.textContent = `-${dmg}`;
      damageNumber.style.opacity = '1';
      damageNumber.style.transform = 'translateY(-40px) scale(1)';
      
      // HP減算
      currentHP = Math.max(0, currentHP - dmg);
      updateHPUI();
      
      // エフェクト解除処理
      setTimeout(() => {
        appContainer.classList.remove('shake-anim');
        flashOverlay.classList.remove('flash-anim');
        damageNumber.style.opacity = '0';
        damageNumber.style.transform = 'translateY(0) scale(0.5)';
        
        if (currentHP <= 0) {
          battleGraphic.textContent = "💥 👓 💥"; // 壊れたグラフィック
        }
      }, 500);
    }

    // --- UI更新 ---
    function updateHPUI() {
      hpText.textContent = `${currentHP}/${maxHP}`;
      const percentage = (currentHP / maxHP) * 100;
      hpFill.style.width = `${percentage}%`;
      
      // HPの色変化
      if (percentage > 50) hpFill.style.backgroundColor = '#22c55e'; // green-500
      else if (percentage > 20) hpFill.style.backgroundColor = '#eab308'; // yellow-500
      else hpFill.style.backgroundColor = '#ef4444'; // red-500
    }

    // --- タイピングエフェクト ---
    function typeText(text) {
      return new Promise((resolve) => {
        isTyping = true;
        skipRequested = false;
        msgText.innerHTML = '';
        let i = 0;
        
        resolveTyping = resolve;

        function type() {
          if (skipRequested) {
            msgText.innerHTML = text; // スキップ時は全表示
            finishTyping();
            return;
          }
          if (i < text.length) {
            msgText.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 50); // 1文字50ms
          } else {
            finishTyping();
          }
        }
        type();
      });
    }

    function finishTyping() {
      isTyping = false;
      msgCursor.classList.remove('hidden');
      if (resolveTyping) resolveTyping();
    }

    // メッセージウィンドウクリックでスキップ/次へ
    function skipTyping() {
      if (isTyping) {
        skipRequested = true;
      }
    }

    // --- 待機処理（タップでスキップ可能） ---
    function waitForNext(delay) {
      return new Promise(resolve => {
        let timeout = setTimeout(resolve, delay);
        
        // メッセージウィンドウに一時的なクリックリスナーを追加
        const windowEl = document.querySelector('#battle-screen .retro-window:last-child');
        const clickHandler = () => {
          if (!isTyping) {
            clearTimeout(timeout);
            windowEl.removeEventListener('click', clickHandler);
            resolve();
          }
        };
        windowEl.addEventListener('click', clickHandler);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // --- リザルト画面表示 ---
    function showResult() {
      battleScreen.classList.add('hidden');
      resultScreen.classList.remove('hidden');
      
      document.getElementById('break-probability').textContent = currentClass.prob;
      document.getElementById('result-summary').textContent = currentClass.summary;
      document.getElementById('proposal-text').textContent = currentClass.proposal;
    }

    // --- リセット ---
    function resetGame() {
      resultScreen.classList.add('hidden');
      startScreen.classList.remove('hidden');
      battleGraphic.textContent = "👓"; // アイコン戻す
      msgText.innerHTML = '';
      msgCursor.classList.add('hidden');
    }

  </script>
</body>
</html>
