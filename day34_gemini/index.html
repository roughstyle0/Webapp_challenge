<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2本目提案アドバイザー | Lifestyle Gap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* スムーズなフェードインアニメーション */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ラジオボタンのデフォルトUIを隠す */
        input[type="radio"] {
            display: none;
        }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                <h1 class="font-bold text-lg text-gray-900 tracking-tight">2本目提案アドバイザー</h1>
            </div>
            <span class="text-xs font-medium bg-brand-50 text-brand-700 px-2 py-1 rounded-full border border-brand-200">Staff Only</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-6">
        <p class="text-sm text-gray-600 mb-6 bg-white p-4 rounded-lg shadow-sm border-l-4 border-brand-500">
            お客様の「今のメガネ」と「一番のストレス」を選択してください。<br>最適な2本目と、そのまま使えるトークスクリプトをご提案します。
        </p>

        <!-- Step 1: メインメガネ -->
        <section class="mb-8">
            <h2 class="text-md font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-gray-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                現在のメインメガネは？
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="main-glasses-group">
                <!-- JSで動的に生成 -->
            </div>
        </section>

        <!-- Step 2: ストレスシーン -->
        <section class="mb-8 opacity-50 transition-opacity duration-300 pointer-events-none" id="stress-section">
            <h2 class="text-md font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-gray-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                一番ストレスを感じる瞬間は？
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="stress-scene-group">
                <!-- JSで動的に生成 -->
            </div>
        </section>

        <!-- エラーメッセージ -->
        <div id="error-message" class="hidden text-red-500 text-sm font-medium mb-4 text-center">
            両方の項目を選択してください。
        </div>

        <!-- アクションボタン -->
        <div class="sticky bottom-4 z-10 md:static md:bottom-auto">
            <button id="diagnose-btn" disabled class="w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl shadow-lg transition-all duration-300 transform scale-[0.98]">
                選択してください
            </button>
        </div>

        <!-- 診断結果エリア -->
        <section id="result-section" class="hidden mt-8">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 fade-in">
                <!-- ヘッダー部分 -->
                <div class="bg-gradient-to-r from-brand-600 to-brand-500 p-5 text-white">
                    <div class="flex items-center gap-2 text-brand-100 text-sm font-medium mb-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        おすすめの2本目
                    </div>
                    <h3 id="res-recommend" class="text-2xl font-bold tracking-tight">--</h3>
                </div>
                
                <div class="p-5 md:p-6 space-y-6">
                    <!-- なぜ必要なのか（ギャップ） -->
                    <div>
                        <h4 class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                            <span class="bg-red-100 text-red-600 p-1 rounded">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            </span>
                            なぜ今のメガネだと疲れるのか？（ギャップ）
                        </h4>
                        <p id="res-gap" class="text-gray-600 text-sm leading-relaxed bg-gray-50 p-4 rounded-lg border border-gray-100"></p>
                    </div>

                    <!-- トークスクリプト -->
                    <div>
                        <h4 class="flex items-center justify-between text-sm font-bold text-gray-700 mb-2">
                            <div class="flex items-center gap-2">
                                <span class="bg-brand-100 text-brand-600 p-1 rounded">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                </span>
                                そのまま使える！提案トーク
                            </div>
                            <button id="copy-btn" class="text-xs text-brand-600 font-medium bg-brand-50 px-2 py-1 rounded hover:bg-brand-100 transition-colors">
                                コピー
                            </button>
                        </h4>
                        <div class="relative">
                            <div class="absolute -left-2 top-2 text-4xl text-brand-200 font-serif leading-none">"</div>
                            <p id="res-talk" class="text-gray-800 font-medium text-base leading-relaxed pl-6 pr-2 py-2"></p>
                            <div class="absolute -right-2 bottom-0 text-4xl text-brand-200 font-serif leading-none">"</div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 border-t border-gray-100 p-4 text-center">
                    <button onclick="resetApp()" class="text-sm font-medium text-gray-500 hover:text-gray-800 underline underline-offset-4 transition-colors">
                        条件を選び直す
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- データ定義 ---
        const optionsMain = [
            { id: 'progressive', label: '遠近両用', desc: '普段ずっと掛けている', icon: 'M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
            { id: 'distance', label: '遠く用', desc: '運転や外出時だけ', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
            { id: 'reading', label: '老眼鏡', desc: '手元を見る時だけ', icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' }
        ];

        const optionsStress = [
            { id: 'pc', label: 'PC・スマホ作業', desc: '長時間の画面直視', icon: 'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' },
            { id: 'drive', label: '運転・強い日差し', desc: '夜間や西日など', icon: 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z' },
            { id: 'house', label: '家事・室内移動', desc: 'テレビと手元の往復', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' }
        ];

        const logicDatabase = {
            'progressive_pc': {
                recommend: '近々両用（PC専用レンズ）',
                gap: '遠近両用は万能ですが、PC画面の距離（約50cm）を見るエリアが狭く、ピントを合わせるために無意識にアゴが上がってしまい、首や肩に多大な負担がかかります。',
                talk: '遠近両用は万能ですが、実はパソコンの画面を見る時はアゴを少し上げないとピントが合わず、首や肩が凝りやすいんです。お仕事中だけ『デスクワーク専用（近々両用）』に掛け替えると、姿勢が真っ直ぐになり、驚くほど体が楽になりますよ！2本目の使い分け、絶対におすすめです。'
            },
            'progressive_drive': {
                recommend: 'ドライブ用カラーレンズ（偏光・遮光）',
                gap: '遠近両用で視力は補正できていますが、透明なレンズでは対向車の強烈なヘッドライトや西日の乱反射は防げず、眼精疲労や見落としのリスクが高まります。',
                talk: '遠近両用は便利ですが、運転中の眩しさや見えにくさには『ドライブ専用の偏光・遮光レンズ』が圧倒的におすすめです。フロントガラスの反射が消えて、視界が驚くほどクリアになりますよ。安全運転のためにも、車に1本置いておくと安心です。'
            },
            'progressive_house': {
                recommend: '中近両用（室内専用レンズ）',
                gap: '遠近両用は「遠く」を優先して作られているため、室内で一番見る「中間距離（テレビなど）」から「手元（スマホ・料理）」にかけての視野がやや狭く、疲れを感じやすくなります。',
                talk: '遠近両用でお家の中を過ごされると、足元がフワフワしたり、テレビを見る時に少し見えにくさを感じませんか？お家の中では『室内専用（中近両用）』に掛け替えると、テレビからお手元までが一番広くスッキリ見えて、本当にリラックスできますよ！'
            },
            'distance_pc': {
                recommend: '近々両用 または サポートレンズ',
                gap: '遠くにピントが合っているメガネで近くの画面を見続けると、目のピント調節筋（毛様体筋）が常に緊張状態になり、ひどい眼精疲労を引き起こします。',
                talk: '遠く用のメガネで長時間パソコンやスマホを見ると、目が悲鳴を上げてしまいます！手元の距離にピントを合わせた『デスクワーク専用（近々両用）』に掛け替えるだけで、目の疲れや肩こりが劇的に変わります。お仕事の生産性も上がりますよ。'
            },
            'distance_drive': {
                recommend: '度付きの偏光レンズ または 遮光レンズ',
                gap: '遠くはしっかり見えていますが、光の眩しさによる見えにくさや眼精疲労はクリアレンズでは防げません。西日などで一瞬視界が奪われるのは非常に危険です。',
                talk: '運転の時、日差しや対向車のライトが眩しくてヒヤッとすることはありませんか？度数は今のままで『ドライブ専用の偏光レンズ』のメガネを1本車に積んでおくと、眩しさがスッと消えて本当に快適に運転できます。命を守るアイテムとしてもおすすめです。'
            },
            'distance_house': {
                recommend: '中近両用（室内専用レンズ）',
                gap: '遠く用のメガネだと手元が見えづらく、料理やスマホのたびにメガネを外したりズラしたりする手間が発生し、日常の小さなストレスが蓄積します。',
                talk: '遠く用のメガネだと、お料理の時の手元やスマホが見えづらいですよね。お家の中では遠くを見る必要があまりないので、テレビから手元までが一番広くスッキリ見える『室内用（中近両用）』に掛け替えると、家事のストレスが激減しますよ！'
            },
            'reading_pc': {
                recommend: '近々両用（デスクワーク専用）',
                gap: '老眼鏡は読書距離（約30cm）専用です。PC画面（約50cm）を見るには前かがみになる必要があり、姿勢悪化による腰痛や肩こりの原因になります。',
                talk: 'お手元用のメガネだと、パソコンの画面が少しぼやけませんか？画面に顔を近づけてしまうと首や肩が痛くなりますよね。手元からパソコン画面までスッキリ見える『デスクワーク専用（近々両用）』なら、正しい姿勢のまま楽にお仕事できますよ。'
            },
            'reading_drive': {
                recommend: '遠く用 または 遠近両用カラーレンズ',
                gap: '老眼鏡のままでは遠くが全く見えず、運転は非常に危険です。安全に運転するためには、遠くにピントが合い、かつ眩しさを抑える専用のメガネが必須です。',
                talk: '運転の時は、標識や信号を瞬時に確認する必要があります。遠くがクッキリ見えて、さらに眩しさも抑えられる『ドライブ用メガネ』は安全のために必須のアイテムです。掛け外しの手間を省くなら、遠近両用にするのも大変便利ですよ。'
            },
            'reading_house': {
                recommend: '中近両用（室内専用レンズ）',
                gap: '老眼鏡は手元専用のため、掛けたまま歩いたりテレビを見たりすると視界がぼやけてクラクラし、転倒のリスクもあります。',
                talk: '老眼鏡を掛けたままちょっと移動しようとして、ヒヤッとしたことはありませんか？お家の中で過ごす時は、手元からテレビの距離までカバーできる『室内専用（中近両用）』にすると、掛け外しの煩わしさがなくなって本当に安全で快適です！'
            }
        };

        // --- 状態管理 ---
        let state = {
            main: null,
            stress: null
        };

        // --- DOM要素の取得 ---
        const els = {
            mainGroup: document.getElementById('main-glasses-group'),
            stressGroup: document.getElementById('stress-scene-group'),
            stressSection: document.getElementById('stress-section'),
            diagBtn: document.getElementById('diagnose-btn'),
            resSection: document.getElementById('result-section'),
            resRecommend: document.getElementById('res-recommend'),
            resGap: document.getElementById('res-gap'),
            resTalk: document.getElementById('res-talk'),
            errMsg: document.getElementById('error-message'),
            copyBtn: document.getElementById('copy-btn')
        };

        // --- 初期化 ---
        function init() {
            renderOptions(optionsMain, els.mainGroup, 'main');
            renderOptions(optionsStress, els.stressGroup, 'stress');
            
            els.diagBtn.addEventListener('click', handleDiagnose);
            els.copyBtn.addEventListener('click', handleCopy);
        }

        // --- UI生成 ---
        function renderOptions(options, container, type) {
            container.innerHTML = options.map(opt => `
                <label class="cursor-pointer group relative">
                    <input type="radio" name="${type}" value="${opt.id}" onchange="handleSelect('${type}', '${opt.id}')">
                    <div class="option-card h-full bg-white border-2 border-gray-200 rounded-xl p-4 transition-all duration-200 hover:border-brand-300 hover:bg-brand-50 flex flex-col items-center text-center gap-2">
                        <div class="text-gray-400 group-hover:text-brand-500 transition-colors icon-wrapper">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="${opt.icon}"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="font-bold text-gray-800 label-text">${opt.label}</div>
                            <div class="text-xs text-gray-500 mt-1 desc-text">${opt.desc}</div>
                        </div>
                        <!-- 選択時チェックマーク（非表示） -->
                        <div class="check-icon hidden absolute top-2 right-2 text-brand-500">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        </div>
                    </div>
                </label>
            `).join('');
        }

        // --- イベントハンドラー ---
        function handleSelect(type, id) {
            state[type] = id;
            
            // UIの更新 (ラジオボタンのスタイル切り替え)
            const group = type === 'main' ? els.mainGroup : els.stressGroup;
            const labels = group.querySelectorAll('label');
            
            labels.forEach(label => {
                const input = label.querySelector('input');
                const card = label.querySelector('.option-card');
                const check = label.querySelector('.check-icon');
                const iconWrap = label.querySelector('.icon-wrapper');
                const labelTxt = label.querySelector('.label-text');
                
                if (input.value === id) {
                    card.classList.remove('border-gray-200', 'bg-white');
                    card.classList.add('border-brand-500', 'bg-brand-50', 'ring-2', 'ring-brand-200', 'ring-offset-1');
                    check.classList.remove('hidden');
                    iconWrap.classList.add('text-brand-600');
                    iconWrap.classList.remove('text-gray-400');
                    labelTxt.classList.add('text-brand-800');
                } else {
                    card.classList.remove('border-brand-500', 'bg-brand-50', 'ring-2', 'ring-brand-200', 'ring-offset-1');
                    card.classList.add('border-gray-200', 'bg-white');
                    check.classList.add('hidden');
                    iconWrap.classList.remove('text-brand-600');
                    iconWrap.classList.add('text-gray-400');
                    labelTxt.classList.remove('text-brand-800');
                }
            });

            // Step 1が選ばれたら Step 2を活性化
            if (state.main) {
                els.stressSection.classList.remove('opacity-50', 'pointer-events-none');
            }

            // 両方選ばれたらボタンを活性化
            updateButtonState();
        }

        function updateButtonState() {
            if (state.main && state.stress) {
                els.diagBtn.disabled = false;
                els.diagBtn.textContent = '最適な2本目を診断する';
                els.diagBtn.className = 'w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] text-lg';
                els.errMsg.classList.add('hidden');
            } else {
                els.diagBtn.disabled = true;
                els.diagBtn.textContent = state.main ? '次にストレスの瞬間を選んでください' : '選択してください';
                els.diagBtn.className = 'w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl shadow-lg transition-all duration-300 transform scale-[0.98] cursor-not-allowed';
            }
        }

        function handleDiagnose() {
            if (!state.main || !state.stress) {
                els.errMsg.classList.remove('hidden');
                return;
            }

            const key = `${state.main}_${state.stress}`;
            const result = logicDatabase[key];

            if (!result) {
                alert('予期せぬエラーが発生しました。リロードしてください。');
                return;
            }

            // 結果の注入
            els.resRecommend.textContent = result.recommend;
            els.resGap.textContent = result.gap;
            els.resTalk.innerHTML = result.talk; // HTML(強調など)を入れる余地を残すためinnerHTML

            // 表示とアニメーション
            els.resSection.classList.remove('hidden');
            
            // 少し遅延させてスクロール（レンダリングを待つため）
            setTimeout(() => {
                els.resSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function handleCopy() {
            const textToCopy = els.resTalk.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = els.copyBtn.textContent;
                els.copyBtn.textContent = 'コピー完了！';
                els.copyBtn.classList.add('bg-brand-500', 'text-white');
                els.copyBtn.classList.remove('bg-brand-50', 'text-brand-600');
                
                setTimeout(() => {
                    els.copyBtn.textContent = originalText;
                    els.copyBtn.classList.remove('bg-brand-500', 'text-white');
                    els.copyBtn.classList.add('bg-brand-50', 'text-brand-600');
                }, 2000);
            }).catch(err => {
                console.error('コピーに失敗しました', err);
            });
        }

        function resetApp() {
            // 状態リセット
            state.main = null;
            state.stress = null;
            
            // UIリセット（ラジオボタンの選択解除とスタイルのリセット）
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
            
            // 一度再レンダリングして初期状態に戻す
            init();

            // セクションの初期化
            els.stressSection.classList.add('opacity-50', 'pointer-events-none');
            els.resSection.classList.add('hidden');
            updateButtonState();

            // 上部にスクロール
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 起動
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
