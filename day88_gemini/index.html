<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERFORMANCE BOOSTER | ゲーミングメガネ シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#0a0a0c',
                            panel: '#15151e',
                            purple: '#b026ff',
                            purpleDark: '#5a0a8c',
                            green: '#00ffcc',
                            greenDark: '#008066',
                            text: '#e2e8f0',
                            alert: '#ff2a5f'
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        cyber: ['Rajdhani', 'sans-serif']
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 4s linear infinite',
                        'glitch': 'glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(1000%)' }
                        },
                        glitch: {
                            '0%': { transform: 'translate(0)' },
                            '20%': { transform: 'translate(-2px, 1px)' },
                            '40%': { transform: 'translate(-1px, -1px)' },
                            '60%': { transform: 'translate(2px, 1px)' },
                            '80%': { transform: 'translate(1px, -1px)' },
                            '100%': { transform: 'translate(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0c;
            /* サイバーなグリッド背景 */
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #e2e8f0;
        }
        
        /* サイバー感のある斜めカット形状 */
        .clip-cyber {
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        .clip-cyber-button {
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
        }
        
        /* 発光エフェクト */
        .glow-purple { box-shadow: 0 0 15px rgba(176, 38, 255, 0.4); border-color: #b026ff; }
        .glow-green { box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); border-color: #00ffcc; }
        
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #b026ff; border-radius: 4px; }
    </style>
</head>

                        <!-- Text Inject Here -->

        const toggleBg = document.getElementById('toggle-bg');

            currentMode = 'normal'; // 初期状態は普通のメガネ

            updateSimulation();
            updateToggleUI();

            // 画面切り替え
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 戻るボタン
        function resetApp() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // トグルスイッチ切り替え
        function switchMode(mode) {
            if(currentMode === mode) return;
            currentMode = mode;
            updateToggleUI();
            updateSimulation();
        }

        // トグルUIの見た目更新
        function updateToggleUI() {
            if(currentMode === 'normal') {
                toggleBg.style.transform = 'translateX(0)';
                toggleBg.className = 'absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-gray-700 rounded-full transition-all duration-300 ease-out z-0';
                btnNormal.classList.replace('text-gray-400', 'text-white');
                btnGaming.classList.replace('text-white', 'text-gray-400');
            } else {
                toggleBg.style.transform = 'translateX(100%)';
                toggleBg.className = 'absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-cyber-green rounded-full transition-all duration-300 ease-out z-0 shadow-[0_0_15px_rgba(0,255,204,0.4)]';
                btnNormal.classList.replace('text-white', 'text-gray-400');
                btnGaming.classList.replace('text-gray-400', 'text-cyber-bg');
            }
        }

        // シミュレーション（SVG＆テキスト）の描画更新
        function updateSimulation() {
            const data = simData[currentIssue][currentMode];
            
            // SVG挿入
            svgContainer.innerHTML = data.svg;
            
            // ラベル更新
            statusLabel.textContent = data.label;
            
            // コンテナの枠線・ラベル色をテーマに合わせて変更
            if(data.theme === 'alert') {
                viewerContainer.className = "clip-cyber bg-cyber-panel border-2 border-cyber-purple w-full aspect-video md:aspect-[21/9] relative overflow-hidden transition-colors duration-500 flex justify-center items-center shadow-[inset_0_0_50px_rgba(176,38,255,0.05)]";
                statusLabel.className = "absolute top-4 left-4 bg-cyber-purple/20 text-cyber-purple border border-cyber-purple px-3 py-1 rounded font-cyber text-xs md:text-sm font-bold tracking-widest backdrop-blur-md";
            } else {
                viewerContainer.className = "clip-cyber bg-cyber-panel border-2 border-cyber-green w-full aspect-video md:aspect-[21/9] relative overflow-hidden transition-colors duration-500 flex justify-center items-center shadow-[inset_0_0_50px_rgba(0,255,204,0.1)] glow-green";
                statusLabel.className = "absolute top-4 left-4 bg-cyber-green/20 text-cyber-green border border-cyber-green px-3 py-1 rounded font-cyber text-xs md:text-sm font-bold tracking-widest backdrop-blur-md";
            }

            // トークスクリプトのパース（カスタムタグをTailwindクラス付きのHTMLに変換）
            let parsedTalk = data.talk
                .replace(/<alert>(.*?)<\/alert>/g, '<span class="text-cyber-alert font-bold bg-cyber-alert/10 px-1 rounded">$1</span>')
                .replace(/<highlight>(.*?)<\/highlight>/g, '<strong class="text-cyber-green font-bold bg-cyber-green/10 px-1 rounded shadow-[0_0_8px_rgba(0,255,204,0.3)]">$1</strong>');
            
            // フェードイン効果のため一度透明にしてからテキストを入れる
            talkText.style.opacity = 0;
            setTimeout(() => {
                talkText.innerHTML = parsedTalk;
                talkText.style.opacity = 1;
                talkText.style.transition = "opacity 0.5s ease-in";
            }, 50);
        }

    </script>
</body>
</html>
