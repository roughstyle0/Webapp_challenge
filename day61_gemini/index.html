<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV Defender Simulator | 瞳の紫外線ダメージ予測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Typography & Variables */
        :root {
            --primary-cyan: #06b6d4;
            --toxic-purple: #c026d3;
            --safe-green: #10b981;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0f9ff;
            color: #0f172a;
            overflow-x: hidden;
        }
        .font-num { font-family: 'Teko', sans-serif; }

        /* Scientific Grid Background */
        .bg-grid {
            background-color: #f0f9ff;
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
        }

        /* テンプレ脱却: Scientific Panel UI (白背景角丸の禁止) */
        .sci-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,249,255,0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(6, 182, 212, 0.4);
            /* 角を切り落としたポリゴン形状で科学館の計測器感を演出 */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            position: relative;
        }
        /* パネルの四隅にHUD風のブラケット装飾 */
        .sci-panel::before, .sci-panel::after {
            content: ''; position: absolute; width: 10px; height: 10px; border-color: var(--primary-cyan); border-style: solid;
        }
        .sci-panel::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .sci-panel::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* Buttons */
        .btn-target {
            position: relative;
            background: rgba(6, 182, 212, 0.05);
            border: 2px solid var(--primary-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-target:hover, .btn-target:active {
            background: var(--primary-cyan);
            color: white;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            transform: translateY(-2px);
        }

        /* Animations */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
        .fade-exit { opacity: 1; transform: translateY(0); }
        .fade-exit-active { opacity: 0; transform: translateY(-10px); transition: opacity 0.3s ease-in, transform 0.3s ease-in; }

        /* Meter Bar Styles */
        .meter-track {
            background: #cbd5e1;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
            height: 24px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .toxic-bar {
            background: linear-gradient(90deg, #d946ef, #e11d48, #9f1239);
            box-shadow: 0 0 10px rgba(225, 29, 72, 0.8);
            position: relative;
        }
        /* 危険レベルに達した際の脈打ちエフェクト */
        @keyframes pulse-toxic {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .toxic-bar.danger::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.2);
            animation: pulse-toxic 1s infinite;
        }
        .safe-bar {
            background: linear-gradient(90deg, #34d399, #059669);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* 接客トークエリアの装飾 (カンペ風) */
        .talk-script-box {
            border-left: 4px solid var(--primary-cyan);
            background: linear-gradient(to right, rgba(6, 182, 212, 0.1), transparent);
            position: relative;
        }
        .talk-script-box::before {
            content: '接客スクリプト';
            position: absolute;
            top: -10px; left: 10px;
            background: var(--primary-cyan);
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            font-weight: bold;
            letter-spacing: 0.05em;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center p-4 sm:p-6 md:p-8">

    <!-- Background -->
    <div class="bg-grid"></div>

    <!-- Main Container -->
    <main class="w-full max-w-lg mx-auto relative z-10 flex flex-col gap-6">

        <!-- Header -->
        <header class="text-center mt-4 sm:mt-8">
            <p class="text-cyan-600 font-bold tracking-widest text-xs sm:text-sm mb-1 uppercase flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                UV Defender Analyzer
            </p>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-800 leading-tight">
                子供の瞳の<br class="sm:hidden" /><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-600">UVダメージ</span>予測
            </h1>
        </header>

        <!-- STEP 1: Target Selection (プログレッシブ・ディクロージャー初期画面) -->
        <section id="step-1" class="sci-panel p-6 sm:p-8 w-full mt-4 transition-all duration-500">
            <h2 class="text-center font-bold text-slate-700 mb-6 text-sm sm:text-base border-b border-cyan-200 pb-2">
                お子様の現在の年齢を選択してください
            </h2>
            <div class="flex flex-col gap-4">
                <button onclick="selectTarget('infant')" class="btn-target flex flex-col items-start p-4 text-left group">
                    <span class="font-black text-lg text-cyan-700 group-hover:text-white transition-colors">幼児 <span class="text-sm font-normal">(0〜5歳)</span></span>
                    <span class="text-xs text-slate-500 mt-1 group-hover:text-cyan-100 font-medium">瞳が最も紫外線を透す、無防備な時期</span>
                </button>
                <button onclick="selectTarget('child')" class="btn-target flex flex-col items-start p-4 text-left group">
                    <span class="font-black text-lg text-cyan-700 group-hover:text-white transition-colors">小学生 <span class="text-sm font-normal">(6〜12歳)</span></span>
                    <span class="text-xs text-slate-500 mt-1 group-hover:text-cyan-100 font-medium">一生のうちで最も外遊びの時間が長い時期</span>
                </button>
                <button onclick="selectTarget('teen')" class="btn-target flex flex-col items-start p-4 text-left group">
                    <span class="font-black text-lg text-cyan-700 group-hover:text-white transition-colors">中学生 <span class="text-sm font-normal">(13〜15歳)</span></span>
                    <span class="text-xs text-slate-500 mt-1 group-hover:text-cyan-100 font-medium">部活などで強烈な紫外線を浴び続ける時期</span>
                </button>
            </div>
        </section>

        <!-- STEP 2: Simulation Result (選択後に展開) -->
        <section id="step-2" class="hidden w-full flex flex-col gap-5">
            
            <!-- Result Panel -->
            <div class="sci-panel p-5 sm:p-6 w-full fade-enter" id="result-panel">
                <div class="flex justify-between items-center mb-4 border-b border-cyan-200 pb-2">
                    <h3 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
                        20歳までのダメージ蓄積予測
                    </h3>
                    <button onclick="resetApp()" class="text-xs text-cyan-600 underline hover:text-cyan-800 font-medium">再選択</button>
                </div>

                <!-- Danger Meter (無対策) -->
                <div class="mb-6">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xs font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-sm">無対策 (またはUVカット機能なし)</span>
                        <span class="font-num text-3xl font-bold text-rose-700 leading-none"><span id="danger-val">0</span>%</span>
                    </div>
                    <div class="meter-track">
                        <div id="danger-bar" class="meter-fill toxic-bar"></div>
                    </div>
                    <p class="text-[10px] sm:text-xs text-rose-500 mt-1 font-medium text-right" id="danger-label">危険水域（眼病リスク急増）</p>
                </div>

                <!-- Safe Meter (対策あり) -->
                <div class="mb-2">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-sm flex items-center gap-1">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            高品質UVカットレンズ使用
                        </span>
                        <span class="font-num text-xl font-bold text-emerald-600 leading-none"><span id="safe-val">0</span>%</span>
                    </div>
                    <div class="meter-track h-3 sm:h-4">
                        <div id="safe-bar" class="meter-fill safe-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Logic & Script Panel -->
            <div class="sci-panel p-5 sm:p-6 w-full fade-enter" id="text-panel" style="animation-delay: 0.2s;">
                <!-- 眼科学的ロジック -->
                <div class="mb-5">
                    <h4 class="text-xs font-bold text-cyan-600 mb-2 flex items-center gap-1 uppercase tracking-wider">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Ophthalmological Logic
                    </h4>
                    <p id="logic-text" class="text-sm sm:text-base text-slate-700 leading-relaxed font-medium bg-white/50 p-3 rounded-r-lg border-l-2 border-slate-300">
                        <!-- JSで挿入 -->
                    </p>
                </div>

                <!-- 接客トークスクリプト -->
                <div class="talk-script-box pt-4 pb-3 px-4 sm:px-5 mt-2">
                    <p id="talk-text" class="text-sm sm:text-base text-slate-800 leading-relaxed font-bold">
                        <!-- JSで挿入 -->
                    </p>
                </div>
            </div>

        </section>

    </main>

    <script>
        // ターゲット層ごとの詳細なデータ（ロジックとテキストの手抜き禁止ルール準拠）
        const dataConfig = {
            infant: {
                dangerVal: 98,
                safeVal: 15,
                logic: "0〜5歳の瞳の水晶体は非常に透明度が高く、紫外線の約70%以上を網膜まで通過させてしまいます。細胞分裂が活発なこの時期の無防備な外出は、将来の白内障や黄斑変性症などの眼病リスクを急激に高める要因となります。",
                talk: "「お客様、実はお子様の瞳は、大人と比べて3倍も紫外線を奥まで通してしまうってご存知でしたか？ 外遊びが一番楽しい時期だからこそ、これはファッションではなく、将来の目の健康を守る『かける日焼け止め』として、最も早い対策をおすすめしております。」"
            },
            child: {
                dangerVal: 85,
                safeVal: 12,
                logic: "小学生は一生のうちで最も外遊びの時間が長い時期です。WHO（世界保健機関）のデータでも、人が生涯に浴びる紫外線の大部分を18歳までに浴びると警告されており、この時期の累積ダメージが将来の目の健康を左右します。",
                talk: "「小学生の時期は、休み時間や放課後など、無意識に大量の紫外線を浴びる『ダメージのゴールデンタイム』なんです。大人になってから後悔しないために、毎日の通学や外遊びの必需品として、高品質なレンズでしっかりガードしてあげませんか？」"
            },
            teen: {
                dangerVal: 72,
                safeVal: 10,
                logic: "中学生は部活動などで長時間の屋外活動が増大する時期です。成長期特有のホルモンバランスの変化に加え、強烈な紫外線ストレス（酸化ストレス）は目の疲労を蓄積させ、スポーツのパフォーマンス低下や視力低下の引き金になり得ます。",
                talk: "「部活などで毎日長時間、強い日差しの下にいる中学生の目は、大人が想像する以上の深刻なダメージを蓄積しています。スポーツのパフォーマンスを落とさないためにも、ただの眩しさよけではない『確実なUVプロテクト機能』を持ったメガネが今、不可欠なんです。」"
            }
        };

        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const dangerBar = document.getElementById('danger-bar');
        const safeBar = document.getElementById('safe-bar');
        const dangerValEl = document.getElementById('danger-val');
        const safeValEl = document.getElementById('safe-val');
        const logicText = document.getElementById('logic-text');
        const talkText = document.getElementById('talk-text');

        // 数値のカウントアップアニメーション関数
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // イーズアウト処理（最初速く、最後ゆっくり）
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeOutQuart * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // ターゲット選択時の処理（プログレッシブ・ディクロージャー）
        function selectTarget(targetType) {
            const data = dataConfig[targetType];

            // 1. Step1をフェードアウト
            step1.classList.add('fade-exit-active');
            
            setTimeout(() => {
                step1.classList.add('hidden');
                step1.classList.remove('fade-exit-active');

                // 2. データをセット
                logicText.innerHTML = data.logic;
                talkText.innerHTML = data.talk;
                
                // 3. Step2を表示してフェードイン
                step2.classList.remove('hidden');
                
                // パネルの表示アニメーション用クラスを一旦リセットして再付与
                const panels = step2.querySelectorAll('.fade-enter');
                panels.forEach(p => {
                    p.classList.remove('fade-enter-active');
                    void p.offsetWidth; // リフローを強制
                    p.classList.add('fade-enter-active');
                });

                // 4. メーターと数値のアニメーション開始 (少し遅延させて視覚的効果を高める)
                setTimeout(() => {
                    // バーの伸長
                    dangerBar.style.width = data.dangerVal + '%';
                    safeBar.style.width = data.safeVal + '%';
                    
                    // 数値のカウントアップ
                    animateValue(dangerValEl, 0, data.dangerVal, 1500);
                    animateValue(safeValEl, 0, data.safeVal, 1500);

                    // 危険水域（80%以上）の場合、バーに脈打ちエフェクトを追加
                    if(data.dangerVal >= 80) {
                        setTimeout(() => dangerBar.classList.add('danger'), 1500);
                    } else {
                        dangerBar.classList.remove('danger');
                    }
                }, 300);

            }, 300); // Step1のフェードアウト時間と同期
        }

        // リセット処理（再選択）
        function resetApp() {
            // メーターをリセット
            dangerBar.style.width = '0%';
            safeBar.style.width = '0%';
            dangerBar.classList.remove('danger');
            dangerValEl.innerHTML = '0';
            safeValEl.innerHTML = '0';

            // フェードアウトしてStep1に戻る
            step2.classList.remove('fade-enter-active');
            step2.classList.add('fade-exit-active');

            setTimeout(() => {
                step2.classList.add('hidden');
                step2.classList.remove('fade-exit-active');
                
                step1.classList.remove('hidden');
                void step1.offsetWidth;
                step1.classList.add('fade-enter-active');
            }, 300);
        }
    </script>
</body>
</html>
