                title: "MECE（モレなくダブリなく）な分解",
                icon: "fa-solid fa-layer-group",
                content: "論理的思考の基本概念の一つに**MECE（ミーシー）**があります。これは「Mutually Exclusive and Collectively Exhaustive」の略で、**「モレなく、ダブリなく」**という意味です。\n\n問題を分解する際、このMECEを意識しないと計算がおかしくなってしまいます。\n\n**【悪い分解の例】**\n日本の人口を「会社員」「学生」「主婦」で分ける。\n→ *ダブリ*: 「学生でありながら会社員（アルバイト等）」がいるかもしれない。\n→ *モレ*: 「無職」「年金受給者」「乳幼児」がすっぽり抜けている。\n\n**【良い分解の例（MECE）】**\n・**年齢別**: 0-19歳、20-39歳、40-59歳、60歳以上\n・**性別**: 男性、女性（生物学的な統計データとして）\n・**地域別**: 北海道、東北、関東、中部、近畿、中国、四国、九州沖縄\n\n迷った時は「対立概念（オン/オフ、国内/海外、法人/個人）」や「プロセスの順番（過去/現在/未来）」で分けると、綺麗にMECEな分解がしやすくなります。"
            }
        ];

        // カテゴリに応じたバッジの色を返す関数
        const getCategoryColor = (category) => {
            switch (category) {
                case '論理': return 'bg-blue-100 text-blue-800 border-blue-200';
                case '計算': return 'bg-green-100 text-green-800 border-green-200';
                case 'ひっかけ': return 'bg-orange-100 text-orange-800 border-orange-200';
                case 'フェルミ推定': return 'bg-purple-100 text-purple-800 border-purple-200';
                default: return 'bg-gray-100 text-gray-800 border-gray-200';
            }
        };

        // ローカルストレージを扱うカスタムフック
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = React.useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        };

        const HomeView = ({ problems, clearedProblems, onSelectProblem }) => {
            // クリア数と進捗率の計算
            const clearCount = clearedProblems.length;
            const totalCount = problems.length;
            const progress = totalCount > 0 ? Math.round((clearCount / totalCount) * 100) : 0;

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 fade-in">
                    {/* 進捗表示エリア */}
                    <div className="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
                        <div className="flex justify-between items-end mb-2">
                            <div>
                                <h2 className="text-xl font-bold text-gray-800"><i className="fa-solid fa-trophy text-yellow-500 mr-2"></i>あなたの進捗</h2>
                                <p className="text-sm text-gray-500 mt-1">全 {totalCount} 問中 {clearCount} 問クリア</p>
                            </div>
                            <div className="text-2xl font-bold text-blue-600">{progress}%</div>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-2.5">
                            <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>

                    <div className="mb-6 flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800">問題一覧</h2>
                    </div>

                    {/* 問題リスト グリッド */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {problems.map((problem) => {
                            const isCleared = clearedProblems.includes(problem.id);
                            
                            return (
                                <div 
                                    key={problem.id} 
                                    onClick={() => onSelectProblem(problem.id)}
                                    className={`relative bg-white rounded-xl shadow-sm border overflow-hidden cursor-pointer transform transition-all duration-200 hover:-translate-y-1 hover:shadow-md
                                        ${isCleared ? 'border-green-300' : 'border-gray-200'}`}
                                >
                                    {/* クリア済みマーク */}
                                    {isCleared && (
                                        <div className="absolute top-0 right-0 bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg z-10 flex items-center shadow-sm">
                                            <i className="fa-solid fa-check mr-1"></i> クリア済
                                        </div>
                                    )}

                                    <div className="p-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border ${getCategoryColor(problem.category)}`}>
                                                {problem.category}
                                            </span>
                                            <span className="text-sm font-medium text-amber-500 tracking-widest">
                                                {problem.difficulty}
                                            </span>
                                        </div>
                                        
                                        <h3 className="text-lg font-bold text-gray-800 mb-2 line-clamp-2">{problem.title}</h3>
                                        
                                        <p className="text-sm text-gray-500 line-clamp-3 mb-4">
                                            {problem.question}
                                        </p>
                                        
                                        <div className="mt-4 flex justify-end">
                                            <button className="text-blue-600 text-sm font-medium hover:text-blue-800 transition-colors flex items-center">
                                                挑戦する <i className="fa-solid fa-arrow-right ml-1"></i>
                                            </button>
                                        </div>
                                    </div>
                                    {/* 下部装飾線 */}
                                    {isCleared && <div className="h-1 w-full bg-green-400"></div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ProblemView = ({ problem, onBack, onClear }) => {
            const [selectedOption, setSelectedOption] = React.useState(null);
            const [status, setStatus] = React.useState('idle'); // idle, correct, incorrect
            const [showHint, setShowHint] = React.useState(false);
            const [showAnswer, setShowAnswer] = React.useState(false);

            // リセット
            React.useEffect(() => {
                setSelectedOption(null);
                setStatus('idle');
                setShowHint(false);
                setShowAnswer(false);
            }, [problem]);

            const handleSubmit = () => {
                if (!selectedOption) return;

                const isCorrect = selectedOption === problem.correctOption;
                if (isCorrect) {
                    setStatus('correct');
                    onClear(problem.id);
                } else {
                    setStatus('incorrect');
                }
            };

            const handleRetry = () => {
                setStatus('idle');
                setSelectedOption(null);
            };

            return (
                <div className="max-w-3xl mx-auto p-4 sm:p-6 fade-in">
                    {/* ナビゲーションとヘッダー */}
                    <button 
                        onClick={onBack}
                        className="mb-6 text-gray-500 hover:text-gray-800 transition-colors flex items-center text-sm font-medium"
                    >
                        <i className="fa-solid fa-arrow-left mr-2"></i> 問題一覧に戻る
                    </button>

                    <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                        {/* 問題ヘッダー部分 */}
                        <div className="bg-slate-50 border-b border-gray-100 p-6 sm:px-8">
                            <div className="flex flex-wrap gap-2 items-center mb-3">
                                <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border ${getCategoryColor(problem.category)}`}>
                                    {problem.category}
                                </span>
                                <span className="text-sm font-medium text-amber-500 tracking-widest">
                                    {problem.difficulty}
                                </span>
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800">{problem.title}</h2>
                        </div>

                        {/* 問題文 */}
                        <div className="p-6 sm:p-8">
                            <div className="prose max-w-none text-gray-700 text-lg leading-relaxed whitespace-pre-wrap mb-8 bg-blue-50/50 p-6 rounded-lg border border-blue-100">
                                {problem.question}
                            </div>

                            {/* 解答選択エリア (未解答 または 不正解でリトライ前) */}
                            {status === 'idle' && (
                                <div className="mt-8 fade-in">
                                    <p className="block text-sm font-medium text-gray-700 mb-3">
                                        選択肢から解答を選んでください
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                        {problem.options.map((option, index) => (
                                            <button
                                                key={index}
                                                onClick={() => setSelectedOption(option)}
                                                className={`p-4 text-left border-2 rounded-xl transition-all flex items-center ${
                                                    selectedOption === option 
                                                        ? 'border-blue-500 bg-blue-50 text-blue-700 font-bold shadow-md' 
                                                        : 'border-gray-200 bg-white hover:border-blue-300 hover:bg-gray-50 text-gray-700'
                                                }`}
                                            >
                                                <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full border-2 mr-3 font-bold text-sm ${
                                                    selectedOption === option ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-400 text-gray-500'
                                                }`}>
                                                    {String.fromCharCode(65 + index)}
                                                </span>
                                                {option}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="text-center">
                                        <button 
                                            onClick={handleSubmit}
                                            disabled={!selectedOption}
                                            className="w-full sm:w-auto px-10 py-3 bg-blue-600 text-white font-medium rounded-lg shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors inline-flex items-center justify-center"
                                        >
                                            解答する <i className="fa-regular fa-paper-plane ml-2"></i>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* 不正解の表示 */}
                            {status === 'incorrect' && (
                                <div className="mt-6 p-6 bg-red-50 border border-red-200 rounded-lg text-center fade-in">
                                    <div className="w-16 h-16 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-4">
                                        <i className="fa-solid fa-xmark text-3xl text-red-500"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-red-700 mb-2">不正解…</h3>
                                    <p className="text-red-600 mb-6">残念！もう一度考えてみましょう。</p>
                                    
                                    <div className="flex flex-wrap justify-center gap-3">
                                        <button 
                                            onClick={handleRetry}
                                            className="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition-colors shadow-sm flex items-center"
                                        >
                                            <i className="fa-solid fa-rotate-right mr-2"></i> もう一度考える
                                        </button>
                                        
                                        {!showHint && (
                                            <button 
                                                onClick={() => setShowHint(true)}
                                                className="px-5 py-2.5 bg-amber-100 border border-amber-200 text-amber-800 font-medium rounded-lg hover:bg-amber-200 transition-colors shadow-sm flex items-center"
                                            >
                                                <i className="fa-regular fa-lightbulb mr-2"></i> ヒントを見る
                                            </button>
                                        )}
                                        
                                        {!showAnswer && (
                                            <button 
                                                onClick={() => setShowAnswer(true)}
                                                className="px-5 py-2.5 bg-white border border-red-200 text-red-600 font-medium rounded-lg hover:bg-red-50 transition-colors shadow-sm flex items-center"
                                            >
                                                <i className="fa-regular fa-eye mr-2"></i> 答えを見る
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* ヒントの表示 */}
                            {showHint && status === 'incorrect' && !showAnswer && (
                                <div className="mt-6 p-5 bg-amber-50 border border-amber-200 rounded-lg fade-in">
                                    <h4 className="font-bold text-amber-800 mb-2 flex items-center">
                                        <i className="fa-solid fa-lightbulb text-amber-500 mr-2"></i> ヒント
                                    </h4>
                                    <p className="text-amber-900">{problem.hint}</p>
                                </div>
                            )}

                            {/* 正解または「答えを見る」を選んだ時の表示 */}
                            {(status === 'correct' || showAnswer) && (
                                <div className="mt-8 fade-in">
                                    {status === 'correct' && (
                                        <div className="p-6 bg-green-50 border border-green-200 rounded-lg text-center mb-6 shadow-sm">
                                            <div className="w-16 h-16 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                                                <i className="fa-solid fa-check text-3xl text-green-500"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold text-green-700 mb-1">正解！</h3>
                                            <p className="text-green-600 font-medium">素晴らしい論理力です。</p>
                                        </div>
                                    )}

                                    <div className="bg-gray-50 border border-gray-200 rounded-lg overflow-hidden">
                                        <div className="bg-gray-100 px-6 py-3 border-b border-gray-200">
                                            <h4 className="font-bold text-gray-700 flex items-center">
                                                <i className="fa-solid fa-book-open mr-2 text-gray-500"></i> 答えと解説
                                            </h4>
                                        </div>
                                        <div className="p-6 sm:p-8">
                                            <div className="mb-6">
                                                <span className="text-sm text-gray-500 block mb-1">正解</span>
                                                <p className="text-2xl font-bold text-gray-800">{problem.correctOption}</p>
                                            </div>
                                            
                                            <div className="h-px w-full bg-gray-200 mb-6"></div>
                                            
                                            <div>
                                                <span className="text-sm text-gray-500 block mb-3">解説</span>
                                                <div className="prose max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap">
                                                    {problem.explanation}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 text-center">
                                        <button 
                                            onClick={onBack}
                                            className="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg shadow-sm hover:bg-blue-700 focus:outline-none transition-colors"
                                        >
                                            <i className="fa-solid fa-list mr-2"></i> 別の問題に挑戦する
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // 新規追加：コラム一覧ビュー
        const ColumnsView = ({ columns, onSelectColumn }) => {
            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 fade-in">
                    <div className="mb-8">
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">論理的思考コラム</h2>
                        <p className="text-gray-500">フェルミ推定やロジカルシンキングのコツを学びましょう。</p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {columns.map((column) => (
                            <div 
                                key={column.id} 
                                onClick={() => onSelectColumn(column.id)}
                                className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden cursor-pointer transform transition-all duration-200 hover:-translate-y-1 hover:shadow-md flex flex-col h-full"
                            >
                                <div className="p-6 flex-grow">
                                    <div className="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center mb-4 text-purple-600 text-xl">
                                        <i className={column.icon}></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-3">{column.title}</h3>
                                    <p className="text-gray-500 text-sm line-clamp-3">
                                        {column.content.substring(0, 100)}...
                                    </p>
                                </div>
                                <div className="bg-gray-50 px-6 py-3 border-t border-gray-100 mt-auto">
                                    <span className="text-purple-600 text-sm font-medium flex items-center">
                                        続きを読む <i className="fa-solid fa-arrow-right ml-1"></i>
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 新規追加：コラム詳細ビュー
        const ColumnDetailView = ({ column, onBack }) => {
            return (
                <div className="max-w-3xl mx-auto p-4 sm:p-6 fade-in">
                    <button 
                        onClick={onBack}
                        className="mb-6 text-gray-500 hover:text-gray-800 transition-colors flex items-center text-sm font-medium"
                    >
                        <i className="fa-solid fa-arrow-left mr-2"></i> コラム一覧に戻る
                    </button>

                    <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                        <div className="bg-purple-50 border-b border-purple-100 p-6 sm:px-8 flex items-center gap-4">
                            <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-sm text-purple-600 text-2xl shrink-0">
                                <i className={column.icon}></i>
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800">{column.title}</h2>
                        </div>
                        
                        <div className="p-6 sm:p-8">
                            <div className="prose max-w-none text-gray-700 text-lg leading-relaxed whitespace-pre-wrap">
                                {/* Markdownの太字(**)を簡易的に処理して表示 */}
                                {column.content.split('**').map((text, i) => 
                                    i % 2 === 1 ? <strong key={i} className="text-gray-900">{text}</strong> : text
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            // タブの状態管理を追加
            const [activeTab, setActiveTab] = React.useState('puzzles'); // 'puzzles' or 'columns'
            const [currentView, setCurrentView] = React.useState('list'); // 'list' or 'detail'
            const [selectedId, setSelectedId] = React.useState(null);
            
            // クリアした問題のIDリストをローカルストレージに保存
            const [clearedProblems, setClearedProblems] = useLocalStorage('logicPuzzleCleared', []);

            const handleSelectProblem = (id) => {
                setSelectedId(id);
                setCurrentView('detail');
                window.scrollTo(0, 0);
            };

            const handleSelectColumn = (id) => {
                setSelectedId(id);
                setCurrentView('detail');
                window.scrollTo(0, 0);
            };

            const handleBackToList = () => {
                setCurrentView('list');
                setSelectedId(null);
                window.scrollTo(0, 0);
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setCurrentView('list');
                setSelectedId(null);
                window.scrollTo(0, 0);
            };

            const handleClearProblem = (id) => {
                if (!clearedProblems.includes(id)) {
                    setClearedProblems([...clearedProblems, id]);
                }
            };

            const selectedProblem = problemsData.find(p => p.id === selectedId);
            const selectedColumn = columnsData.find(c => c.id === selectedId);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* グローバルヘッダー */}
                    <header className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => handleTabChange('puzzles')}>
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-sm">
                                    <i className="fa-solid fa-brain text-white"></i>
                                </div>
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight hidden sm:block">Logic Puzzle</h1>
                            </div>
                            
                            {/* タブナビゲーション */}
                            <div className="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                                <button
                                    onClick={() => handleTabChange('puzzles')}
                                    className={`px-3 sm:px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${
                                        activeTab === 'puzzles' 
                                            ? 'bg-white text-blue-700 shadow-sm' 
                                            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    <i className="fa-solid fa-puzzle-piece mr-1.5"></i>問題
                                </button>
                                <button
                                    onClick={() => handleTabChange('columns')}
                                    className={`px-3 sm:px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${
                                        activeTab === 'columns' 
                                            ? 'bg-white text-purple-700 shadow-sm' 
                                            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    <i className="fa-solid fa-book-open mr-1.5"></i>コラム
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* メインコンテンツ */}
                    <main className="flex-grow py-8">
                        {/* パズルタブ */}
                        {activeTab === 'puzzles' && currentView === 'list' && (
                            <HomeView 
                                problems={problemsData} 
                                clearedProblems={clearedProblems}
                                onSelectProblem={handleSelectProblem}
                            />
                        )}
                        {activeTab === 'puzzles' && currentView === 'detail' && selectedProblem && (
                            <ProblemView 
                                problem={selectedProblem} 
                                onBack={handleBackToList}
                                onClear={handleClearProblem}
                            />
                        )}

                        {/* コラムタブ */}
                        {activeTab === 'columns' && currentView === 'list' && (
                            <ColumnsView 
                                columns={columnsData}
                                onSelectColumn={handleSelectColumn}
                            />
                        )}
                        {activeTab === 'columns' && currentView === 'detail' && selectedColumn && (
                            <ColumnDetailView 
                                column={selectedColumn} 
                                onBack={handleBackToList}
                            />
                        )}
                    </main>

                    {/* グローバルフッター */}
                    <footer className="bg-white border-t border-gray-200 py-6 mt-auto">
                        <div className="max-w-5xl mx-auto px-4 text-center text-sm text-gray-500">
                            &copy; {new Date().getFullYear()} Logic Puzzle Training. All rights reserved.
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
