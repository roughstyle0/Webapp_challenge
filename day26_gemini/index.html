<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カラーレンズ 濃度・用途ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
                        'pulse-subtle': 'pulseSubtle 2s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSubtle: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.8' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* カスタムスクロールバーなどの細かな調整 */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen font-sans text-slate-800 selection:bg-brand-500 selection:text-white">

    <div class="max-w-2xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-100 text-brand-600 mb-4 shadow-sm">
                <!-- Glasses Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="6" cy="15" r="4"/>
                    <circle cx="18" cy="15" r="4"/>
                    <path d="M14 15a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
                    <path d="M2.5 13 5 7c.7-1.3 1.4-2 3-2"/>
                    <path d="M21.5 13 19 7c-.7-1.3-1.5-2-3-2"/>
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">カラーレンズ 提案ナビ</h1>
            <p class="text-slate-500 mt-2 text-sm md:text-base">お客様と一緒に画面を見ながら、最適な濃さを選びましょう</p>
        </header>

        <!-- Density Selectors -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8" id="density-buttons-container">
            <!-- Buttons will be generated by JS -->
        </div>

        <!-- Content Area -->
        <div id="content-area" class="min-h-[300px] relative">
            <!-- Initial State (Placeholder) -->
            <div id="placeholder" class="glass-effect rounded-2xl p-8 text-center border border-slate-200 shadow-sm transition-opacity duration-300">
                <div class="w-20 h-20 mx-auto bg-slate-100 rounded-full flex items-center justify-center mb-4 animate-pulse-subtle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h3 class="text-lg font-medium text-slate-700 mb-2">上のボタンから濃度を選んでください</h3>
                <p class="text-sm text-slate-500">選んだ濃度に応じた、おすすめシーンや<br class="hidden md:block">お客様へのトークスクリプトが表示されます。</p>
            </div>

            <!-- Detail Card (Hidden initially) -->
            <div id="detail-card" class="hidden glass-effect rounded-2xl p-6 md:p-8 border border-slate-200 shadow-lg relative overflow-hidden">
                <!-- Decorative background blob -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-50 rounded-full blur-2xl opacity-50 pointer-events-none"></div>

                <!-- Header: Density & Scene -->
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-6 relative z-10">
                    <div>
                        <span id="card-density-badge" class="inline-block px-3 py-1 text-xs font-bold rounded-full mb-2 uppercase tracking-wider"></span>
                        <h2 id="card-scene" class="text-xl md:text-2xl font-bold text-slate-900 leading-tight"></h2>
                    </div>
                </div>

                <!-- Alert: Night Driving -->
                <div id="card-night-alert" class="flex items-start gap-3 p-4 rounded-xl mb-6 border transition-colors duration-300 relative z-10">
                    <div id="card-alert-icon" class="mt-0.5 shrink-0"></div>
                    <div>
                        <p id="card-alert-title" class="font-bold text-sm md:text-base"></p>
                        <p id="card-alert-desc" class="text-xs md:text-sm mt-1 opacity-90"></p>
                    </div>
                </div>

                <!-- Talk Script -->
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                        <h3 class="font-bold text-slate-700">そのまま使える！提案トーク</h3>
                    </div>
                    <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm relative">
                        <!-- Quote mark decoration -->
                        <span class="absolute top-2 left-2 text-4xl text-slate-100 font-serif leading-none pointer-events-none">"</span>
                        <p id="card-script" class="text-slate-700 leading-relaxed relative z-10 text-sm md:text-base font-medium"></p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-12 text-center text-xs text-slate-400">
            <p>※夜間・夕暮れ時の運転適合基準はJIS規格に基づきます。</p>
        </footer>
    </div>

    <script>
        /**
         * レンズデータの定義
         * 拡張性や変更のしやすさを考慮し、データを一元管理する設計
         */
        const lensData = [
            {
                id: '15',
                label: '15%前後',
                colorCode: '#e2e8f0', // 視覚的な濃さ表現
                opacity: 0.15,
                scenes: 'オフィス・パソコン・普段使い',
                isNightDriveOk: true,
                script: 'ほんのり色づく程度なので、オフィスでも悪目立ちせず、パソコンの眩しさも和らげてくれます。夜の運転もそのままで大丈夫ですよ！'
            },
            {
                id: '25',
                label: '25%前後',
                colorCode: '#cbd5e1',
                opacity: 0.25,
                scenes: '日中のドライブ・普段使い',
                isNightDriveOk: false,
                script: '目元が少し隠れてオシャレな濃さですが、夜の運転には使えない明るさになります。日中のドライブや普段使いにとても人気です！'
            },
            {
                id: '35',
                label: '35%前後',
                colorCode: '#94a3b8',
                opacity: 0.35,
                scenes: '屋外のレジャー・眩しさ対策',
                isNightDriveOk: false,
                script: 'しっかり眩しさを抑えつつ、相手からギリギリ目が見える濃さです。屋外のレジャーにぴったりですね！'
            },
            {
                id: '50',
                label: '50%以上',
                colorCode: '#475569',
                opacity: 0.7,
                scenes: '真夏の日差し・海や山のアクティビティ',
                isNightDriveOk: false,
                script: '本格的なサングラスの濃さです。真夏の強い日差しや海・山でのアクティビティに最適ですよ！'
            }
        ];

        // DOM要素のキャッシュ
        const elements = {
            buttonsContainer: document.getElementById('density-buttons-container'),
            placeholder: document.getElementById('placeholder'),
            detailCard: document.getElementById('detail-card'),
            badge: document.getElementById('card-density-badge'),
            scene: document.getElementById('card-scene'),
            nightAlert: document.getElementById('card-night-alert'),
            alertIcon: document.getElementById('card-alert-icon'),
            alertTitle: document.getElementById('card-alert-title'),
            alertDesc: document.getElementById('card-alert-desc'),
            script: document.getElementById('card-script')
        };

        // 現在選択されているIDを保持
        let currentSelectedId = null;

        /**
         * アプリケーションの初期化
         */
        function init() {
            try {
                renderButtons();
            } catch (error) {
                console.error("アプリの初期化に失敗しました:", error);
                elements.buttonsContainer.innerHTML = '<p class="text-red-500 text-sm col-span-full text-center">読み込みエラーが発生しました。ページを再読み込みしてください。</p>';
            }
        }

        /**
         * 濃度選択ボタンの生成と描画
         */
        function renderButtons() {
            lensData.forEach(data => {
                const btn = document.createElement('button');
                btn.className = `
                    relative group overflow-hidden rounded-xl bg-white border border-slate-200 
                    shadow-sm p-4 transition-all duration-200 
                    hover:border-brand-400 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2
                `;
                btn.dataset.id = data.id;
                btn.setAttribute('aria-label', `${data.label}の情報を表示`);

                // 濃さを視覚的に表すための装飾（レンズのイメージ）
                const lensVisual = `
                    <div class="absolute inset-0 opacity-10 transition-opacity group-hover:opacity-20" style="background-color: #000; opacity: ${data.opacity}"></div>
                `;

                btn.innerHTML = `
                    ${lensVisual}
                    <div class="relative z-10 flex flex-col items-center gap-2">
                        <div class="w-8 h-8 rounded-full border-2 border-slate-300 flex items-center justify-center overflow-hidden">
                             <div class="w-full h-full" style="background-color: #000; opacity: ${data.opacity}"></div>
                        </div>
                        <span class="font-bold text-slate-700 text-sm md:text-base">${data.label}</span>
                    </div>
                `;

                btn.addEventListener('click', () => handleButtonClick(data.id));
                elements.buttonsContainer.appendChild(btn);
            });
        }

        /**
         * ボタンクリック時のハンドラー
         * @param {string} id 
         */
        function handleButtonClick(id) {
            if (currentSelectedId === id) return; // 同じボタンを押した場合は無視
            
            const targetData = lensData.find(d => d.id === id);
            if (!targetData) {
                console.warn(`Data not found for id: ${id}`);
                return;
            }

            currentSelectedId = id;
            updateActiveButtonState(id);
            displayDetails(targetData);
        }

        /**
         * ボタンのアクティブ状態のUI更新
         * @param {string} activeId 
         */
        function updateActiveButtonState(activeId) {
            const buttons = elements.buttonsContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                if (btn.dataset.id === activeId) {
                    btn.classList.add('ring-2', 'ring-brand-500', 'border-brand-500', 'bg-brand-50');
                    btn.classList.remove('border-slate-200', 'bg-white');
                } else {
                    btn.classList.remove('ring-2', 'ring-brand-500', 'border-brand-500', 'bg-brand-50');
                    btn.classList.add('border-slate-200', 'bg-white');
                }
            });
        }

        /**
         * 詳細カードの描画処理
         * @param {Object} data 
         */
        function displayDetails(data) {
            // アニメーションのリセットのために一度クラスを外す
            elements.detailCard.classList.remove('animate-fade-in-up');
            
            // 強制的なリフロー（アニメーションを再トリガーするためのおまじない）
            void elements.detailCard.offsetWidth; 

            // プレースホルダーを隠し、カードを表示
            elements.placeholder.classList.add('hidden');
            elements.detailCard.classList.remove('hidden');
            elements.detailCard.classList.add('animate-fade-in-up');

            // データのバインディング
            elements.badge.textContent = `濃度 ${data.label}`;
            elements.badge.className = `inline-block px-3 py-1 text-xs font-bold rounded-full mb-2 uppercase tracking-wider bg-slate-100 text-slate-600`;
            elements.scene.textContent = data.scenes;
            elements.script.textContent = data.script;

            // 夜間運転アラートのUI出し分け（最重要要件）
            if (data.isNightDriveOk) {
                // OKの場合
                elements.nightAlert.className = 'flex items-start gap-3 p-4 rounded-xl mb-6 border bg-emerald-50 border-emerald-200 text-emerald-800 transition-colors duration-300 relative z-10';
                elements.alertIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
                elements.alertTitle.textContent = '夜間・夕暮れ時の運転 OK';
                elements.alertDesc.textContent = '暗い時間帯の運転にも安心してご使用いただけます。';
            } else {
                // NGの場合（赤で目立たせる）
                elements.nightAlert.className = 'flex items-start gap-3 p-4 rounded-xl mb-6 border bg-red-50 border-red-300 text-red-800 transition-colors duration-300 relative z-10';
                elements.alertIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
                elements.alertTitle.textContent = '夜間・夕暮れ時の運転 不可 (JIS規格)';
                elements.alertDesc.textContent = '光量不足により視力低下を招くため、夜間運転には使用できません。必ずお客様へお伝えください。';
            }
        }

        // DOMの読み込み完了後に初期化
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
