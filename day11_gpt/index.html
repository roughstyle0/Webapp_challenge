<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爆速・引き継ぎメモジェネレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-indigo-600 text-white p-4 shadow-md">
    <h1 class="text-xl font-bold text-center">⚡ 爆速・引き継ぎメモジェネレーター</h1>
    <p class="text-xs text-center mt-1 opacity-80">タップだけで即コピペ完了</p>
  </header>

  <!-- Main -->
  <main class="flex-1 p-4 space-y-6 max-w-xl w-full mx-auto">

    <!-- 宛先 -->
    <section>
      <h2 class="text-sm font-semibold mb-2 text-gray-700">① 宛先</h2>
      <div id="recipientGroup" class="grid grid-cols-2 gap-3">
        <button data-value="早番へ" class="select-btn">早番へ</button>
        <button data-value="遅番へ" class="select-btn">遅番へ</button>
        <button data-value="店長へ" class="select-btn">店長へ</button>
        <button data-value="全員へ" class="select-btn">全員へ</button>
      </div>
    </section>

    <!-- 重要度 -->
    <section>
      <h2 class="text-sm font-semibold mb-2 text-gray-700">② 重要度</h2>
      <div id="priorityGroup" class="grid grid-cols-3 gap-3">
        <button data-value="高 🚨" class="select-btn">高 🚨</button>
        <button data-value="中 ⚠️" class="select-btn">中 ⚠️</button>
        <button data-value="低 ℹ️" class="select-btn">低 ℹ️</button>
      </div>
    </section>

    <!-- カテゴリ -->
    <section>
      <h2 class="text-sm font-semibold mb-2 text-gray-700">③ カテゴリ</h2>
      <div id="categoryGroup" class="grid grid-cols-2 gap-3">
        <button data-value="レジ・金銭" class="select-btn">レジ・金銭</button>
        <button data-value="品出し・在庫" class="select-btn">品出し・在庫</button>
        <button data-value="接客・クレーム" class="select-btn">接客・クレーム</button>
        <button data-value="その他" class="select-btn">その他</button>
      </div>
    </section>

    <!-- フリーメモ -->
    <section>
      <h2 class="text-sm font-semibold mb-2 text-gray-700">④ フリーメモ</h2>
      <textarea
        id="memo"
        rows="4"
        placeholder="例）レジ3番で釣銭エラー発生。明日業者へ連絡予定。"
        class="w-full p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm resize-none"
      ></textarea>
    </section>
  </main>

  <!-- Copy Button -->
  <div class="p-4 bg-white shadow-inner">
    <button
      id="copyBtn"
      class="w-full py-4 text-lg font-bold rounded-2xl bg-indigo-600 text-white active:scale-95 transition-transform duration-100"
    >
      📋 LINE（クリップボード）にコピー
    </button>
  </div>

  <!-- Toast -->
  <div
    id="toast"
    class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-black text-white text-sm px-6 py-3 rounded-full opacity-0 pointer-events-none transition-opacity duration-300"
  >
    コピーしました！
  </div>

  <script>
    // 共通スタイル付与
    document.querySelectorAll(".select-btn").forEach(btn => {
      btn.classList.add(
        "py-4",
        "rounded-2xl",
        "bg-white",
        "shadow",
        "text-base",
        "font-semibold",
        "active:scale-95",
        "transition",
        "border-2",
        "border-transparent"
      );
    });

    function setupSelectableGroup(groupId) {
      const group = document.getElementById(groupId);
      const buttons = group.querySelectorAll("button");

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          buttons.forEach(btn => {
            btn.classList.remove("bg-indigo-600", "text-white", "border-indigo-600");
            btn.classList.add("bg-white");
          });

          button.classList.add("bg-indigo-600", "text-white", "border-indigo-600");
          button.classList.remove("bg-white");
        });
      });
    }

    setupSelectableGroup("recipientGroup");
    setupSelectableGroup("priorityGroup");
    setupSelectableGroup("categoryGroup");

    function getSelectedValue(groupId) {
      const group = document.getElementById(groupId);
      const selected = group.querySelector(".bg-indigo-600");
      return selected ? selected.dataset.value : null;
    }

    const copyBtn = document.getElementById("copyBtn");
    const toast = document.getElementById("toast");

    copyBtn.addEventListener("click", async () => {
      const recipient = getSelectedValue("recipientGroup");
      const priority = getSelectedValue("priorityGroup");
      const category = getSelectedValue("categoryGroup");
      const memo = document.getElementById("memo").value.trim();

      if (!recipient || !priority || !category || memo === "") {
        alert("未入力の項目があります。すべて選択・入力してください。");
        return;
      }

      const output = 
`【宛先】${recipient}
【重要度】${priority}
【カテゴリ】${category}
【内容】
・${memo}`;

      try {
        await navigator.clipboard.writeText(output);
        showToast();
      } catch (err) {
        alert("コピーに失敗しました。手動でコピーしてください。");
      }
    });

    function showToast() {
      toast.classList.remove("opacity-0");
      toast.classList.add("opacity-100");
      setTimeout(() => {
        toast.classList.remove("opacity-100");
        toast.classList.add("opacity-0");
      }, 2000);
    }
  </script>

</body>
</html>
