<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メガネ保証期間サクッと計算ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f4c81', // クラシックブルー（信頼感）
                        secondary: '#f0f4f8',
                    }
                }
            }
        }
    </script>
    <style>
        /* カレンダーアイコンのカスタマイズ等、細部の調整 */
        input[type="date"] {
            position: relative;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        /* アニメーション */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-secondary min-h-screen text-slate-800 font-sans selection:bg-primary selection:text-white">
    
    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <!-- ヘッダー -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-3 bg-white rounded-full shadow-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary">
                    <circle cx="6" cy="15" r="4"/>
                    <circle cx="18" cy="15" r="4"/>
                    <path d="M14 15a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
                    <path d="M2.5 13 5 7c.7-1.3 1.4-2 3-2"/>
                    <path d="M21.5 13 19 7c-.7-1.3-1.5-2-3-2"/>
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">メガネ保証期間 サクッと計算ツール</h1>
            <p class="text-slate-500 mt-2 text-sm md:text-base">お渡し日を選択するだけで、お客様へのご案内期日を自動計算します</p>
        </header>

        <main>
            <!-- 入力セクション -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 mb-8">
                <div class="max-w-md mx-auto">
                    <label for="purchaseDate" class="block text-sm font-semibold text-slate-700 mb-2">
                        お渡し日（購入日）
                    </label>
                    <div class="relative">
                        <input 
                            type="date" 
                            id="purchaseDate" 
                            class="w-full text-lg md:text-xl py-3 px-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-slate-800 font-medium"
                        >
                    </div>
                    <p id="errorMessage" class="text-red-500 text-sm mt-2 hidden">正しい日付を選択してください。</p>
                </div>
            </section>

            <!-- 結果表示セクション -->
            <section id="resultsArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden fade-in">
                
                <!-- 見え方保証カード -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden relative group hover:shadow-md transition-shadow">
                    <div class="h-1.5 w-full bg-blue-400"></div>
                    <div class="p-6 md:p-8">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-sm font-bold text-blue-500 uppercase tracking-wider mb-1">6ヶ月間</h2>
                                <h3 class="text-xl font-bold text-slate-800">見え方（度数）保証</h3>
                            </div>
                            <div class="p-2 bg-blue-50 rounded-lg text-blue-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </div>
                        </div>
                        <div class="mt-6">
                            <p class="text-sm text-slate-500 mb-1">保証期日</p>
                            <div class="flex flex-wrap items-baseline gap-3">
                                <p id="visionGuaranteeDate" class="text-2xl md:text-3xl font-bold text-slate-900 tabular-nums tracking-tight">
                                    --年--月--日
                                </p>
                                <span id="visionExpiredBadge" class="hidden inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700 border border-red-200">
                                    <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    保証期間外です
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- フレーム品質保証カード -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden relative group hover:shadow-md transition-shadow">
                    <div class="h-1.5 w-full bg-primary"></div>
                    <div class="p-6 md:p-8">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-sm font-bold text-primary uppercase tracking-wider mb-1">1年間</h2>
                                <h3 class="text-xl font-bold text-slate-800">フレーム品質保証</h3>
                            </div>
                            <div class="p-2 bg-slate-50 rounded-lg text-primary">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
                            </div>
                        </div>
                        <div class="mt-6">
                            <p class="text-sm text-slate-500 mb-1">保証期日</p>
                            <div class="flex flex-wrap items-baseline gap-3">
                                <p id="frameGuaranteeDate" class="text-2xl md:text-3xl font-bold text-slate-900 tabular-nums tracking-tight">
                                    --年--月--日
                                </p>
                                <span id="frameExpiredBadge" class="hidden inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700 border border-red-200">
                                    <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    保証期間外です
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('purchaseDate');
            const resultsArea = document.getElementById('resultsArea');
            const errorMessage = document.getElementById('errorMessage');
            
            // DOM Elements for dates and badges
            const visionDateEl = document.getElementById('visionGuaranteeDate');
            const visionBadgeEl = document.getElementById('visionExpiredBadge');
            const frameDateEl = document.getElementById('frameGuaranteeDate');
            const frameBadgeEl = document.getElementById('frameExpiredBadge');

            /**
             * 指定した日付からXヶ月後の日付を計算する（月末補正付き）
             * @param {Date} date - 基準日
             * @param {number} months - 加算する月数
             * @returns {Date} 計算後の日付
             */
            function addMonths(date, months) {
                const d = new Date(date.getTime());
                const expectedDay = d.getDate();
                d.setMonth(d.getMonth() + months);
                // 例: 8/31の6ヶ月後が3/3等に溢れてしまった場合、2月末日に補正する
                if (d.getDate() !== expectedDay) {
                    d.setDate(0); 
                }
                return d;
            }

            /**
             * 指定した日付からX年後の日付を計算する（うるう年補正付き）
             * @param {Date} date - 基準日
             * @param {number} years - 加算する年数
             * @returns {Date} 計算後の日付
             */
            function addYears(date, years) {
                const d = new Date(date.getTime());
                const expectedDay = d.getDate();
                d.setFullYear(d.getFullYear() + years);
                // 例: 2/29の1年後が3/1に溢れてしまった場合、2/28に補正する
                if (d.getDate() !== expectedDay) {
                    d.setDate(0);
                }
                return d;
            }

            /**
             * 日付を「YYYY年MM月DD日」形式にフォーマットする
             * @param {Date} date 
             * @returns {string}
             */
            function formatDate(date) {
                return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
            }

            /**
             * 保証計算とUI更新のメインロジック
             */
            function calculateGuarantees() {
                const inputValue = dateInput.value;
                
                if (!inputValue) {
                    resultsArea.classList.add('hidden');
                    errorMessage.classList.remove('hidden');
                    return;
                }

                errorMessage.classList.add('hidden');
                
                // 入力日のパース (タイムゾーンのズレを防ぐため、ハイフン区切りの文字列からローカル時刻として生成)
                const parts = inputValue.split('-');
                const purchaseDate = new Date(parts[0], parts[1] - 1, parts[2]);

                // 今日の日付（午前0時）を取得（期限切れ判定用）
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // 計算: 見え方保証（6ヶ月後）
                const visionExpDate = addMonths(purchaseDate, 6);
                visionDateEl.textContent = formatDate(visionExpDate);
                
                // 計算: フレーム保証（1年後）
                const frameExpDate = addYears(purchaseDate, 1);
                frameDateEl.textContent = formatDate(frameExpDate);

                // 期限切れ判定とバッジ表示の切り替え
                // ※期日当日までは「保証期間内」とするため、期日が今日より過去なら「期間外」
                if (visionExpDate < today) {
                    visionBadgeEl.classList.remove('hidden');
                    visionDateEl.classList.replace('text-slate-900', 'text-slate-400'); // 期限切れ感の演出
                } else {
                    visionBadgeEl.classList.add('hidden');
                    visionDateEl.classList.replace('text-slate-400', 'text-slate-900');
                }

                if (frameExpDate < today) {
                    frameBadgeEl.classList.remove('hidden');
                    frameDateEl.classList.replace('text-slate-900', 'text-slate-400');
                } else {
                    frameBadgeEl.classList.add('hidden');
                    frameDateEl.classList.replace('text-slate-400', 'text-slate-900');
                }

                // 結果エリアを表示
                resultsArea.classList.remove('hidden');
            }

            // 初期設定: 本日の日付をセットして初期計算
            const todayForInput = new Date();
            const yyyy = todayForInput.getFullYear();
            const mm = String(todayForInput.getMonth() + 1).padStart(2, '0');
            const dd = String(todayForInput.getDate()).padStart(2, '0');
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            
            // 初回計算を実行
            calculateGuarantees();

            // イベントリスナー: 日付が変更されたら即座に計算
            dateInput.addEventListener('input', calculateGuarantees);
        });
    </script>
</body>
</html>
