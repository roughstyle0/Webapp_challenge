<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大人のレンズ ライフスタイルナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#8b5a2b', // 上品なブラウン
                            600: '#734a24',
                            900: '#3e2723',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'YuGothic', '"Yu Gothic"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'YuMincho', '"Yu Mincho"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* カスタムアニメーション */
        .fade-up-enter {
            opacity: 0;
            transform: translateY(20px);
        }
        .fade-up-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 選択されたボタンのハイライト効果 */
        .selected-ring {
            box-shadow: 0 0 0 4px #8b5a2b; /* brand-500 */
        }
        
        /* スムーススクロール */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col selection:bg-brand-500 selection:text-white">

    <!-- ヘッダー -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-serif font-bold text-brand-900 tracking-wide">
                Premium Lens Navi
            </h1>
            <span class="text-sm font-medium text-stone-500 bg-stone-100 px-3 py-1 rounded-full">スタッフサポートツール</span>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-10 w-full">
        
        <!-- ステップ1: ヒアリング -->
        <section id="step-1" class="mb-12">
            <div class="text-center mb-10">
                <h2 class="text-3xl md:text-4xl font-serif text-brand-900 mb-4">
                    お客様の「一番快適にしたい時間」は<br class="md:hidden">どれですか？
                </h2>
                <p class="text-lg text-stone-600">
                    当てはまるライフスタイルをひとつお選びください。
                </p>
            </div>

            <!-- 選択肢グリッド -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="scenario-container">
                <!-- JSで動的に生成されます -->
            </div>
        </section>

        <!-- ステップ2: 診断結果 (初期非表示) -->
        <section id="result-section" class="hidden opacity-0 transform translate-y-10 transition-all duration-700 ease-out">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-brand-100">
                <!-- 結果ヘッダー -->
                <div class="bg-brand-50 p-8 border-b border-brand-100 text-center relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#8b5a2b 1px, transparent 1px); background-size: 20px 20px;"></div>
                    <div class="relative z-10">
                        <p class="text-brand-600 font-bold tracking-widest text-sm mb-2">おすすめのプレミアムレンズ</p>
                        <h3 id="result-lens-name" class="text-4xl md:text-5xl font-serif font-bold text-brand-900 mb-4">
                            <!-- レンズ名 -->
                        </h3>
                        <div class="inline-flex items-center justify-center bg-white px-6 py-3 rounded-full shadow-sm border border-brand-100">
                            <svg class="w-6 h-6 text-brand-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            <span class="text-lg font-medium text-stone-700">快適な視界： <span id="result-distance" class="text-brand-600 font-bold"></span></span>
                        </div>
                    </div>
                </div>

                <!-- スタッフ用トークスクリプト -->
                <div class="p-8 md:p-10">
                    <div class="flex items-start mb-4">
                        <div class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-bold flex items-center shrink-0">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            提案トークスクリプト
                        </div>
                        <p class="ml-3 text-sm text-stone-500 mt-1">※このまま読み上げてご提案ください</p>
                    </div>
                    
                    <div class="bg-stone-50 rounded-xl p-6 md:p-8 border-l-4 border-brand-500 relative">
                        <svg class="absolute top-4 left-4 w-8 h-8 text-brand-200 opacity-50" fill="currentColor" viewBox="0 0 32 32"><path d="M10 8c-3.3 0-6 2.7-6 6v10h10V14H8c0-2.2 1.8-4 4-4V8zm16 0c-3.3 0-6 2.7-6 6v10h10V14h-6c0-2.2 1.8-4 4-4V8z"></path></svg>
                        <p id="result-script" class="text-2xl leading-relaxed text-stone-800 font-medium relative z-10 pl-6">
                            <!-- スクリプト -->
                        </p>
                    </div>

                    <!-- リセットボタン -->
                    <div class="mt-10 text-center">
                        <button onclick="resetSelection()" class="inline-flex items-center text-stone-500 hover:text-brand-600 font-medium transition-colors">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            もう一度選び直す
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- データ定義 ---
        const scenarios = [
            {
                id: 'outdoor',
                title: '運転・外出がメイン',
                subtitle: 'スマホも少し見る',
                icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>',
                result: {
                    lensName: '遠近両用',
                    distance: '手元30cm 〜 数メートル先まで',
                    script: 'お出かけや運転が多いとのことですので、遠くから手元のスマホまでカバーできる<strong class="text-brand-600">「遠近両用」</strong>が最適です。一日中掛けっぱなしで快適に過ごせますよ！'
                }
            },
            {
                id: 'indoor',
                title: '家事・テレビ・室内での移動',
                subtitle: 'おうち時間がメイン',
                icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>',
                result: {
                    lensName: '中近両用',
                    distance: '手元40cm 〜 室内空間(3〜4m)',
                    script: 'お家の中での時間が長いとのことですので、テレビから手元の新聞まで、室内空間が一番広くスッキリ見える<strong class="text-brand-600">「中近両用」</strong>がおすすめです。遠近両用よりも足元の揺れが少なく、家事がぐっと楽になりますよ！'
                }
            },
            {
                id: 'deskwork',
                title: '長時間のデスクワーク',
                subtitle: 'パソコン作業がメイン',
                icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>',
                result: {
                    lensName: '近々両用',
                    distance: '手元40cm 〜 デスク奥(1m前後)',
                    script: 'パソコン作業が長いとのことですので、デスク周りに特化した<strong class="text-brand-600">「近々両用」</strong>が圧倒的に快適です。遠近両用だとアゴを上げて画面を見ることになり首が疲れてしまうので、お仕事専用のこのレンズが一番体が楽になります！'
                }
            },
            {
                id: 'reading',
                title: 'ベッドでの読書・手芸など',
                subtitle: '手元だけの作業がメイン',
                icon: '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>',
                result: {
                    lensName: 'お手元専用 (単焦点)',
                    distance: '手元30cm 〜 40cm ピンポイント',
                    script: '読書や手芸など、手元にしっかり集中したいとのことですので、手元専用の<strong class="text-brand-600">「お手元専用レンズ(老眼鏡)」</strong>が最も視野が広くクリアに見えます。掛けっぱなしで歩くことはできませんが、作業のしやすさはナンバーワンです！'
                }
            }
        ];

        // --- UI初期化 ---
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('scenario-container');
            
            scenarios.forEach((scenario, index) => {
                const btn = document.createElement('button');
                btn.className = `
                    scenario-btn group relative bg-white p-8 rounded-2xl shadow-sm border-2 border-transparent 
                    hover:border-brand-200 hover:shadow-md transition-all duration-300 text-left w-full
                    flex items-center space-x-6 overflow-hidden
                `;
                btn.dataset.id = scenario.id;
                btn.onclick = () => selectScenario(scenario.id, btn);
                
                // ホバー時の背景エフェクト
                const bgEffect = document.createElement('div');
                bgEffect.className = "absolute inset-0 bg-brand-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none z-0";
                
                btn.innerHTML = `
                    ${bgEffect.outerHTML}
                    <div class="relative z-10 shrink-0 bg-brand-100 text-brand-600 p-4 rounded-full group-hover:scale-110 group-hover:bg-brand-500 group-hover:text-white transition-all duration-300">
                        ${scenario.icon}
                    </div>
                    <div class="relative z-10">
                        <span class="block text-sm font-bold text-brand-500 mb-1">${scenario.subtitle}</span>
                        <h3 class="text-2xl font-bold text-stone-800 group-hover:text-brand-900 transition-colors">${scenario.title}</h3>
                    </div>
                `;
                
                // アニメーションで順番に表示
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(20px)';
                container.appendChild(btn);
                
                setTimeout(() => {
                    btn.style.transition = 'all 0.5s ease-out';
                    btn.style.opacity = '1';
                    btn.style.transform = 'translateY(0)';
                }, index * 100); // 100msずつ遅延
            });
        });

        // --- アクションハンドラ ---
        function selectScenario(id, selectedBtn) {
            // 1. 全ボタンのスタイルリセット
            const buttons = document.querySelectorAll('.scenario-btn');
            buttons.forEach(btn => {
                btn.classList.remove('selected-ring', 'border-brand-500');
                btn.classList.add('opacity-60', 'scale-95'); // 非選択を薄く小さく
                btn.classList.remove('opacity-100', 'scale-100');
            });

            // 2. 選択されたボタンを強調
            selectedBtn.classList.remove('opacity-60', 'scale-95');
            selectedBtn.classList.add('selected-ring', 'border-brand-500', 'opacity-100', 'scale-100');

            // 3. データ取得
            const data = scenarios.find(s => s.id === id);
            if (!data) return;

            // 4. 結果エリアの更新
            document.getElementById('result-lens-name').textContent = data.result.lensName;
            document.getElementById('result-distance').textContent = data.result.distance;
            document.getElementById('result-script').innerHTML = data.result.script;

            // 5. アニメーション表示
            const resultSection = document.getElementById('result-section');
            resultSection.classList.remove('hidden');
            
            // リフローを強制してトランジションを発火
            void resultSection.offsetWidth;
            
            resultSection.classList.remove('opacity-0', 'translate-y-10');
            resultSection.classList.add('opacity-100', 'translate-y-0');

            // 6. スムーススクロール（少し遅らせて結果にフォーカス）
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        // --- リセット処理 ---
        function resetSelection() {
            const buttons = document.querySelectorAll('.scenario-btn');
            buttons.forEach(btn => {
                btn.classList.remove('selected-ring', 'border-brand-500', 'opacity-60', 'scale-95');
                btn.classList.add('opacity-100', 'scale-100');
            });

            const resultSection = document.getElementById('result-section');
            resultSection.classList.remove('opacity-100', 'translate-y-0');
            resultSection.classList.add('opacity-0', 'translate-y-10');
            
            setTimeout(() => {
                resultSection.classList.add('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300); // トランジション完了後に非表示
        }
    </script>
</body>
</html>
