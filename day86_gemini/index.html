<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Lens Customize Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        champagne: '#d4af37',
                        'champagne-light': '#f3e5ab',
                        'champagne-dark': '#aa8c2c',
                        offwhite: '#fbfbfb',
                        lightgray: '#f0f0f0',
                        charcoal: '#333333',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                        display: ['"Cormorant Garamond"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #fdfdfd 0%, #f0f0f0 100%);
            color: #333333;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* テンプレ脱却: コスメブランド風グラスモーフィズム */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.2); /* シャンパンゴールドの極細ボーダー */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border-radius: 16px;
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-button:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .champagne-gradient-text {
            background: linear-gradient(to right, #aa8c2c, #d4af37, #aa8c2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* トークスクリプトのハイライト */
        mark.script-highlight {
            background: linear-gradient(transparent 60%, rgba(212, 175, 55, 0.3) 60%);
            color: #333;
            font-weight: 600;
            padding: 0 0.2em;
        }

        /* カスタムラジオボタン・レンジ入力 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 2px;
        }
        
        .radio-btn-group input[type="radio"]:checked + label {
            background-color: #333333;
            color: #ffffff;
            border-color: #333333;
        }

        /* アニメーション */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-step {
            display: none !important;
        }
    </style>
</head>
<body class="font-sans antialiased flex flex-col items-center justify-start p-4 md:p-8">

    <header class="w-full max-w-4xl mb-8 text-center fade-in-up" style="animation-delay: 0.1s;">
        <p class="font-display text-champagne tracking-widest text-sm mb-2">PERSONAL COLOR LENS</p>
        <h1 class="font-serif text-2xl md:text-3xl lg:text-4xl text-charcoal tracking-wide">
            あなたに<span class="champagne-gradient-text">「一番似合う色」</span>を見つける。<br class="md:hidden">カスタムレンズシミュレーター
        </h1>
    </header>

    <main class="w-full max-w-5xl">
        <section id="step1" class="w-full max-w-2xl mx-auto flex flex-col gap-6 fade-in-up" style="animation-delay: 0.3s;">
            <div class="text-center mb-4">
                <h2 class="font-serif text-xl text-charcoal mb-2">お客様のお悩みをお聞かせください</h2>
                <p class="text-gray-500 text-sm">最適なカラー提案のためのヒントにします。</p>
            </div>
            
            <button class="problem-btn glass-button w-full text-left p-5 rounded-xl flex items-center justify-between group" data-problem="scary">
                <div class="flex-1">
                    <span class="block text-sm text-champagne mb-1 font-medium">Concern 01</span>
                    <span class="block text-gray-800 font-medium">「色が濃すぎると、威圧感が出て怖い人に見えそう」</span>
                </div>
                <svg class="w-6 h-6 text-champagne opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button class="problem-btn glass-button w-full text-left p-5 rounded-xl flex items-center justify-between group" data-problem="mask">
                <div class="flex-1">
                    <span class="block text-sm text-champagne mb-1 font-medium">Concern 02</span>
                    <span class="block text-gray-800 font-medium">「マスクをしたままかけると、不審者っぽくならないか不安」</span>
                </div>
                <svg class="w-6 h-6 text-champagne opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button class="problem-btn glass-button w-full text-left p-5 rounded-xl flex items-center justify-between group" data-problem="boring">
                <div class="flex-1">
                    <span class="block text-sm text-champagne mb-1 font-medium">Concern 03</span>
                    <span class="block text-gray-800 font-medium">「色が薄すぎると、ただの色メガネになってダサい気がする」</span>
                </div>
                <svg class="w-6 h-6 text-champagne opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </section>

        <section id="step2" class="w-full hidden-step fade-in-up">
            <!-- 戻るボタン -->
            <button id="back-btn" class="mb-6 flex items-center text-sm text-gray-500 hover:text-champagne transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                お悩み選択へ戻る
            </button>

            <!-- レイアウト: PCでは2カラム、スマホでは縦積み -->
            <div class="flex flex-col lg:flex-row gap-8 w-full">
                
                <!-- 左側: ビジュアルシミュレーター (文字被り絶対回避ブロック) -->
                <div class="w-full lg:w-5/12 shrink-0">
                    <div class="glass-panel p-6 aspect-square w-full flex items-center justify-center relative overflow-hidden">
                        <!-- 装飾用の光彩 -->
                        <div class="absolute top-0 right-0 w-32 h-32 bg-champagne-light opacity-20 rounded-full blur-3xl"></div>
                        <div class="absolute bottom-0 left-0 w-32 h-32 bg-gray-200 opacity-50 rounded-full blur-3xl"></div>
                        
                        <svg class="w-full h-auto max-w-sm z-10 drop-shadow-md" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <!-- グラデーションレンズ用の定義（JSで動的に色と透明度を操作） -->
                                <linearGradient id="lens-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop id="grad-stop-1" offset="0%" stop-color="#8B5A2B" stop-opacity="0.8" />
                                    <stop id="grad-stop-2" offset="80%" stop-color="#8B5A2B" stop-opacity="0.1" />
                                    <stop id="grad-stop-3" offset="100%" stop-color="#8B5A2B" stop-opacity="0" />
                                </linearGradient>
                            </defs>
                            
                            <!-- 肌・顔の輪郭（簡易的で洗練された表現） -->
                            <rect x="0" y="0" width="400" height="300" fill="#FCF8F5" rx="20"/>
                            
                            <!-- まゆげ -->
                            <path d="M 80,110 Q 110,95 140,110" fill="none" stroke="#6b5b54" stroke-width="4" stroke-linecap="round"/>
                            <path d="M 260,110 Q 290,95 320,110" fill="none" stroke="#6b5b54" stroke-width="4" stroke-linecap="round"/>
                            
                            <!-- 目 (アイラインと瞳) -->
                            <!-- 左目 -->
                            <path d="M 85,145 Q 110,130 135,145 Q 110,155 85,145 Z" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
                            <circle cx="110" cy="142" r="8" fill="#4a3b32"/>
                            <!-- 右目 -->
                            <path d="M 265,145 Q 290,130 315,145 Q 290,155 265,145 Z" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
                            <circle cx="290" cy="142" r="8" fill="#4a3b32"/>

                            <!-- レンズ (JSで fill を切り替える) -->
                            <!-- 左レンズ -->
                            <path id="lens-left" d="M 70,115 C 100,110 130,110 150,130 C 150,165 125,185 105,185 C 80,185 60,165 70,115 Z" fill="url(#lens-gradient)" />
                            <!-- 右レンズ -->
                            <path id="lens-right" d="M 330,115 C 300,110 270,110 250,130 C 250,165 275,185 295,185 C 320,185 340,165 330,115 Z" fill="url(#lens-gradient)" />

                            <!-- メガネフレーム (細いシャンパンゴールド) -->
                            <!-- 左フレーム -->
                            <path d="M 70,115 C 100,110 130,110 150,130 C 150,165 125,185 105,185 C 80,185 60,165 70,115 Z" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                            <!-- 右フレーム -->
                            <path d="M 330,115 C 300,110 270,110 250,130 C 250,165 275,185 295,185 C 320,185 340,165 330,115 Z" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                            <!-- ブリッジ -->
                            <path d="M 150,130 Q 200,120 250,130" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                            <!-- テンプル (耳にかける部分) -->
                            <path d="M 70,115 L 20,110" fill="none" stroke="#d4af37" stroke-width="4" stroke-linecap="round"/>
                            <path d="M 330,115 L 380,110" fill="none" stroke="#d4af37" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>

                <div class="w-full lg:w-7/12 flex flex-col gap-6">
                    
                    <!-- コントロールパネル -->
                    <div class="glass-panel p-6 md:p-8">
                        <h3 class="font-serif text-lg mb-6 text-charcoal border-b border-gray-200 pb-2">カラーカスタマイズ</h3>
                        
                        <!-- 染色タイプ（フル/ハーフ） -->
                        <div class="mb-6">
                            <span class="block text-sm font-medium text-gray-500 mb-3">染色タイプ</span>
                            <div class="flex gap-4 radio-btn-group">
                                <div class="flex-1">
                                    <input type="radio" id="type-half" name="dyeType" value="half" class="hidden" checked>
                                    <label for="type-half" class="block text-center py-2 px-4 rounded-lg border border-gray-300 text-gray-600 cursor-pointer transition-colors text-sm">
                                        グラデーション (ハーフ)
                                    </label>
                                </div>
                                <div class="flex-1">
                                    <input type="radio" id="type-full" name="dyeType" value="full" class="hidden">
                                    <label for="type-full" class="block text-center py-2 px-4 rounded-lg border border-gray-300 text-gray-600 cursor-pointer transition-colors text-sm">
                                        フルカラー
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- カラー選択 -->
                        <div class="mb-6">
                            <span class="block text-sm font-medium text-gray-500 mb-3">ベースカラー</span>
                            <div class="flex flex-wrap gap-3" id="color-palette">
                                <!-- JSで動的生成 -->
                            </div>
                        </div>

                        <!-- 濃度スライダー -->
                        <div>
                            <div class="flex justify-between items-end mb-3">
                                <span class="block text-sm font-medium text-gray-500">濃度（透け感）</span>
                                <span id="density-display" class="font-serif text-lg text-champagne font-bold">25%</span>
                            </div>
                            <!-- 実際の現場でよくある濃度規格（15, 25, 35, 50, 85）にスナップさせる -->
                            <input type="range" id="density-slider" min="0" max="4" step="1" value="1">
                            <div class="flex justify-between text-xs text-gray-400 mt-2 px-1">
                                <span>薄い(15%)</span>
                                <span>濃い(85%)</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white border-l-4 border-champagne p-6 rounded-r-xl shadow-sm relative">
                        <div class="absolute -top-3 -left-3 bg-champagne text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">
                            スタッフ用トーク
                        </div>
                        <h4 id="talk-title" class="font-serif text-lg text-charcoal mb-3 mt-2">ご提案の意図</h4>
                        <p id="talk-script" class="text-gray-700 leading-relaxed text-sm md:text-base">
                            <!-- JSで動的にトークを生成し、ハイライトタグを挿入 -->
                        </p>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script>
        // 定数定義
        const DENSITY_LEVELS = [15, 25, 35, 50, 85];
        const COLORS = [
            { id: 'brown', name: 'ブラウン', hex: '#8B5A2B', bg: 'bg-[#8B5A2B]' },
            { id: 'gray', name: 'グレー', hex: '#555555', bg: 'bg-[#555555]' },
            { id: 'blue', name: 'ブルー', hex: '#4682B4', bg: 'bg-[#4682B4]' },
            { id: 'pink', name: 'ピンク', hex: '#CD8162', bg: 'bg-[#CD8162]' },
            { id: 'green', name: 'グリーン', hex: '#556B2F', bg: 'bg-[#556B2F]' }
        ];

        // 状態管理
        const state = {
            problem: '',
            type: 'half', // 'half' or 'full'
            color: COLORS[0],
            densityIndex: 1 // DENSITY_LEVELS[1] = 25%
        };

        // DOM要素
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const backBtn = document.getElementById('back-btn');
        const problemBtns = document.querySelectorAll('.problem-btn');
        
        const typeInputs = document.querySelectorAll('input[name="dyeType"]');
        const colorPalette = document.getElementById('color-palette');
        const densitySlider = document.getElementById('density-slider');
        const densityDisplay = document.getElementById('density-display');
        
        // SVG要素
        const lensLeft = document.getElementById('lens-left');
        const lensRight = document.getElementById('lens-right');
        const gradStop1 = document.getElementById('grad-stop-1');
        const gradStop2 = document.getElementById('grad-stop-2');
        const gradStop3 = document.getElementById('grad-stop-3');
        
        // トーク要素
        const talkTitle = document.getElementById('talk-title');
        const talkScript = document.getElementById('talk-script');

        function init() {
            renderColorPalette();
            
            // お悩み選択イベント
            problemBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const problem = e.currentTarget.dataset.problem;
                    handleProblemSelect(problem);
                });
            });

            // 戻るボタン
            backBtn.addEventListener('click', () => {
                step2.classList.add('hidden-step');
                step1.classList.remove('hidden-step');
                // アニメーション再トリガーのためにリフローを強制
                void step1.offsetWidth;
                step1.style.animation = 'none';
                setTimeout(() => step1.style.animation = '', 10);
            });

            // コントロールパネルのイベント
            typeInputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    state.type = e.target.value;
                    updateSimulator();
                });
            });

            densitySlider.addEventListener('input', (e) => {
                state.densityIndex = parseInt(e.target.value);
                updateSimulator();
            });
        }

        // カラーパレットの生成
        function renderColorPalette() {
            colorPalette.innerHTML = '';
            COLORS.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `w-8 h-8 rounded-full shadow-sm border-2 transition-all transform hover:scale-110 ${c.bg} ${state.color.id === c.id ? 'border-champagne ring-2 ring-champagne-light ring-offset-1' : 'border-white'}`;
                btn.title = c.name;
                btn.addEventListener('click', () => {
                    state.color = c;
                    renderColorPalette(); // 選択状態のUI更新
                    updateSimulator();
                });
                colorPalette.appendChild(btn);
            });
        }

        function handleProblemSelect(problem) {
            state.problem = problem;
            
            // お悩みに合わせた初期設定の提案
            if (problem === 'scary') {
                // 威圧感が怖い -> 薄め(15%)・ブラウン・グラデーション
                state.color = COLORS.find(c => c.id === 'brown');
                state.densityIndex = 0; // 15%
                state.type = 'half';
                document.getElementById('type-half').checked = true;
            } else if (problem === 'mask') {
                // マスクで不審者 -> 抜け感(25%)・グレー・フル
                state.color = COLORS.find(c => c.id === 'gray');
                state.densityIndex = 1; // 25%
                state.type = 'full';
                document.getElementById('type-full').checked = true;
            } else if (problem === 'boring') {
                // ダサい -> 濃いめ(50%)・ブルー・フル
                state.color = COLORS.find(c => c.id === 'blue');
                state.densityIndex = 3; // 50%
                state.type = 'full';
                document.getElementById('type-full').checked = true;
            }

            // スライダー位置とカラーパレットの同期
            densitySlider.value = state.densityIndex;
            renderColorPalette();
            
            // 画面切り替えと描画
            step1.classList.add('hidden-step');
            step2.classList.remove('hidden-step');
            updateSimulator();
        }

        function updateSimulator() {
            const currentDensity = DENSITY_LEVELS[state.densityIndex];
            densityDisplay.textContent = `${currentDensity}%`;

            // SVGカラーの更新 (CSSのopacity値に変換)
            // 85%なら 0.85 とするが、画面上で視認しやすくするため若干調整
            const maxOpacity = currentDensity / 100;
            
            if (state.type === 'full') {
                // フルカラー：全体を同じ色・透明度にする
                lensLeft.setAttribute('fill', state.color.hex);
                lensLeft.setAttribute('fill-opacity', maxOpacity);
                lensRight.setAttribute('fill', state.color.hex);
                lensRight.setAttribute('fill-opacity', maxOpacity);
            } else {
                // グラデーション：グラデーション定義を更新して適用
                lensLeft.setAttribute('fill', 'url(#lens-gradient)');
                lensLeft.setAttribute('fill-opacity', '1'); // グラデーション側で透明度管理
                lensRight.setAttribute('fill', 'url(#lens-gradient)');
                lensRight.setAttribute('fill-opacity', '1');

                gradStop1.setAttribute('stop-color', state.color.hex);
                gradStop1.setAttribute('stop-opacity', maxOpacity);
                
                gradStop2.setAttribute('stop-color', state.color.hex);
                // 中間は最大透明度の15%くらい
                gradStop2.setAttribute('stop-opacity', maxOpacity * 0.15);
                
                gradStop3.setAttribute('stop-color', state.color.hex);
                gradStop3.setAttribute('stop-opacity', '0');
            }

            generateTalkScript();
        }

        function generateTalkScript() {
            const density = DENSITY_LEVELS[state.densityIndex];
            const typeText = state.type === 'full' ? 'フルカラー' : 'グラデーション';
            let title = "";
            let script = "";

            // 1. お悩みに対する共感（導入）
            if (state.problem === 'scary') {
                script += `「威圧感が出てしまうのがご不安」とのことですね。`;
            } else if (state.problem === 'mask') {
                script += `「マスク着用時の見え方」は、多くのお客様が気にされるポイントです。`;
            } else if (state.problem === 'boring') {
                script += `「普通のメガネと差をつけたい、ダサくならないか」というお悩みですね。`;
            }

            // 2. 濃度と染色タイプに基づく具体的な提案とメリット
            script += `<br><br>こちらの <mark class="script-highlight">${density}%の${typeText}（${state.color.name}）</mark> はいかがでしょうか。<br>`;

            if (density <= 25) {
                script += `これくらい薄いカラーですと、<mark class="script-highlight">目元や表情がはっきりと透けて見える</mark>ため、`;
                if (state.problem === 'mask') {
                    script += `マスクと合わせても全く不審な印象にならず、むしろ目元に血色感や影が生まれ、おしゃれな印象になります。`;
                } else {
                    script += `威圧感は出ず、肌に自然になじみます。`;
                }
            } else if (density > 25 && density <= 50) {
                script += `この濃度は、<mark class="script-highlight">サングラスらしさを保ちつつ、表情も伺える絶妙なバランス</mark>です。`;
                if (state.problem === 'boring') {
                    script += `「ただのメガネ」感はなくなり、一気に洗練されたファッションアイテムとして活躍します。`;
                } else {
                    script += `日常使いからドライブまで幅広くお使いいただけます。`;
                }
            } else {
                script += `これくらい濃いカラーは、まぶしさをしっかりカットします。<mark class="script-highlight">目元が見えにくいため、よりクールで都会的な印象</mark>を与えます。`;
                if (state.problem === 'scary' || state.problem === 'mask') {
                    script += `<br><span class="text-xs text-red-500 font-bold">※スタッフへの注意：お客様のお悩みに対して濃すぎる可能性があるため、利用シーン（リゾートなど）を必ずヒアリングしてください。</span>`;
                }
            }

            // 3. 染色タイプ（フル/ハーフ）の補足
            script += `<br><br>`;
            if (state.type === 'half') {
                script += `また、グラデーションにすることで、<mark class="script-highlight">視線が下がる足元は明るく見え、実用性が高い</mark>のが特徴です。お顔に立体感が出て、メイクアップ効果も期待できますよ。`;
                title = "「抜け感」と「立体感」を両立するご提案";
            } else {
                script += `フルカラーはお顔全体に均一なニュアンスを加えるため、<mark class="script-highlight">フレームとの一体感が増し、スタイリッシュにまとまります。</mark>`;
                title = "「スタイリッシュ」にまとめるご提案";
            }

            talkTitle.textContent = title;
            talkScript.innerHTML = script;
        }

        // 初期化実行
        init();

    </script>
</body>
</html>
