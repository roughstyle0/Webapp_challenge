<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIGHT-DRIVE OPTICAL ASSIST SYSTEM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hud: {
              cyan: '#00f3ff',
              cyanDark: '#008a99',
              orange: '#ff8c00',
              red: '#ff003c',
              bg: '#050a0f',
              panel: 'rgba(5, 10, 15, 0.75)'
            }
          },
          fontFamily: {
            mono: ['"SF Mono"', 'ui-monospace', 'Menlo', 'Monaco', 'Consolas', '"Courier New"', 'monospace'],
          },
          animation: {
            'scanline': 'scanline 8s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scanline: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100vh)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    /* ベース設定 & スクロールバー隠し */
    body {
      background-color: #030508;
      background-image: 
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* HUDパネル共通エフェクト */
    .hud-panel {
      position: relative;
      border: 1px solid rgba(0, 243, 255, 0.2);
      background: var(--tw-colors-hud-panel);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05), 0 0 15px rgba(0, 0, 0, 0.8);
    }
    .hud-corner {
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: #00f3ff;
      border-style: solid;
      pointer-events: none;
    }
    .hud-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .hud-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .hud-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .hud-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ボタンエフェクト */
    .hud-btn {
      transition: all 0.3s ease;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .hud-btn:hover {
      background: rgba(0, 243, 255, 0.15);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
      border-color: #00f3ff;
    }
    .hud-btn.active {
      background: rgba(0, 243, 255, 0.25);
      border-color: #00f3ff;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.6), inset 0 0 10px rgba(0, 243, 255, 0.4);
      color: #fff;
      text-shadow: 0 0 5px #00f3ff;
    }

    /* シミュレーター画面の光学エフェクト制御 */
    #sim-effect {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* 1. ハイビーム (裸眼 vs レンズ) */
    #simulator-viewport[data-scene="highbeam"][data-lens="off"] #sim-effect {
      background: radial-gradient(circle at 50% 55%, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 20%, transparent 60%);
      backdrop-filter: blur(8px) brightness(1.8) contrast(0.8);
      mix-blend-mode: screen;
    }
    #simulator-viewport[data-scene="highbeam"][data-lens="on"] #sim-effect {
      background: radial-gradient(circle at 50% 55%, rgba(255,255,255,0.2) 0%, transparent 15%);
      backdrop-filter: brightness(0.9) contrast(1.2);
      mix-blend-mode: normal;
    }

    /* 2. 雨の夜間 (裸眼 vs レンズ) */
    #simulator-viewport[data-scene="rain"][data-lens="off"] #sim-effect {
      background: linear-gradient(180deg, transparent 40%, rgba(255,255,255,0.5) 100%);
      backdrop-filter: blur(5px) brightness(1.3);
      mix-blend-mode: screen;
    }
    #simulator-viewport[data-scene="rain"][data-lens="on"] #sim-effect {
      background: transparent;
      backdrop-filter: contrast(1.5) brightness(0.8) saturate(1.2);
      mix-blend-mode: normal;
    }

    /* 3. 高速道路 (裸眼 vs レンズ) */
    #simulator-viewport[data-scene="highway"][data-lens="off"] #sim-effect {
      background: radial-gradient(circle at 35% 60%, rgba(255,50,0,0.6) 0%, transparent 45%),
                  radial-gradient(circle at 65% 60%, rgba(255,50,0,0.6) 0%, transparent 45%);
      backdrop-filter: blur(4px) sepia(0.3);
      mix-blend-mode: screen;
    }
    #simulator-viewport[data-scene="highway"][data-lens="on"] #sim-effect {
      background: radial-gradient(circle at 35% 60%, rgba(255,50,0,0.1) 0%, transparent 20%),
                  radial-gradient(circle at 65% 60%, rgba(255,50,0,0.1) 0%, transparent 20%);
      backdrop-filter: contrast(1.2) brightness(0.9);
      mix-blend-mode: normal;
    }

    /* タイプライターのカーソル */
    .typing-cursor::after {
      content: '▌';
      animation: blink 1s step-end infinite;
      color: #00f3ff;
      margin-left: 4px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    
    /* 強調テキストのハイライト装飾 */
    .highlight-talk {
      color: #ff8c00;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 140, 0, 0.6);
      border-bottom: 1px dashed #ff8c00;
    }
  </style>
</head>
<body class="text-hud-cyan font-mono text-sm md:text-base leading-relaxed antialiased selection:bg-hud-cyan selection:text-black">

  <!-- 没入感を高める走査線エフェクト -->
  <div class="pointer-events-none fixed inset-0 z-50 overflow-hidden opacity-20">
    <div class="w-full h-2 bg-hud-cyan opacity-50 blur-[2px] animate-scanline"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSJub25lIiAvPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSIxIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDUpIiAvPgo8L3N2Zz4=')] mix-blend-overlay"></div>
  </div>

  <div class="max-w-6xl mx-auto p-4 md:p-6 min-h-screen flex flex-col gap-6 relative z-10">
    
    <!-- HEADER -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-hud-cyan/30 pb-4 gap-2">
      <div>
        <h1 class="text-xl md:text-2xl font-bold tracking-widest text-white drop-shadow-[0_0_10px_rgba(0,243,255,0.8)]">NIGHT-DRIVE OPTICAL ASSIST <span class="text-xs align-top text-hud-cyan">v2.0</span></h1>
        <p class="text-xs text-hud-cyanDark mt-1">> INITIALIZING SYSTEM... STANDBY.</p>
      </div>
      <div class="text-xs text-hud-orange animate-pulse-slow">
        STATUS: AWAITING SCENARIO INPUT
      </div>
    </header>

    <!-- STEP 1: SCENARIO SELECTOR (常に表示) -->
    <section>
      <div class="flex items-center gap-2 mb-3">
        <span class="inline-block w-2 h-2 bg-hud-cyan"></span>
        <h2 class="tracking-widest font-bold text-white">SELECT TARGET SCENARIO</h2>
      </div>
      <!-- スマホでは縦積み、PCでは3列のグリッド -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <button onclick="selectScene('highbeam')" class="hud-btn border border-hud-cyan/40 p-4 text-left group" id="btn-highbeam">
          <div class="text-xs text-hud-cyanDark mb-1">SCENARIO: 01</div>
          <div class="font-bold text-white group-hover:text-hud-cyan transition-colors">対向車の強烈なLEDライト</div>
          <div class="text-xs mt-2 opacity-70">眩惑・視界消失リスク</div>
        </button>
        <button onclick="selectScene('rain')" class="hud-btn border border-hud-cyan/40 p-4 text-left group" id="btn-rain">
          <div class="text-xs text-hud-cyanDark mb-1">SCENARIO: 02</div>
          <div class="font-bold text-white group-hover:text-hud-cyan transition-colors">雨の日の夜間走行</div>
          <div class="text-xs mt-2 opacity-70">路面ギラつき・白線消失</div>
        </button>
        <button onclick="selectScene('highway')" class="hud-btn border border-hud-cyan/40 p-4 text-left group" id="btn-highway">
          <div class="text-xs text-hud-cyanDark mb-1">SCENARIO: 03</div>
          <div class="font-bold text-white group-hover:text-hud-cyan transition-colors">長時間の高速道路</div>
          <div class="text-xs mt-2 opacity-70">テールランプ滲み・眼精疲労</div>
        </button>
      </div>
    </section>

    <!-- 情報を詰め込まず、選択後に展開するコンテナ -->
    <div id="dynamic-content" class="hidden flex-col lg:flex-row gap-6 mt-2 opacity-0 transition-opacity duration-700 ease-out">
      
      <!-- LEFT: SIMULATOR (STEP 2で展開) -->
      <section class="lg:w-7/12 flex flex-col gap-4">
        
        <!-- ビューポート (画像＋光学エフェクト) -->
        <div class="hud-panel p-2">
          <div class="hud-corner tl"></div><div class="hud-corner tr"></div><div class="hud-corner bl"></div><div class="hud-corner br"></div>
          
          <!-- 比率を保ちつつレスポンシブ対応 -->
          <div id="simulator-viewport" class="relative w-full aspect-video md:aspect-[16/9] bg-cover bg-center overflow-hidden rounded-sm" 
               style="background-image: url('https://images.unsplash.com/photo-1494252713559-f26b4fb0c159?q=80&w=1200&auto=format&fit=crop');">
            
            <!-- CSSによる視覚エフェクトレイヤー -->
            <div id="sim-effect" class="absolute inset-0"></div>
            
            <!-- ステータスオーバーレイ -->
            <div class="absolute top-3 left-3 flex flex-col gap-1">
              <span class="bg-black/80 border border-hud-cyan text-[10px] px-2 py-0.5" id="overlay-scene-name">SCENARIO</span>
              <span class="bg-hud-red/20 border border-hud-red text-hud-red text-[10px] px-2 py-0.5 animate-pulse" id="overlay-warning">[!] VISION DEGRADED</span>
            </div>
            
            <!-- ターゲットレティクル (HUD装飾) -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border border-white/10 rounded-full flex items-center justify-center pointer-events-none">
              <div class="w-1 h-1 bg-hud-cyan/50 rounded-full"></div>
              <div class="absolute top-0 w-full border-t border-white/10"></div>
              <div class="absolute left-0 h-full border-l border-white/10"></div>
            </div>
          </div>
        </div>

        <!-- レンズ切り替えコントローラー -->
        <div class="flex gap-2">
          <button onclick="toggleLens(false)" id="ctrl-off" class="hud-btn flex-1 border border-hud-cyan p-3 text-center active flex items-center justify-center gap-2">
            <span class="w-2 h-2 rounded-full bg-hud-red" id="dot-off"></span>
            <span class="font-bold tracking-wider">裸眼・通常メガネ</span>
          </button>
          <button onclick="toggleLens(true)" id="ctrl-on" class="hud-btn flex-1 border border-hud-cyan p-3 text-center flex items-center justify-center gap-2">
            <span class="w-2 h-2 rounded-full bg-transparent border border-hud-cyan" id="dot-on"></span>
            <span class="font-bold tracking-wider">夜間専用レンズ</span>
          </button>
        </div>
      </section>

      <!-- RIGHT: INTEL & SCRIPT (STEP 2~3で段階的に展開) -->
      <section class="lg:w-5/12 flex flex-col gap-4">
        
        <!-- THREAT ANALYSIS (シーン選択直後に表示) -->
        <div class="hud-panel p-5 flex-1 min-h-[140px]">
          <div class="hud-corner tl"></div><div class="hud-corner tr"></div><div class="hud-corner bl"></div><div class="hud-corner br"></div>
          <div class="flex items-center justify-between mb-3 border-b border-hud-cyan/20 pb-2">
            <h3 class="text-hud-red font-bold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              THREAT ANALYSIS (危険性)
            </h3>
          </div>
          <!-- テキスト出力エリア -->
          <div id="text-threat" class="text-gray-300 min-h-[4rem] typing-cursor"></div>
        </div>

        <!-- SOLUTION & TALK SCRIPT (レンズONで展開) -->
        <div id="solution-area" class="hidden flex-col gap-4 transition-all duration-500">
          
          <!-- SOLUTION (仕組み) -->
          <div class="hud-panel p-5 border-hud-cyan shadow-[0_0_15px_rgba(0,243,255,0.1)]">
             <div class="hud-corner tl"></div><div class="hud-corner tr"></div><div class="hud-corner bl"></div><div class="hud-corner br"></div>
            <div class="flex items-center justify-between mb-3 border-b border-hud-cyan/20 pb-2">
              <h3 class="text-white font-bold flex items-center gap-2">
                <svg class="w-4 h-4 text-hud-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                COUNTERMEASURE (レンズの仕組み)
              </h3>
            </div>
            <div id="text-solution" class="text-hud-cyan min-h-[4rem]"></div>
          </div>

          <!-- TALK SCRIPT (新人スタッフ用カンペ) -->
          <div class="hud-panel p-5 border-hud-orange shadow-[0_0_15px_rgba(255,140,0,0.1)]">
            <div class="hud-corner tl !border-hud-orange"></div><div class="hud-corner tr !border-hud-orange"></div>
            <div class="hud-corner bl !border-hud-orange"></div><div class="hud-corner br !border-hud-orange"></div>
            <div class="flex items-center justify-between mb-3 border-b border-hud-orange/20 pb-2">
              <h3 class="text-hud-orange font-bold flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                RECOMMENDED DIALOGUE (接客トーク)
              </h3>
              <span class="text-[10px] bg-hud-orange/20 text-hud-orange px-2 py-0.5 rounded">STAFF ASSIST</span>
            </div>
            <!-- お客様へのトークカンペエリア -->
            <div id="text-talk" class="text-gray-200 leading-relaxed min-h-[6rem]"></div>
          </div>

        </div>
      </section>

    </div>
  </div>

  <script>
    /**
     * データ定義 (手抜き禁止ルール遵守: ユーザーの心に刺さるテキストを網羅)
     * [[ ]] で囲んだ部分は、表示時にハイライト装飾されます。
     */
    const db = {
      highbeam: {
        name: "SCENARIO: LEDハイビーム",
        threat: "夜間に濃いサングラスを使用すると、全体の光量が低下し、歩行者や障害物の見落としリスクが極大化します。\n夜間運転時の安全基準（視感透過率75%以上）を逸脱する恐れがあり、非常に危険です。",
        solution: "専用レンズは、視界全体の明るさ（透過率）を安全基準に保ちつつ、LEDライト特有の[[眩しい波長帯（ブルーライト等）のみを選択的にカット]]し、減光します。",
        talk: "「お客様、夜間に対向車のライトで[[一瞬前が見えなくなった経験]]はございませんか？\n実は、夜に普通のサングラスをかけるのは非常に危険なんです。\nこちらの夜間専用レンズなら、視界の明るさはそのままに、[[刺さるようなライトの眩しさだけを無効化]]できます。GWの長距離ドライブも、これがあれば劇的に疲労が減りますよ。」"
      },
      rain: {
        name: "SCENARIO: 雨の夜間走行",
        threat: "路面の水膜が街灯やヘッドライトの光を乱反射させ、視界全体を白く飛ばします（グレア現象）。\n通常のカラーレンズでは、この「光の乱反射」を防ぐことは物理的に不可能です。",
        solution: "夜間用にチューニングされた特殊な偏光・防眩フィルター技術により、[[水面からのギラつき（反射光）だけを遮断]]し、隠れていた白線をクッキリと浮かび上がらせます。",
        talk: "「雨の日の夜、[[白線が見えなくてヒヤッとしたこと]]はないですか？\n普通のメガネでは光の乱反射は防げませんが、こちらのレンズは『路面のギラつき』だけを消し去る機能を持っています。\n雨の夜でも、まるで[[晴れているかのように車線がハッキリ見える]]ので、ご家族を乗せた運転でも安心感が全く違います。」"
      },
      highway: {
        name: "SCENARIO: 長時間の高速道路",
        threat: "長時間の夜間運転では、暗闇でのピント合わせや、かすかな光の滲み・コントラストの低下が、ドライバーの脳と目に想像以上の疲労（眼精疲労）を蓄積させます。",
        solution: "コントラストエンハンサー機能が、赤やオレンジの[[テールランプの滲みを抑え、輪郭をシャープに補正]]。目のピント合わせの負担を劇的に軽減します。",
        talk: "「GWの高速道路、何時間も走ると[[目がショボショボして肩が凝りませんか？]]\n実はそれ、暗い中で目が必死にピントを合わせようとしているのが原因なんです。\nこのレンズは光の滲みを抑えて視界の輪郭をハッキリさせるので、長時間の運転でも[[目の疲労度が全く違います]]。翌日も思い切り遊ぶために、ドライバーの疲労軽減は必須アイテムですよ。」"
      }
    };

    let currentScene = null;
    let isTyping = false;
    let typeIntervals = {};

    /**
     * シーン選択処理 (プログレッシブディクロージャー Phase 1 -> 2)
     */
    function selectScene(sceneId) {
      if (isTyping) return; // タイピング中の連打防止
      currentScene = sceneId;
      
      // ボタンのアクティブ状態リセット
      ['highbeam', 'rain', 'highway'].forEach(id => {
        document.getElementById(`btn-${id}`).classList.remove('active');
      });
      document.getElementById(`btn-${sceneId}`).classList.add('active');

      // コンテンツエリアを展開（初回のみ）
      const dynamicContent = document.getElementById('dynamic-content');
      dynamicContent.classList.remove('hidden');
      // 少し遅延させてopacityを上げる（フェードイン）
      setTimeout(() => dynamicContent.classList.remove('opacity-0'), 50);

      // シミュレーターを「裸眼（危険状態）」でリセット
      updateSimulator(sceneId, false);
      
      // Solution/Talkエリアを隠す (段階的展開の徹底)
      document.getElementById('solution-area').classList.add('hidden');
      document.getElementById('solution-area').classList.remove('opacity-100');
      document.getElementById('text-solution').innerHTML = '';
      document.getElementById('text-talk').innerHTML = '';

      // テキスト出力: Threat (危険性)
      typeWriter('text-threat', db[sceneId].threat, true);
    }

    /**
     * レンズON/OFF切り替え (プログレッシブディクロージャー Phase 2 -> 3)
     */
    function toggleLens(turnOn) {
      if (!currentScene || isTyping) return;
      
      updateSimulator(currentScene, turnOn);

      if (turnOn) {
        // レンズON: 解決策とトークを展開
        const solArea = document.getElementById('solution-area');
        solArea.classList.remove('hidden');
        setTimeout(() => solArea.classList.add('opacity-100'), 50);
        
        // 連続でタイプライター実行
        typeWriter('text-solution', db[currentScene].solution, true, () => {
          typeWriter('text-talk', db[currentScene].talk, true);
        });
      }
    }

    /**
     * シミュレーターのUI状態更新
     */
    function updateSimulator(sceneId, isLensOn) {
      // カスタムデータ属性を更新 (CSSがこれに反応してエフェクトを切り替える)
      const viewport = document.getElementById('simulator-viewport');
      viewport.setAttribute('data-scene', sceneId);
      viewport.setAttribute('data-lens', isLensOn ? 'on' : 'off');

      // UIテキスト更新
      document.getElementById('overlay-scene-name').innerText = db[sceneId].name;
      
      const warningLabel = document.getElementById('overlay-warning');
      if (isLensOn) {
        warningLabel.innerText = "[OK] VISION CLEARED";
        warningLabel.className = "bg-hud-cyan/20 border border-hud-cyan text-hud-cyan text-[10px] px-2 py-0.5";
      } else {
        warningLabel.innerText = "[!] VISION DEGRADED";
        warningLabel.className = "bg-hud-red/20 border border-hud-red text-hud-red text-[10px] px-2 py-0.5 animate-pulse";
      }

      // コントローラーボタンのトグル表現
      const btnOff = document.getElementById('ctrl-off');
      const btnOn = document.getElementById('ctrl-on');
      const dotOff = document.getElementById('dot-off');
      const dotOn = document.getElementById('dot-on');

      if (isLensOn) {
        btnOff.classList.remove('active');
        btnOn.classList.add('active');
        dotOff.className = "w-2 h-2 rounded-full bg-transparent border border-hud-cyan";
        dotOn.className = "w-2 h-2 rounded-full bg-hud-cyan shadow-[0_0_5px_#00f3ff]";
      } else {
        btnOn.classList.remove('active');
        btnOff.classList.add('active');
        dotOn.className = "w-2 h-2 rounded-full bg-transparent border border-hud-cyan";
        dotOff.className = "w-2 h-2 rounded-full bg-hud-red shadow-[0_0_5px_#ff003c]";
      }
    }

    /**
     * HUD風 タイプライターエフェクト＆構文解析
     * [[テキスト]] をハイライト用spanタグに変換しながら出力する
     */
    function typeWriter(elementId, text, showCursor = true, callback = null) {
      isTyping = true;
      const el = document.getElementById(elementId);
      el.innerHTML = '';
      if(showCursor) el.classList.add('typing-cursor');
      
      // 以前のタイピングをクリア
      if(typeIntervals[elementId]) clearInterval(typeIntervals[elementId]);

      // [[ ]] のパースロジック
      const tokens = [];
      let currentToken = '';
      let inHighlight = false;

      for (let i = 0; i < text.length; i++) {
        if (text[i] === '[' && text[i+1] === '[') {
          if (currentToken) tokens.push({ text: currentToken, highlight: false });
          currentToken = '';
          inHighlight = true;
          i++; // skip second '['
        } else if (text[i] === ']' && text[i+1] === ']') {
          if (currentToken) tokens.push({ text: currentToken, highlight: true });
          currentToken = '';
          inHighlight = false;
          i++; // skip second ']'
        } else if (text[i] === '\n') {
          if (currentToken) tokens.push({ text: currentToken, highlight: inHighlight });
          tokens.push({ text: '<br><br>', isHtml: true });
          currentToken = '';
        } else {
          currentToken += text[i];
        }
      }
      if (currentToken) tokens.push({ text: currentToken, highlight: inHighlight });

      // 一文字ずつ出力するための配列を生成
      const charArray = [];
      tokens.forEach(token => {
        if (token.isHtml) {
          charArray.push(token.text);
        } else {
          const chars = token.text.split('');
          chars.forEach(c => {
            if (token.highlight) {
              charArray.push(`<span class="highlight-talk">${c}</span>`);
            } else {
              charArray.push(c);
            }
          });
        }
      });

      let charIndex = 0;
      typeIntervals[elementId] = setInterval(() => {
        el.innerHTML += charArray[charIndex];
        charIndex++;

        if (charIndex >= charArray.length) {
          clearInterval(typeIntervals[elementId]);
          if(showCursor) el.classList.remove('typing-cursor');
          isTyping = false;
          if (callback) callback();
        }
      }, 15); // タイピング速度 (15ms = 速め。新人スタッフが待たされない速度)
    }
  </script>
